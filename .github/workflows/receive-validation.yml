name: Receive Validation Submission

on:
  repository_dispatch:
    types: [validation-submitted]

jobs:
  receive-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract submission data
        id: extract
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          echo "$PAYLOAD" > /tmp/payload_raw.json
          OPENALEX_ID=$(echo "$PAYLOAD" | jq -r '.openalex_id')
          AUTHOR_NAME=$(echo "$PAYLOAD" | jq -r '.author_name')
          PAPERS_REVIEWED=$(echo "$PAYLOAD" | jq -r '.papers_reviewed')
          TIMESTAMP=$(echo "$PAYLOAD" | jq -r '.timestamp')
          # Sanitise timestamp for use in branch/filename (replace colons and spaces)
          TIMESTAMP_SAFE=$(echo "$TIMESTAMP" | tr ':' '-' | tr ' ' '_')
          echo "openalex_id=$OPENALEX_ID" >> "$GITHUB_OUTPUT"
          echo "author_name=$AUTHOR_NAME" >> "$GITHUB_OUTPUT"
          echo "papers_reviewed=$PAPERS_REVIEWED" >> "$GITHUB_OUTPUT"
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"
          echo "timestamp_safe=$TIMESTAMP_SAFE" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name "Validation Bot"
          git config user.email "noreply@github.com"

      - name: Create branch and commit validation file
        id: branch
        env:
          OPENALEX_ID: ${{ steps.extract.outputs.openalex_id }}
          AUTHOR_NAME: ${{ steps.extract.outputs.author_name }}
          PAPERS_REVIEWED: ${{ steps.extract.outputs.papers_reviewed }}
          TIMESTAMP_SAFE: ${{ steps.extract.outputs.timestamp_safe }}
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          BRANCH="validation/${OPENALEX_ID}/${TIMESTAMP_SAFE}"
          git checkout -b "$BRANCH"

          OUTFILE="validations/${OPENALEX_ID}_${TIMESTAMP_SAFE}.json"
          echo "$PAYLOAD" | jq '.' > "$OUTFILE"

          git add "$OUTFILE"
          git commit -m "validation: ${AUTHOR_NAME} (${PAPERS_REVIEWED} papers)"
          git push origin "$BRANCH"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "outfile=$OUTFILE" >> "$GITHUB_OUTPUT"

      - name: Generate PR summary
        env:
          OPENALEX_ID: ${{ steps.extract.outputs.openalex_id }}
          AUTHOR_NAME: ${{ steps.extract.outputs.author_name }}
          PAPERS_REVIEWED: ${{ steps.extract.outputs.papers_reviewed }}
          TIMESTAMP: ${{ steps.extract.outputs.timestamp }}
          OUTFILE: ${{ steps.branch.outputs.outfile }}
        run: |
          python3 - <<'PYEOF'
          import json, os

          # submit.js payload schema (docs/validate/assets/submit.js):
          #   papers: dict keyed by paper-id -> dict keyed by schema prefix
          #     (b_, sb_, d_, eco_, pr_, imp_, gear_, auth_, ...) -> section dict
          #     with rating, added[], removed[], notes, rule_suggestions{},
          #     and optional numeric fields (depth_min_m, depth_max_m, changes_count, ...).
          #   author_corrections: optional dict, only present if non-empty.

          # Canonical labels mirror docs/validate/assets/validate.js:PREFIX_LABELS
          # so the PR summary matches what the validator saw in the UI.
          SCHEMA_LABELS = {
              "b_":     "Ocean Basin",
              "sb_":    "Ocean Sub-basin",
              "d_":     "Discipline",
              "eco_":   "Ecosystem",
              "pr_":    "Pressure / Threat",
              "imp_":   "Impact / Response",
              "gear_":  "Fishing Gear",
              "sp_":    "Species",
              "a_":     "Analytical Techniques",
              "ob_":    "Ocean Basin (geographic)",
              "depth_": "Depth",
          }
          META_KEYS = {"rating", "added", "removed", "notes", "rule_suggestions"}

          openalex_id     = os.environ["OPENALEX_ID"]
          author_name     = os.environ["AUTHOR_NAME"]
          papers_reviewed = os.environ["PAPERS_REVIEWED"]
          timestamp       = os.environ["TIMESTAMP"]
          outfile         = os.environ["OUTFILE"]

          with open(outfile) as f:
              payload = json.load(f)

          lines = [
              f"## Validation submission: {author_name}",
              "",
              "| Field | Value |",
              "|---|---|",
              f"| Author | {author_name} |",
              f"| OpenAlex ID | `{openalex_id}` |",
              f"| Papers reviewed | {papers_reviewed} |",
              f"| Timestamp | {timestamp} |",
              f"| Page version | {payload.get('page_version', 'unknown')} |",
              "",
              "---",
              "",
              "## Per-paper changes",
              "",
          ]

          def render_rule_suggestions(rs):
              """Render non-empty parts of the rule_suggestions object."""
              parts = []
              thr = rs.get("threshold")
              if thr is not None:
                  parts.append(f"threshold={thr}")
              add_terms = rs.get("add_terms") or []
              if add_terms:
                  parts.append("add=[" + ", ".join(str(x) for x in add_terms) + "]")
              rem_terms = rs.get("remove_terms") or []
              if rem_terms:
                  parts.append("remove=[" + ", ".join(str(x) for x in rem_terms) + "]")
              return "; ".join(parts)

          papers = payload.get("papers", {}) or {}
          if not papers:
              lines.append("_No per-paper data provided._")
          else:
              for pid, sections in papers.items():
                  lines.append(f"### `{pid}`")
                  lines.append("")

                  if not isinstance(sections, dict) or not sections:
                      lines.append("_No section data._")
                      lines.append("")
                      continue

                  for prefix, data in sections.items():
                      if not isinstance(data, dict):
                          continue
                      label = SCHEMA_LABELS.get(prefix, prefix.rstrip("_") or prefix)
                      lines.append(f"**{label}** (`{prefix}`)")

                      rating = data.get("rating") or ""
                      if rating:
                          lines.append(f"- Rating: {rating}")

                      added = data.get("added") or []
                      if added:
                          lines.append(f"- Added: {', '.join(str(x) for x in added)}")

                      removed = data.get("removed") or []
                      if removed:
                          lines.append(f"- Removed: {', '.join(str(x) for x in removed)}")

                      notes = (data.get("notes") or "").strip()
                      if notes:
                          lines.append(f"- Notes: {notes}")

                      rs = data.get("rule_suggestions") or {}
                      rs_text = render_rule_suggestions(rs) if isinstance(rs, dict) else ""
                      if rs_text:
                          lines.append(f"- Rule suggestions: {rs_text}")

                      # Any extra numeric / misc fields (depth_min_m, depth_max_m,
                      # changes_count, etc.) — render as a compact line if present.
                      extras = []
                      for k, v in data.items():
                          if k in META_KEYS:
                              continue
                          if v is None or v == "":
                              continue
                          extras.append(f"{k}={v}")
                      if extras:
                          lines.append(f"- Other: {'; '.join(extras)}")

                      lines.append("")

          author_corrections = payload.get("author_corrections") or {}
          if author_corrections:
              lines.append("---")
              lines.append("")
              lines.append("## Author corrections")
              lines.append("")
              lines.append("```json")
              lines.append(json.dumps(author_corrections, indent=2, ensure_ascii=False))
              lines.append("```")
              lines.append("")

          with open("/tmp/pr_body.md", "w") as f:
              f.write("\n".join(lines))

          print("PR body written to /tmp/pr_body.md")
          PYEOF

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTHOR_NAME: ${{ steps.extract.outputs.author_name }}
          PAPERS_REVIEWED: ${{ steps.extract.outputs.papers_reviewed }}
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          gh pr create \
            --title "Validation: ${AUTHOR_NAME} (${PAPERS_REVIEWED} papers)" \
            --body-file /tmp/pr_body.md \
            --base main \
            --head "$BRANCH"
