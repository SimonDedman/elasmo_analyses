name: Deploy Author Atlas

# Rebuilds the v2 Author Atlas on every push to main that touches the
# atlas source files (R data script, frontend, or the author data itself).
# R stage rebuilds GeoJSON + JSON files; Vite stage builds the React site
# into docs/network_atlas/; commit-back action puts the artefacts into the
# commit so GitHub Pages picks them up.
#
# Secret required: VITE_STADIA_KEY (Stadia Maps API key for Stamen tiles).

on:
  push:
    branches: [main]
    paths:
      - 'scripts/build_author_atlas.R'
      - 'frontend/network_atlas/**'
      - 'outputs/author_aliases.csv'
      - 'outputs/author_name_corrections.csv'
      - 'outputs/author_location_overrides.csv'
      - 'outputs/openalex_unique_authors.csv'
      - 'outputs/openalex_paper_authors.csv'
      - 'outputs/namsor_enrichment.csv'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5'

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("tidyverse", "jsonlite", "arrow"),
            repos="https://packagemanager.posit.co/cran/__linux__/jammy/latest")'

      - name: Rebuild Atlas data (GeoJSON + JSON)
        run: Rscript scripts/build_author_atlas.R

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/network_atlas/package-lock.json

      - name: Install frontend deps
        working-directory: frontend/network_atlas
        run: npm ci

      - name: Copy data into frontend public dir
        working-directory: frontend/network_atlas
        run: npm run copy-data

      - name: Build frontend
        working-directory: frontend/network_atlas
        env:
          VITE_STADIA_KEY: ${{ secrets.VITE_STADIA_KEY }}
        run: npm run build

      - name: Commit rebuilt site to docs/network_atlas/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/network_atlas/ outputs/author_atlas/
          if ! git diff --cached --quiet; then
            git commit -m "ci: rebuild Author Atlas [skip ci]"
            git push
          else
            echo "No atlas changes to commit."
          fi
