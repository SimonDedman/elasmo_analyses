name: Deploy Author Atlas

# Rebuilds the v2 Author Atlas frontend on every push to main that
# touches the frontend or the atlas data. Data (GeoJSON + JSON) is
# rebuilt locally via scripts/build_author_atlas.R and committed into
# outputs/author_atlas/ — CI only compiles the React bundle into
# docs/network_atlas/ so the Pages deploy picks it up.
#
# Rationale: the R rebuild needs outputs/literature_review_enriched.parquet
# (23 MB, not tracked) for the per-author year ranges. On CI without
# it, the rebuilt authors.geojson loses year_min/year_max and the
# year-range slider breaks. Keeping the data rebuild local avoids that
# downgrade.
#
# Secret required: VITE_STADIA_KEY (Stadia Maps API key for Stamen tiles).

on:
  push:
    branches: [main]
    paths:
      - 'frontend/network_atlas/**'
      - 'outputs/author_atlas/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/network_atlas/package-lock.json

      - name: Install frontend deps
        working-directory: frontend/network_atlas
        run: npm ci

      - name: Copy data into frontend public dir
        working-directory: frontend/network_atlas
        run: npm run copy-data

      - name: Build frontend
        working-directory: frontend/network_atlas
        env:
          VITE_STADIA_KEY: ${{ secrets.VITE_STADIA_KEY }}
        run: npm run build

      - name: Commit rebuilt site to docs/network_atlas/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/network_atlas/
          if ! git diff --cached --quiet; then
            git commit -m "ci: rebuild Author Atlas [skip ci]"
            git push
          else
            echo "No atlas changes to commit."
          fi
