iformes (~70%). The most abundant taxon identiﬁed from the Chagres Formation, Isistius sp. (N = 272), was not included in the paleobathymetr"}, {"matched_terms": "70%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "living species within this genus or via other fossil occurrences. Carrillo-Briceño et al. (2015a) reported that Isistius (~70% of the Piña Sandstone facies) occurs at depths of 0–3700 m, usually between 0 and 1000 m, based on the extant species"}, {"matched_terms": "15%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "(Isurus oxyrinchus, Alopias superciliosus, Alopias cf. A. vulpinus, Carcharhinus falciformis, Carcharhinus obscurus, and Sphyrna lewini), comprising 15% of the chondrichthyan fauna, that have depth ranges beyond the neritic zone (Table 3). The presen"}]}, {"name": "imp_reproduction", "triggered": false, "evidence": []}, {"name": "imp_size_structure", "triggered": false, "evidence": []}, {"name": "imp_social", "triggered": false, "evidence": []}, {"name": "imp_trophic", "triggered": false, "evidence": []}]}, "gear_": {"columns": [{"name": "gear_artisanal", "triggered": false, "evidence": []}, {"name": "gear_demersal", "triggered": false, "evidence": []}, {"name": "gear_dredge", "triggered": false, "evidence": []}, {"name": "gear_gillnet", "triggered": false, "evidence": []}, {"name": "gear_harpoon", "triggered": false, "evidence": []}, {"name": "gear_hook_line", "triggered": false, "evidence": []}, {"name": "gear_longline", "triggered": false, "evidence": [{"matched_terms": "longline(1)", "section": "METHODS", "total_freq": "1", "threshold": "2", "context": "...ts and Bedford, 1993), as well as temperature and occurrence data inferred from longline records in the Atlantic (Hoey, 1983), suggest that Isurus oxyrinchus has a pref..."}]}, {"name": "gear_mit_brd", "triggered": false, "evidence": []}, {"name": "gear_mit_circle_hook", "triggered": false, "evidence": []}, {"name": "gear_mit_deter
