h control sets. However, they also found significa"}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". 2019). Gear deployment. Deploying gear before sunrise to reduce daylight hook soak duration may reduce sea turtle bycatch in longline fisheries (FAO 2009). In the western North Pacific, a study that compared bycatch rates on hooks retrieved after s"}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "studies suggest that modifying time of day and soak duration during daylight could be explored as options for reducing sea turtle bycatch in longline fisheries. Sea surface temperature (SST) is a major driver that influences sea turtle distribution, "}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "available and may be useful to fishers and resource managers in making real-time decisions to reduce sea turtle bycatch in longline fisheries (Howell et al. 2008, 2015). This idea for real-time management has also gained considerable traction recentl"}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "underway to expand species’ predicted locations into applied management.  3.1.3. Seabirds Seabirds can become hooked or entangled in longline gear while foraging on bait or offal discard and subsequently drown as gear is deployed or retrieved. Many s"}, {"matched_terms": "hawaii", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "been shown to be effective bycatch reduction strategies are discussed in ACAP (2016 a,b,c), while recent measures considered by fishermen, but yet to be fully tested, to address increasing seabird bycatch in the Hawaii longline fisheries are discusse"}, {"matched_terms": "regional", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "fully tested, to address increasin
