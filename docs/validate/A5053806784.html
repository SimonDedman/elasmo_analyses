5b) indicated that oceanographic factors inﬂuence the behaviour of surface longlines, being able to grossly deform the longline shape, reducing the ﬁshing depth of the hooks. In the case of multiﬁlament longlines, thes"}, {"matched_terms": "multiﬁlament", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". (2006) and Ward and Myers (2005b) indicated that oceanographic factors inﬂuence the behaviour of surface longlines, being able to grossly deform the longline shape, reducing the ﬁshing depth of the hooks. In the case of multiﬁlament longlines, thes"}, {"matched_terms": "multiﬁlament", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". This was conﬁrmed when determining an inverse relationship between wind speed and the set depth in the multiﬁlament system. This could also explain why the multiﬁlament longline showed elevated catch rates of some species such as A. solandri, C. hi"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "their greater catchability in terms of this shallower-operating ﬁshing gear. On the other hand, surface waves have a mechanical effect  The results obtained showed that the longline type had a signiﬁcant effect on the different groups of species caug"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "The results obtained showed that the longline type had a signiﬁcant effect on the different groups of species caught by the longline swordﬁsh ﬁshery. The total catch rate and, in particular, those of swordﬁsh, were higher with the American system"}, {"matched_terms": "monoﬁlament", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". The total catch rate and, in particular, those of swordﬁsh, were higher with the American system whereas, with the Spanish system, a greater number of sharks were caught. Furthermore, the monoﬁlament longl
