ontext": "The sandbar ventricle (Mv = 0.07 % of body mass; 85 % spongy myocardium) is a relatively well-perfused organ that receives 3 % of cardiac output via the coronary circulation. Baseline CBF is estimated to supply of 1.6 μmol O2 min−1 g−1, assuming arte"}, {"matched_terms": "4 %", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "oxygen from the venous blood. Based on in vitro measurements of myocardial oxygen consumption for teleost fishes, spongy hearts use an estimated <4 % of the available oxygen in the luminal supply (Farrell et al. 1985; Farrell 1987; Davie and Farrell "}, {"matched_terms": "3 %", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "also show that the interaction between CBF and heart rate can clearly overcome the effect of extravascular compression on the coronary circulation. With ~3 % of total cardiac output being directed to the myocardium in sandbar sharks, we suggest that "}, {"matched_terms": "P < 0.001", "section": "p-value", "total_freq": "1", "threshold": "1", "context": "intra-individual variation in cardiovascular variables, we show that coronary blood flow is directly related to heart rate (R2 = 0.6; P < 0.001), as it is in mammalian hearts. Communicated by I. D. Hume. * Georgina K. Cox cox@zoology.ubc.ca 1  Depart"}, {"matched_terms": "P = 0.01", "section": "p-value", "total_freq": "1", "threshold": "1", "context": "volume, ventral aortic pressure, or CPO (Fig. 3). The 3.5-fold variation in individual CBF values was determined primarily by coronary resistance (R2 = 0.90; P = 0.01), which in turn was inversely related to heart rate (R2 = 0.76; P = 0.02) (Fig. 4)."}, {"matched_terms": "P = 0.02", "section": "p-value", "total_freq": "1", "threshold": "1", "context": "variation in individual CBF values was determined primarily by coronary resistance (R2 = 0.90; P = 0.01), which in turn was inversely related to heart rate (R2 = 0.76; P = 0.02) (Fig. 4). As a result, the linear relationship between heart rate and CB"}, {"matched_terms": "P = 0.06", "section": "p-value", "total_freq": "1", "threshold": "1", "context": ".76; P = 0.02) (Fig. 4). As a result, the linear relationship between heart rate and CBF approached statistical significance (P = 0.06) and explained 60 % of the individual variability (R2 = 0.6) (Fig. 3b). Notably, %CBF was significantly higher in i"}, {"matched_terms": "P = 0.016", "section": "p-value", "total_freq": "1", "threshold": "1", "context": "and explained 60 % of the individual variability (R2 = 0.6) (Fig. 3b). Notably, %CBF was significantly higher in individuals with higher baseline heart rates (R2 = 0.8, P = 0.016, Fig. 3b insert). Therefore, heart rate variability, through its effect"}, {"matched_terms": "P < 0.001", "section": "p-value", "total_freq": "1", "threshold": "1", "context": "all heart rates and the pharmacological changes described below. The proportion of the cardiac cycle spent in systole significantly increased with heart rate (R2 = 0.5, P < 0.001) as expected, yet CBF was related to heart rate. Again, coronary resist"}, {"matched_terms": "P < 0.001", "section": "p-value", "total_freq": "1", "threshold": "1", "context": "between baseline CBF and the other cardiovascular variables to include the peak responses to ACh and AD (Figs. 5, 6) and found a significant positive relationship (P < 0.001) that explained 60 % of the variability between heart rate and CBF (Fig. 5b)"}, {"matched_terms": "P = 0.01", "section": "p-value", "total_freq": "1", "threshold": "1", "context": "present study, by pharmacologically modifying cardiovascular status, as well as utilizing the resulting variations in CPO and CBF within individual sandbar sharks, we detected a weak, albeit significant (R2 = 0.12; P = 0.01) relationship between CPO "}, {"matched_terms": "1.60 ± 0.41 kg", "section": "mean±error", "total_freq": "1", "threshold": "1", "context": "Committees at College of William and Mary and the University of British Colu
