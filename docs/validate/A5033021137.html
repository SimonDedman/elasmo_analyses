al for the effective management of such ﬁsheries. © 2011 E"}, {"matched_terms": "introduction", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "investigation into the physiological response of elasmobranchs to longline capture is vital for the effective management of such ﬁsheries. © 2011 Elsevier Inc. All rights reserved.  1. Introduction Longline ﬁshing is thought to be the predominant met"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "Longline ﬁshing is thought to be the predominant method of commercial capture for sharks (Beerkircher et al., 2002; Lewison et al., 2004; Gilman et al., 2008). In the majority of longline ﬁsheries all or part of the shark is harvested, however, in so"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ".1016/j.cbpa.2011.04.012  (Wikelski and Cooke, 2006; Cooke and O'Connor, 2010). Documenting the physiological consequences of longline capture in sharks is a vital undertaking for effective ﬁsheries management because it can provide insights into the"}, {"matched_terms": "and", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "research to date has focused on the physiological effects of recreational rod and reel capture (e.g. Heberer et al., 2010), however, the effects of both gillnet (e.g. Frick et al., 2010) and trawl capture (Mandelman and Farrington, 2007) have also be"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "type (Skomal and Bernal, 2010). Despite being the most common capture method for sharks, the physiological consequences of longline capture have received very little attention, with only four published studies to date (Moyes et al., 2006; Hight et al"}, {"matched_terms": "on", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "variation in the stress response in sharks, likely associated with differences in metabolic scope (Mandelman and Skomal, 2009). However, the response to capture has yet to be assessed for the majority of species commonly captured on longlines. This i"}, {"matched_terms": "by", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". Although ﬁsheries data pertaining to the Caribbean reef shark are sparse, there are indications that it is commonly captured by longline ﬁsheries throughout its range (Amorim et al., 1998; Arocha et al., 2002; Rosa et al., 2006). In the United Stat"}, {"matched_terms": "set", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "., 2006). In the United States, it is a prohibited species, which is commonly captured and subsequently released in the bottom set longline ﬁshery off the Florida Keys (Morgan et al., 2009). Despite its abundance and common interactions with ﬁsheries"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". Thus, the aim of this project was to quantify and characterise physiological disturbances induced by varying duration of longline capture in the Caribbean reef shark. 2. Methods This study was conducted between 9th June and 1st October 2009, at the"}, {"matched_terms": "water", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "the Study of Animal Behaviour and the Animal Behaviour Society (Rollin and Kessel, 1998). 2.1. Animal collection and sampling structure Stationary, mid-water longlines, 500 m in length with 25 baited gangions, were set in 15–30 m of water for up to 8"}, {"matched_terms": "by", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "formed data, not the Box–Cox transformed data used for statistical analysis. 3. Results Between June and October 2009, a total of 40 Caribbean reef sharks were sampled: 37 by longline with hook durations ranging from 14 to 244 min (x = 115 min, ±11.5"}, {"matched_terms": "both", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "from 14 to 244 min (x = 115 min, ±11.5 S.E.), and three underwatersampled control animals. Sea surface temperatures for both longline-sampled and control animals ranged from 26.3 °C–29.3 °C (x = 28.2 °C ± 0.2 S.E.). Signiﬁcant second-order quadratic "}, {"matched_terms": "by", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". 2C–F). 4. Discussion The goals of this study were to quantify and characterise the physiological perturbation induced by longline capture in the Caribbean reef shark, the results of which suggest a non-linear (parabolic) response of a number of blo"}, {"matched_terms": "for", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "(Skomal, 2007; Mandelman and Skomal, 2009). However, the results of the current study indicate that this might not be the case for longline-captured Caribbean reef sharks as sharks subjected to maximal and minimal hook durations exhibited the least d"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "blood chemistry across all parameters with statistically signiﬁcant trends. This result can potentially be attributed to the characteristics of the longline capture experience, which, when compared to other elasmobranch capture techniques, are relati"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". / Comparative Biochemistry and Physiology, Part A 162 (2012) 94–100  97  Fig. 1. The stress response of the Caribbean reef shark in response to longline capture. Data represent the relationships between hook duration and the physiological response "}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "Based on the apparently parabolic response of many blood parameters to hook duration, one hypothesis is that the Caribbean reef shark responds to longline capture with an initial energetic  escape response (high anaerobic muscular activity) to the ac"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "of hooking, followed by a period of reduced activity associated with a concomitant attenuation of the secondary stress response. The allostatic overload associated with the initial stress of longline hooking is designed to increase ﬁtness and the cap"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". / Comparative Biochemistry and Physiology, Part A 162 (2012) 94–100  Fig. 2. The stress response of the Caribbean reef shark in response to longline capture. Data represent the relationships between hook duration and the physiological response vari"}, {"matched_terms": "and", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "blood acidosis has been reported in many other elasmobranchs subjected to hook and line (Cliff and Thurman, 1984; Hoffmayer and Parsons, 2001) and longline (Mandelman and Skomal, 2009) capture. This acidosis is thought to be driven by elevated levels"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "that burst exercise might have ceased early in the capture event. The Caribbean reef shark ranks as a species more resilient to longline capture than several others assessed to date. Mandelman and Skomal (2009) ranked the relative resilience of ﬁve s"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "Skomal (2009) ranked the relative resilience of ﬁve species of carcharhinid sharks according to the level of blood acid–base perturbation at the time of longline capture, the characteristics of which are comparable to the current study in terms of ga"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "resilient species assessed to date. The apparently non-linear relationship between physiological stress and hook duration is likely unique to longline capture due to its relatively benign characteristics when compared to other common capture techniqu"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "exacerbate and, thus, potentially mask the effects of the capture event (Frick et al., 2009; Frick et al., 2010). Further investigation of the physiological effects of longline capture in elasmobranchs can help develop protocols to reduce at-vessel-m"}, {"matched_terms": "elasmobranch", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "develop protocols to reduce at-vessel-mortality and promote post release survivorship, contributing to the effective management of elasmobranch longline ﬁsheries on a global scale."}]}, {"name": "gear_trap", "triggered": false, "evidence": []}, {"name": "gear_trawl", "triggered": false, "evidence": [{"matched_terms": "trawl(2)", "section": "INTRODUCTION", "total_freq": "0", "threshold": "2", "context": "...al., 2010), however, the effects of both gillnet (e.g. Frick et al., 2010) and trawl capture (Mandelman and Farrington, 2007) have also been quantiﬁed. In those stu..."}]}, {"name": "gear_trawl_beam", "triggered": false, "evidence": []}, {"name": "gear_trawl_otter", "triggered": false, "evidence": []}]}, "ob_": {"columns": [{"name": "ob_arctic_ocean", "triggered": false, "evidence": []}, {"name": "ob_baltic_sea", "triggered": false, "evidence": []}, {"name": "ob_indian_ocean", "triggered": false, "evidence": []}, {"name": "ob_mediterranean_black_sea", "triggered": false, "evidence": []}, {"name": "ob_north_atlantic_ocean", "triggered": false, "evidence": []}, {"name": "ob_north_pacific_ocean", "triggered": false, "evidence": []},
