ear evidence of ecosystem changes due to fishing, the main target species, A. foliacea and P. martia, had a high resilience to trawling activities. Setting up trawling lanes as a management option would likely minimise negative impacts on species w"}, {"matched_terms": "up", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "clear evidence of ecosystem changes due to fishing, the main target species, A. foliacea and P. martia, had a high resilience to trawling activities. Setting up trawling lanes as a management option would likely minimise negative impacts on species w"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "KEY WORDS: Strait of Sicily · Fishing impacts · Trawl surveys · Mediterranean · Demersal resources · Red shrimp Resale or republication not permitted without written consent of the publisher  INTRODUCTION Bottom trawling can have dramatic effects on "}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "1992). These decapods are not only detritivores or scavengers, but also highly size-selective predators (Cartes 1993). Bottom trawling at depths ranging from 50 to 800 m is an important component of many Mediterranean fisheries (Papaconstantinou & Fa"}, {"matched_terms": "important", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "mix of fish (teleosts and elasmobranchs), cephalopods and crustaceans (decapods and stomatopods), together with several macroepibenthic invertebrates (Caddy 1993, Relini et al. 1999). One of the most important trawl fisheries in the Mediterranean is "}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". These shrimps are fished with gear that has a cod-end mesh size of 24 to 26 mm. In the deep Mediterranean, few studies have examined the effects of bottom trawling on
