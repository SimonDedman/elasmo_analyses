r studies found a significant increase in catches of sharks, mainly blue sharks, with circle hooks (Wat"}, {"matched_terms": "style", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "leader and escape before being hauled on board. Although this could account for the increased shark catch rates recorded in American-style longline using circle hooks, this idea is unlikely to apply to the Spanish-style longline where the leader cons"}, {"matched_terms": "style", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "increased shark catch rates recorded in American-style longline using circle hooks, this idea is unlikely to apply to the Spanish-style longline where the leader consists of three twisted wire threads used to avoid shark loss. SEA TURTLES  The highes"}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "of three twisted wire threads used to avoid shark loss. SEA TURTLES  The highest values of loggerhead catch per unit effort in longline fisheries in the southwestern Atlantic occur over the Uruguayan continental slope (Pons et al. 2009, 2010). The ge"}, {"matched_terms": "style", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". The gear is a significant factor that affects the catch rates observed in this area for this species. Specifically, vessels that use American-style longline have higher catch rates of loggerheads than those that use Spanish-style longline (Pons et "}, {"matched_terms": "style", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". Specifically, vessels that use American-style longline have higher catch rates of loggerheads than those that use Spanish-style longline (Pons et al. 2010). We observed a non-significant reduction of loggerhead bycatch with the use of circle hooks "}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold
