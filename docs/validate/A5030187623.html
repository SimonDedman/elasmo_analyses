e both demonstrated high sensitivity to model inputs, such as estimates of longline fishing depth (Goodyear, 2003; Lynch et al., 2012). For fisheries stock assessments of Atlantic HMS, we are u"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": ". Here, we accounted for temperature regimes in the application of delta-GLMs (some of which included mixed effects; i.e. delta-GLMMs) to fisher logbook data from the US pelagic longline fishery (USLL). These analyses resulted in new abundance trends"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "abundance trends for 34 HMS (Table 1) in the Atlantic Ocean. For comparison, we also analysed data collected by scientific observers aboard pelagic longline fishing vessels (US Pelagic Longline Observer Program). In general, relative abundance trends"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "abundance trends for 34 HMS (Table 1) in the Atlantic Ocean. For comparison, we also analysed data collected by scientific observers aboard pelagic longline fishing vessels (US Pelagic Longline Observer Program). In general, relative abundance trends"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "Atlantic highly migratory species relative abundance  Table 1. Species for which abundance trends were generated using ﬁsher logbook and pelagic longline observer program data from the USLL. Speciesa Swordﬁsh, Xiphias gladius Yellowﬁn tuna, Thunnus a"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". We use “HMS” and “species” throughout to collectively refer to individual species and species groups.  Figure 1. Map of the distribution of longline sets (total number per cell) between 1987 and 2010 for the USLL in the northwest Atlantic Ocea
