fects of bottom trawling on demersal resources. This is mainly due to the large depth range targeted by demer"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "range targeted by demersal fisheries and the zonation of demersal assemblages with depth, both factors making it more difficult to address the effects of trawling. The few studies undertaken to date deal with the impact of trawling on the demersal ec"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "range targeted by demersal fisheries and the zonation of demersal assemblages with depth, both factors making it more difficult to address the effects of trawling. The few studies undertaken to date deal with the impact of trawling on the demersal ec"}, {"matched_terms": "from", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". 2006) and of the deep slope (Papaconstantinou & Kapiris 2003, D’Onghia et al. 2005). Although there are also a number of studies on discards from trawling activities (Sartor et al. 1999, Sánchez et al. 2007), to date there are no studies for the de"}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". 2007), to date there are no studies for the deep-slope demersal resources of the Mediterranean which compare populations and communities in trawled and non-trawled sites based on detailed data on fishing effort. Some existing studies have compared "}, {"matched_terms": "water", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "intensities, but none has provided quantitative data on the fishing effort in the sites compared. Furthermore, the deep-water trawl fishery for red shrimps can be considered as ‘monospecific’ (with either of the 2 red shrimp species being dominant in"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0",
