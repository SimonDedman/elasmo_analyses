", "context": "their lipid composition. Phospholipids were the dominant class of lipids among all fish species and varied between 65% and 94% of total fat content. The muscle of the bony species—roughhead grenadier and mora—contained more free fatty acids and less "}, {"matched_terms": "48%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "The results demonstrated that a significant part of the fatty acids in the muscle was polyunsaturated fatty acids (PUFA). The content of PUFA varied from 48% to 63% of total fat content among the different species examined. The fatty acid composition"}, {"matched_terms": "63%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "The results demonstrated that a significant part of the fatty acids in the muscle was polyunsaturated fatty acids (PUFA). The content of PUFA varied from 48% to 63% of total fat content among the different species examined. The fatty acid composition"}, {"matched_terms": "85%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Among the n-6 fatty acids, arachidonic acid (20:4n-6) was the dominant fatty acid for all the species examined. The n-3 FAs (DHA and EPA) accounted for between 85% and 88% of the PUFAs, of which DHA and EPA were the most abundant. DHA accounted for"}, {"matched_terms": "88%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Among the n-6 fatty acids, arachidonic acid (20:4n-6) was the dominant fatty acid for all the species examined. The n-3 FAs (DHA and EPA) accounted for between 85% and 88% of the PUFAs, of which DHA and EPA were the most abundant. DHA accounted for"}, {"matched_terms": "53%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "The n-3 FAs (DHA and EPA) accounted for between 85% and 88% of the PUFAs, of which DHA and EPA were the most abundant. DHA accounted for 53% to 73% of the PUFAs, and the muscles from elasmobranchs had the highest content
