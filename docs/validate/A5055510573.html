lian tuna longline fleet were mainly caught between the size interval of 120–240 cm TL (Fig. 6)."}, {"matched_terms": "tuna", "section": "accepted", "total_freq": "1", "threshold": "1", "context": "Rev Fish Biol Fisheries Fig. 5 Longline catch per unit effort (CPUE individuals per 1,000 hooks) of the Brazilian chartered tuna longline fleet for the main elasmobranch species: blue shark (BSH), thresher shark (THR), silky shark (FAL), oceanic whit"}, {"matched_terms": "most", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ".05), and was not significantly different between sexes for the other species (Table 1).  Discussion Sharks are quite common in the high seas and are caught in most longline fishing operations targeting tunas and swordfish (e.g. Baum et al. 2003; Car"}, {"matched_terms": "tuna", "section": "accepted", "total_freq": "1", "threshold": "1", "context": ". 6 Length distribution (total length) of a blue shark (BSH), b oceanic whitetip shark (OCS), c silky shark (FAL) and d mako shark (MAK) captured by the Brazilian tuna longline fleet. Black arrows indicate the length at first maturity  over the world"}, {"matched_terms": "tuna", "section": "accepted", "total_freq": "1", "threshold": "1", "context": "Gall 1975), with sharks having always accounted for an important part of the bycatch (Hazin et al. 1998). The total landings of elasmobranchs caught in association with tuna longline fisheries in Brazil have fluctuated around 3,000 t in the last 10 y"}, {"matched_terms": "tuna", "section": "accepted", "total_freq": "1", "threshold": "1", "context": "species [blue shark (BSH), silky shark (FAL), mako shark (MAK), and oceanic whitetip shark (OCS)] caught by Brazilian  tuna longline fishery in the western Atlantic Ocean. Note the different legends for each panel  Table 1 Sex ratio of the main shark"}, {"matched_terms": "tuna", "section": "accepted", "total_freq": "1", "threshold": "1", "context": "Table 1 Sex ratio of the main shar
