ment (Table 2). Total NEFA concentration was approximately 110 μmol L− 1 in control "}, {"matched_terms": "40%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ".6% ration treatment (Table 2). Total NEFA concentration was approximately 110 μmol L− 1 in control dogﬁsh and fell signiﬁcantly by about 40% right from 6 h through 48 h post-feeding. 4. Discussion In general, the short term changes in plasma metabol"}, {"matched_terms": "2.6%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "Table 2 Changes in plasma nonesteriﬁed fatty acid (NEFA) concentrations (μmol L− 1) in Squalus acanthias following meals of 2.6% body weight (means ± 1 SEM, N = 3).  signiﬁcant at 60 h, though there was a transient partial rebound at 30 h. By 5–9 day"}, {"matched_terms": "3.2%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "which renders the branchial membranes unusually impermeable to urea (Pärt et al., 1998; Fines et al., 2001). Kajimura et al. (2006) calculated that if a typical meal in the wild is 3.2% of body mass, dogﬁsh must feed every 5–6 days just to maintain N"}, {"matched_terms": "2.6%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "Andersen, 1985) increased 1.6 fold. At the same time, the rate of urea excretion to the environment did not change in the 2.6% ration treatment (Kajimura et al., 2006), and actually fell signiﬁcantly (by 39%, integrated over 48 h) in the 5.5% ration "}, {"matched_terms": "39%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "excretion to the environment did not change in the 2.6% ration treatment (Kajimura et al., 2006), and actually fell signiﬁcantly (by 39%, integrated over 48 h) in the 5.5% ration treatment (Wood et al., 2007a). As plasma urea concentration rises, but"}, {"matched_terms": "5.5%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "excretion to the environment did not change
