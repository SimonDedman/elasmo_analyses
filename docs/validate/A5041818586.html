etected in 8-month, but not 4month, embryos. It is n"}, {"matched_terms": "19%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". It is not clear why the rate of ammonia excretion was below the level of detection very early in development. Ammonia excretion constitutes approximately 19% of total nitrogen excretion in the adult little skate (Goldstein and Forster, 1971), which"}, {"matched_terms": "66%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "19% of total nitrogen excretion in the adult little skate (Goldstein and Forster, 1971), which is lower than values obtained for 8-month embryos in the present study (up to 66%). Clearly, there are a number of ontogenic changes in nitrogen metabolism"}, {"matched_terms": "P<0.05", "section": "p-value", "total_freq": "1", "threshold": "1", "context": ". A Tukey test was applied if significant differences were detected between control and 75% seawater exposed animals. Statistical significance in all tests was declared at P<0.05. Due to the limited number of embryos available for these experiments, "}, {"matched_terms": "P<0.05", "section": "p-value", "total_freq": "1", "threshold": "1", "context": ".67 (3)  83.3±0.27 (4)* 51.2±2.43 (3)*  Values are means ± S.E.M. (N). *Significantly different from control (100% SW) value (P<0.05).  (betaine, creatine, sarcosine and β-alanine, with the latter rising the most) increased (3- to 12-fold) from 4 to "}, {"matched_terms": "P<0.05", "section": "p-value", "total_freq": "1", "threshold": "1", "context": ".; N=4 except for 8-month yolk in 100% SW (N=3). BLD, below level of detection. *Significant difference within a developmental stage between different tissue types (P<0.05). †Significant difference between stages for the same tissue type (P<0.05). ‡S"}, {"matched_terms": "P<0.05", "section": "p-value", "total_freq": "1", "threshold": "1", "context": "*Significant difference within a developmental stage between different tissue ty
