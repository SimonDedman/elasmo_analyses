imize any effects of gear selectivity, although some variation occurred. All ﬁshing gears consisted of a bottom otter trawl design, with the horizontal opening of the net averaging 24."}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "Substrate data was extracted from the European Marine Observation Data Network (EMODnet) Seabed Habitats project  TABLE 1 Number of hauls analyzed onboard of commercial bottom trawlers per season and depth strata (shelf, 50-200 m deep; upper slope, 2"}, {"matched_terms": "each", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "extracted monthly sea bottom temperature estimates for the study area from 50 to 800 m deep and we matched the values with each trawl haul, yielding values ranging from 12.9 to 16.6 °C. The ﬁshing-related variables included mé tier and ﬁshing effort"}, {"matched_terms": "hours", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "which uses automatic identiﬁcation system (AIS) data to identify and track ﬁshing vessels. The apparent effort was calculated as the number of hours trawled within each squared kilometer of the study area for the 2019-2022 period. The time period sel"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "differently at different depths. We also included an interaction term between ﬁshing effort and substrate to account for indirect effects of trawling in relation to different substrates (Collie et al., 2017). In addition, we considered F/V (20 levels"}, {"matched_terms": "all", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". licha also occurred predominantly in this range in low abundance levels (Table 4; Supplementary Table S1). The overall density of chondrichthyan specimens, including all trawls regardless of whether they captured any chondrichthyans, was 252 ± 298
