eshold": "1", "context": ". The sharks needed on average 18.25 ± 6.69 sessions to complete the ﬁrst training phase successfully (Table 1). They needed on average 14.98 ± 7.91 s per trial to make a decision. Phases 2–5. The sharks needed on average 9.75 ± 5.04 sessions to disc"}, {"matched_terms": "9.75 ± 5.04 sessions", "section": "mean±error", "total_freq": "1", "threshold": "1", "context": "to complete the ﬁrst training phase successfully (Table 1). They needed on average 14.98 ± 7.91 s per trial to make a decision. Phases 2–5. The sharks needed on average 9.75 ± 5.04 sessions to discriminate a square from a small triangle (phase 2; Tab"}, {"matched_terms": "10.83 ± 8.11 sessions", "section": "mean±error", "total_freq": "1", "threshold": "1", "context": "trial times increased signiﬁcantly for ﬁve individuals as well as for the group (Mann–Whitney U-test: ZGroup = –4.005, pGroup < 0.001; Table 2). The sharks needed on average 10.83 ± 8.11 sessions to discriminate a square from a large triangle (phase "}, {"matched_terms": "10.14 ± 6.49\nsessions", "section": "mean±error", "total_freq": "1", "threshold": "1", "context": ".001; Table 2) and the group (Mann–Whitney U-test: ZGroup = 4.962, pGroup < 0.001; Table 2). The sharks needed on average 10.14 ± 6.49 sessions to discriminate a square from a circle (phase 4; Table 1). One shark (shark 6) was not able to reach the l"}, {"matched_terms": "10.28 ± 6.87\nsessions", "section": "mean±error", "total_freq": "1", "threshold": "1", "context": ".005; Table 2) and did not differ signiﬁcantly for the group (Mann–Whitney U-test: ZGroup = −0.766, pGroup = 0.444; Table 2). The sharks needed on average 10.28 ± 6.87 sessions to discriminate a square from a rhomboid (phase 5; Table 1). One shark (s"}, {"matched_terms": "18.25 ± 6.69 sessions", "section": "mean±error", "total_freq": "1", "threshold": "1", "context": "and reversal learning in eight juvenile gray bamboo sharks (C. griseum) using ﬁve 2D stimulus pairs. The sharks needed
