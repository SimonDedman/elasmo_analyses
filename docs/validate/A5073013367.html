tal_freq": "0", "threshold": "1", "context": "Prey detection Beam trawl  a b s t r a c t Pulse ﬁshing may pose a promising alternative for diminishing the ecosystem effects of beam trawling. However, concerns about the impact on both target and non-target species still remain, amongst others the"}, {"matched_terms": "pulse", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "concerns about the impact on both target and non-target species still remain, amongst others the possible damage to the electro-receptor organs, the Ampullae of Lorenzini, of elasmobranchs. The current study aimed to examine the role of pulsed direct"}, {"matched_terms": "pulse", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "the laboratory circumstances as adopted in this study, the small-spotted catshark are still able to detect the bioelectrical ﬁeld of a prey following exposure to PDC used in pulse trawls. However, to fully grasp the impact of PDC on elasmobranchs, fu"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". All rights reserved.  1. Introduction In the North Sea, 90% of all demersal ﬁsh, shell and crustacean landings are caught with bottom trawls (STECF, 2014a). However, this type of ﬁshery elicits well-known disadvantages for the ecosystem including c"}, {"matched_terms": "beam", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". In order to meet the obligations imposed by the CFP and hence increase these ﬁsheries' sustainability, electrical stimulation in ﬁshing gear, beam trawls in particular, is considered a promising alternative resulting in reduced seabed disturbance, "}, {"matched_terms": "beam", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "the EU since 1998, a derogation for the southern North Sea was manifested in 2009 (EU, 1998). Currently, each member state may equip 5% or 10% (the Netherlands) of their beam trawl ﬂeet with pulse gears (EU, 2009, 2013). Consequently, 83 electrotrawl"}, {"matched_terms": "pulse", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". Since 2006 “The international council for the exploration of the sea” (ICES) has urged investigation of the possible effects of pulse trawling on electro sensitive elasmobranchs (sharks, rays and skates) (ICES, 2006a, 2006b). In response to this qu"}, {"matched_terms": "pulse", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "Tricas et al., 1995; Tricas and Sisneros, 2004). The above leads to the research hypothesis that electric signals generated by the pulse trawl may affect the AoL, hence impacting the elasmobranch's individual ﬁtness. Therefore, the intention of the c"}, {"matched_terms": "beam", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "was observed prior to and following exposure to the electric ﬁeld generated by an electrotrawl. 2. Materials and methods 2.1. Animals and housing Fifty-three small-spotted catsharks were collected with beam trawls in the English Channel during commer"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "was again determined in its original behavioural arena during three consecutive days, with the ﬁrst testing performed between 15 and 24 h following exposure to the trawl electrical ﬁeld. Period 1: food response prior to exposure to the electrical pul"}, {"matched_terms": "pulse", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". Overview of an experimental trial divided in two periods wherein the food and electroresponse are recorded during four consecutive observation days. Exposure to a pulse trawl electrical ﬁeld took place on day 0.  two electrodes, opposite the middle"}, {"matched_terms": "pulse", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". They were positioned in a polyethylene netting (58 cm, 15 cm diameter, 1 cm2 mesh size) with a cylindrical proﬁle. Following transfer to the treatment tank, the pulse trawl generator was directly switched on during an exposure period of 5 s. The be"}, {"matched_terms": "pulse", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". The equipment was easily transferred between the seven experimental arenas wherein the dipole was randomly positioned. 2.3.2. Generating the shrimp and ﬂatﬁsh pulse trawl electrical ﬁeld To generate the same heterogeneous pulsed DC electrical ﬁeld "}, {"matched_terms": "pulse", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "ﬁeld surrounding the prey burrowed in the seabed (Tricas and Sisneros, 2004). To our knowledge, this is the ﬁrst study to examine the impact of PDC used in pulse trawls on the electro-detection ability of an elasmobranch. Small spotted catsharks were"}, {"matched_terms": "beam", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "these vulnerable ﬁsh may be affected by increasing occurrences of anthropogenic electric sources in many of the world's coastal, benthic habitats (Gill and Kimber, 2005; Normandeau et al., 2011). In response to questions put forward by ICES regarding"}, {"matched_terms": "pulse", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "., 2011), this may have implications when considering possible interactions with anthropogenic electrical ﬁelds such as underwater power cables (Gill and Taylor, 2001) or indeed pulse trawls. The latter should theoretically repel elasmobranchs away r"}, {"matched_terms": "pulse", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "of 1000 μV m−1 is reduced to 1 μV m−1 over a distance of 100 m. However, as the high frequency (45–80 Hz) electric ﬁeld of the pulse trawl used to ca
