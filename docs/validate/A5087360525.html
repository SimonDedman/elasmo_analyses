 "0", "threshold": "1", "context": "have been previously defined as size 16/0 (minimum width: 4.4 cm) or larger (Clarke 2017). Large circle hooks. In general, 4 hook types are used in pelagic longline fisheries: circle, J, tuna, and teracima. The first 3 are more common and have been r"}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". Numerous studies have identified that the use of circle hooks reduces the incidental capture of sea turtles as well as the likelihood of deep-hookings and presumed mortality in longline gear (Watson et al. 2005, Gilman et al. 2006a, Sales et al. 20"}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "and olive ridley sea turtles were reduced by over 50% when using 16/0 circle hooks compared with the traditional tuna-hooks used in longline fisheries in the Eastern Tropical Pacific. In Costa Rica, an even greater reduction of sea turtle bycatch was"}, {"matched_terms": "managed", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "with 18/0 circle hooks when compared with 16/0 circle hooks (Andraka et al. 2013). After mandatory use of large circle (16/0 or larger) hooks in 2 US-managed longline fisheries in the Pacific and Atlantic oceans, leatherback and loggerhead turtle byc"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "attributed to the use of both large circle hooks (18/0 and 16/0) and limited use of squid bait (Swimmer et al. 2017). This finding is consistent with ecological modeling of longline fisheries observer data from the Western Pacific Ocean that found th"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "bait has been shown to result in lower catch rates and, in many cases, lower incidence of deep-hooking (and presumed mortality) of longline-caught sea turtles (K
