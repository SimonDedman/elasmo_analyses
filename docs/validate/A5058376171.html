el monitoring system (VMS) fishing effort data. The study was conduc"}, {"matched_terms": "medits", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "community level by sampling in trawled and non-trawled sites as determined by vessel monitoring system (VMS) fishing effort data. The study was conducted within the Maltese 25 nautical mile Fisheries Management Zone as part of the ongoing MEDITS traw"}, {"matched_terms": "otter", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". The study was conducted within the Maltese 25 nautical mile Fisheries Management Zone as part of the ongoing MEDITS trawl survey. Samples were collected using an experimental otter trawl net with a cod-end stretched mesh size of 20 mm, from 7 stati"}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". Samples were collected using an experimental otter trawl net with a cod-end stretched mesh size of 20 mm, from 7 stations located in trawled sites (mean depth 616 ± 26 m) and from 7 stations in non-trawled sites (mean depth 556 ± 40 m). Population "}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "located in trawled sites (mean depth 616 ± 26 m) and from 7 stations in non-trawled sites (mean depth 556 ± 40 m). Population and community indicators were compared across the trawled and non-trawled sites. Populations of A. foliacea and Etmopterus s"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Population and community indicators were compared across the trawled and non-trawled sites. Populations of A. foliacea and Etmopterus spinax did not show any differences in biomass between the trawled and non-trawled sites, whereas the biomass of P"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "clear evidence of ecosystem changes due to fishing, the main target species, A. foliacea and P. martia, had a high resilience to trawling activities. Setting up trawling lanes as a management option would likely minimise negative impacts on species w"}, {"matched_terms": "up", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "clear evidence of ecosystem changes due to fishing, the main target species, A. foliacea and P. martia, had a high resilience to trawling activities. Setting up trawling lanes as a management option would likely minimise negative impacts on species w"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "KEY WORDS: Strait of Sicily · Fishing impacts · Trawl surveys · Mediterranean · Demersal resources · Red shrimp Resale or republication not permitted without written consent of the publisher  INTRODUCTION Bottom trawling can have dramatic effects on "}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "1992). These decapods are not only detritivores or scavengers, but also highly size-selective predators (Cartes 1993). Bottom trawling at depths ranging from 50 to 800 m is an important component of many Mediterranean fisheries (Papaconstantinou & Fa"}, {"matched_terms": "important", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "mix of fish (teleosts and elasmobranchs), cephalopods and crustaceans (decapods and stomatopods), together with several macroepibenthic invertebrates (Caddy 1993, Relini et al. 1999). One of the most important trawl fisheries in the Mediterranean is "}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". These shrimps are fished with gear that has a cod-end mesh size of 24 to 26 mm. In the deep Mediterranean, few studies have examined the effects of bottom trawling on demersal resources. This is mainly due to the large depth range targeted by demer"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "range targeted by demersal fisheries and the zonation of demersal assemblages with depth, both factors making it more difficult to address the effects of trawling. The few studies undertaken to date deal with the impact of trawling on the demersal ec"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "range targeted by demersal fisheries and the zonation of demersal assemblages with depth, both factors making it more difficult to address the effects of trawling. The few studies undertaken to date deal with the impact of trawling on the demersal ec"}, {"matched_terms": "from", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". 2006) and of the deep slope (Papaconstantinou & Kapiris 2003, D’Onghia et al. 2005). Although there are also a number of studies on discards from trawling activities (Sartor et al. 1999, Sánchez et al. 2007), to date there are no studies for the de"}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". 2007), to date there are no studies for the deep-slope demersal resources of the Mediterranean which compare populations and communities in trawled and non-trawled sites based on detailed data on fishing effort. Some existing studies have compared "}, {"matched_terms": "water", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "intensities, but none has provided quantitative data on the fishing effort in the sites compared. Furthermore, the deep-water trawl fishery for red shrimps can be considered as ‘monospecific’ (with either of the 2 red shrimp species being dominant in"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ".
