mann et al., 2019). While longlines offer higher selectivity over gillnets or bottom trawls (Connolly and Kelly, 1996), as a passive gear it attracts individuals responding to bait stimulus; i.e., "}, {"matched_terms": "on", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "., larger-bodied individuals of carnivo­ rous species (Løkkeborg and Bjordal, 1992). As a result, sharks are one of the main bycatch on longlines, including in deep-water (Fauconnet et al., 2019b; Machete et al., 2011), and are often deemed difficult"}, {"matched_terms": "on", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "., 2011), and are often deemed difficult to avoid by fishers (Fauconnet et al., 2019a). Numerous selectivity exper­ iments have been conducted on longline fisheries, testing different de­ vices to reduce bycatch of unwanted species including pelagic "}, {"matched_terms": "local", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ".org/licenses/by/4.0/).  \fL. Fauconnet et al.  Fisheries Research 270 (2024) 106877  (Fauconnet et al., 2019b), the most important local fishery when considering fleet size, number of fishers and landed value (Carvalho et al., 2011). This context pro"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "hook type (circle versus J-hooks) affects the catchability and the survival potential (measured by the hooking position, and the overall condition) of deep-water sharks bycaught in bottom longline fisheries.  2011; Favaro and Côté, 2013; Hannan et "}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "2011; Favaro and Côté, 2013; Hannan et al., 2013). In comparison, only few preliminary studies have addressed bycatch avoidance of deep-water sharks in longline fisheries. One tested the effect of distance of the gear above seafloor (Coe
