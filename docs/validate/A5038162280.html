on of these factors could explain the vulnerability of blue sharks to be captured by pelagic longline fisheries in the Azores. Although there is some discrepancy among studies, in general, shark species "}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "risk of being caught with circle hooks than J-shaped hooks, especially P. glauca, the dominant elasmobranch species caught in many open ocean pelagic longline fisheries [61–64]. In the present study, blue shark catches increased between 17% and 46% ("}, {"matched_terms": "tuna", "section": "accepted", "total_freq": "1", "threshold": "1", "context": "relative to traditional J-hooks. On the other hand, [65] verified a reduction in blue shark captures with circle hooks in the Hawaii-based tuna longline fishery and [28, 56] found no statistical differences between the hook types (circle and traditio"}, {"matched_terms": "sea", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". On the other hand, [65] verified a reduction in blue shark captures with circle hooks in the Hawaii-based tuna longline fishery and [28, 56] found no statistical differences between the hook types (circle and traditional) used to catch blue shark i"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "PLOS ONE | https://doi.org/10.1371/journal.pone.0292727 October 19, 2023  14 / 22  \fPLOS ONE  Gear modifications in a North Atlantic pelagic longline fishery  loggerhead turtles, respectively, when compared to J (Mustad 9/0). Several longline fishery"}, {"matched_terms": "several", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "Gear modifications in a North Atlantic pelagic longline fishery  loggerhead turtles, respectively, when compared to J (Mustad 9/0). Several longline fishery trials evaluating the effect of gear modification on catch rates found similar results fo
