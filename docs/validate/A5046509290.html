ord events accurately. The assumption that sharks were the depredating taxa has mini"}, {"matched_terms": "trolling", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "incidents of depredation from other taxa (which fishers suggested made up <1% of depredation incidents) were removed, the shark depredation rates recorded would still fall within the error ranges given. The current study of depredation rates in a com"}, {"matched_terms": "commercial", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". The current study of depredation rates in a commercial trolling fishery expands on the existing literature, which has focussed on commercial longline or recreational line fisheries, and provides a basis for future studies of depredation in other co"}, {"matched_terms": "trolling", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "2010, Collin 2012, Chapuis et al. 2019). The importance and trend of increasing depredation with in-  \fCarmody et al.: Shark depredation in a trolling fishery  creasing commercial fishing effort and proximity to town centre in Zones 1 and 2 suggest t"}, {"matched_terms": "for", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "depredation rates observed in this study is consistent with actual patterns of fishing effort. In turn this may provide information for fishery managers as to how they can best reduce depredation, for example by reducing the spatial and/or temporal c"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". In the current study, we found a trend of increasing depredation from 2006 to 2018 in the central and southern areas of the fishery (Zones 2 and 3), where rates were estimated to have almost doubled in both zones. This trend is supported only parti"}, {"matched_terms": "trolling", "section": "rejected:unknown", "total_freq": "0", "thre
