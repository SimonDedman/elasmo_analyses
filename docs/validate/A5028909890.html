 "prawn", "section": "accepted", "total_freq": "1", "threshold": "1", "context": ".com/scientificreports  OPEN  Received: 25 July 2018 Accepted: 13 June 2019 Published: xx xx xxxx  Elasmobranch bycatch in the demersal prawn trawl fishery in the Gulf of Papua, Papua New Guinea W. T. White1,2, L. Baje3, C. A. Simpfendorfer4, S. A. A"}, {"matched_terms": "prawn", "section": "accepted", "total_freq": "1", "threshold": "1", "context": ". A. Appleyard1,2, A. Chin E. Rochel5 & G. J. P. Naylor6  4  , B. Sabub3,  The elasmobranch bycatch of the Gulf of Papua Prawn Fishery is investigated in detail for the first time. Fisheries observers collected data on the elasmobranch bycatch from a"}, {"matched_terms": "403", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "The elasmobranch bycatch of the Gulf of Papua Prawn Fishery is investigated in detail for the first time. Fisheries observers collected data on the elasmobranch bycatch from a total of 403 trawl sets (1,273 hrs) in the Gulf of Papua. A total of 40 sp"}, {"matched_terms": "long", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "12 cm disc width stingray to a 350 cm total length sawfish. High mortality rates were recorded (>80%), attributed to the long trawl durations (up to 4 hours). The future inclusion of bycatch reduction devices would likely reduce the number of larger "}, {"matched_terms": "prawn", "section": "accepted", "total_freq": "1", "threshold": "1", "context": ". The future inclusion of bycatch reduction devices would likely reduce the number of larger elasmobranchs being caught, based on evidence from the prawn trawl fisheries of northern Australia, and is being investigated by the PNG National Fisheries A"}, {"matched_terms": "prawn", "section": "accepted", "total_freq": "1", "threshold": "1", "context": ". Although Papua New Guinea (PNG) contributes only about 0.1% to the global tropical prawn catches, it is the only Pacific Island nation with a demersal prawn trawl fishery. Despite its small size, it is one of the most valuable export fisheries for "}, {"matched_terms": "foreign", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". Despite its small size, it is one of the most valuable export fisheries for PNG, earning revenue of ~K10 million (~$3 USD) annually8. No foreign trawl vessels currently operate in PNG waters. The first surveys for prawns in the Gulf of Papua (GoP) "}, {"matched_terms": "prawn", "section": "accepted", "total_freq": "1", "threshold": "1", "context": "The first surveys for prawns in the Gulf of Papua (GoP) were carried out in 1954, while commercial fishing explicitly targeting prawn commenced in 19699,10. The GoP prawn fishery currently extends along the south coast of PNG from the mouth of the Fl"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Map of Papua New Guinea: (a) whole country with yellow box indicating the Gulf of Papua region; (b) Gulf of Papua showing the locations of the trawl sets observed in this study superimposed over the fisheries management zones (1–8) and the extralim"}, {"matched_terms": "for", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "lower catches of giant tiger prawns P. monodon and green tiger prawn P. semisulcatus8. Although an estimated 9,603 km2 of the GoP is considered suitable for trawling, 1,388 km2 receives more than 50% of the total fishing effort (hours of trawling)8. "}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "9,603 km2 of the GoP is considered suitable for trawling, 1,388 km2 receives more than 50% of the total fishing effort (hours of trawling)8. The majority of fishing effort is in Kerema Bay and Orokolo Bay which are around a 20 hr steam from Port More"}, {"matched_terms": "prawn", "section": "accepted", "total_freq": "1", "threshold": "1", "context": ". The majority of fishing effort is in Kerema Bay and Orokolo Bay which are around a 20 hr steam from Port Moresby. The GoP prawn fishery currently is limited to 15 licenses, although only 6 vessels operated in 2014 and 20158 (NFA unpubl. data)"}, {"matched_terms": "prawn", "section": "accepted", "total_freq": "1", "threshold": "1", "context": ". The GoP prawn fishery currently is limited to 15 licenses, although only 6 vessels operated in 2014 and 20158 (NFA unpubl. data). Between 1990 and 2011, the average annual catch of prawns in the GoP prawn fishery was 625.9 mt8. Although there are d"}, {"matched_terms": "prawn", "section": "accepted", "total_freq": "1", "threshold": "1", "context": ". Between 1990 and 2011, the average annual catch of prawns in the GoP prawn fishery was 625.9 mt8. Although there are detailed data on the teleost bycatch in the GoP prawn fishery11, these data included no information on the elasmobranch bycatch. Pr"}, {"matched_terms": "this", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "Although there are detailed data on the teleost bycatch in the GoP prawn fishery11, these data included no information on the elasmobranch bycatch. Prior to the current study, no data existed on the elasmobranch bycatch of this fishery both in terms "}, {"matched_terms": "prawn", "section": "accepted", "total_freq": "1", "threshold": "1", "context": "Between 2014 and 2015, PNG’s National Fisheries Authority (PNG NFA) ran an observer program to investigate the elasmobranch bycatch in the GoP prawn fishery. The current study provides the first detailed investigation of this bycatch in PNG, includin"}, {"matched_terms": "prawn", "section": "accepted", "total_freq": "1", "threshold": "1", "context": ". The major aim of this study was to provide management options to PNG’s NFA relating to the elasmobranch bycatch of GoP prawn fishery based on evidence-based science.  Results  Sampling effort. A total of 7 fishing
