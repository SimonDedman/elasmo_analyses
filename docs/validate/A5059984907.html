oss white shark distribution in the northeast Pacific and southwest Pacific (Oceania"}, {"matched_terms": "from", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "There was higher than average fishing overlap and exposure to longline fishing effort (FEI) across white shark distribution in the northeast Pacific and southwest Pacific (Oceania region). This was principally from longline vessels and to a lesser ex"}, {"matched_terms": "with", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Space use hotspots occurring in shelf and open ocean areas for white sharks in all three regions overlap significantly with longline fishing vessels (Fig. 3b-d). Protection measures for white sharks are in place within Australia, Europe, New Zealan"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "South Africa and U.S.A. EEZs (Supplementary Table 2). For high seas areas where white sharks occur, the high overlap and exposure to longline fishing effort that we observed raises concern about the potential for high incidental bycatch of white shar"}, {"matched_terms": "from", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "sharks occur, the high overlap and exposure to longline fishing effort that we observed raises concern about the potential for high incidental bycatch of white sharks from longliners. However, in the southwest and northeast Pacific and perhaps elsewh"}, {"matched_terms": "tuna", "section": "accepted", "total_freq": "1", "threshold": "1", "context": "concern about the potential for high incidental bycatch of white sharks from longliners. However, in the southwest and northeast Pacific and perhaps elsewhere, captures by the 56  \foceanic fleets of tuna longliners, purse seiners and trawlers are rel"}, {"matched_terms": "and", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context":
