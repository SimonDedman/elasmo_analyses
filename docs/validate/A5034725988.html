ned by fleet dynamics (e.g., fishing closure, fish market preferences and price) and bureaucratic delays of the project, whi..."}]}, {"name": "gear_mit_weak_hook", "triggered": false, "evidence": []}, {"name": "gear_mit_wire_leader", "triggered": false, "evidence": []}, {"name": "gear_net_other", "triggered": false, "evidence": []}, {"name": "gear_pelagic", "triggered": false, "evidence": []}, {"name": "gear_purse_seine", "triggered": false, "evidence": []}, {"name": "gear_seine", "triggered": false, "evidence": []}, {"name": "gear_survey", "triggered": false, "evidence": []}, {"name": "gear_target_species", "triggered": false, "evidence": [{"matched_terms": "pair", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "www.nature.com/scientificdata  A 14-year time series of marine Data Descriptor megafauna bycatch in the Italian midwater pair trawl fishery OPEN  Sara Bonanomi 1 ✉, Fabrizio Moro1, Alessandro Colombelli1, Jacopo Pulcinella1 & Caterina Maria Fortuna2"}, {"matched_terms": "pair", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "generated between 2006 and 2019 by a monitoring programme on marine megafauna bycatch in one of the main Italian fisheries, the northern central Adriatic midwater pair trawl fishery. The three datasets consist of: (i) monitored fishing effort; (ii) b"}, {"matched_terms": "and", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "concern and trends of their relative abundance over time in the northern - central Adriatic Sea. These datasets are expected to be considered by different end users to improve the conservation of species and fishery management approaches to assess th"}, {"matched_terms": "including", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". In the case of the Mediterranean Sea, many authors have documented that dolphins12, sea turtles13, sharks and rays14,15 interact with and are incidentally t
