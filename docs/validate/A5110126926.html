 across 23 sites between northern New South Wales and eastern Tasmania. Fewer species were observed by BRUVs than caught by longlines (51 vs 73), and only a small proportion was sampled by both  \fD"}, {"matched_terms": "using", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". McLean et al. / Deep-Sea Research I 98 (2015) 10–20  15  Table 3 The relative abundance and commonality of each species sampled using longlines and BRUVs off the east coast of Australia. Family  Alopiidae Apogonidae Berycidae Berycidae Bramidae Car"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". However, the power analysis suggests that the sampling effort using BRUVs needed to be much greater to yield results similar to longlines, particularly in species rich warmer regions (see Fig. 4b). These observations contrast to a comparison of ﬁsh"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "similar to longlines, particularly in species rich warmer regions (see Fig. 4b). These observations contrast to a comparison of ﬁshes sampled by pelagic longlines and pelagic BRUVs (Santana-Garcon et al., 2014), in which the two gears provided a comp"}, {"matched_terms": "by", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "of Carcharhinidae species. However, in both that study and ours, BRUVs provided abundance information on teleost species that were not captured by longlines due to the selectivity of the hooks or bait. The attraction of active scavenger/predators to "}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "The attraction of active scavenger/predators to both baited ﬁshing techniques was illustrated by the four species that were most commonly caught on the longlines and which were sampled by both techniques at 4 2 sites. Two of these species, H. barathr"}, {"matched_terms": "between", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "for sampling chondrichthyans with them contributing half of all species (37 of 73), and 56% of the total catch number. Some differences in catch composition between longlines and BRUVs can be clearly explained by gear selectivity in relation to speci"}, {"matched_terms": "on", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "BRUVs can be clearly explained by gear selectivity in relation to species morphology and ecology. The three most abundant BRUVs species not caught on longlines were banded bellowsﬁsh (C. humerosus) a planktivorous species with small tubular jaws, lit"}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "and/or illumination may have attracted these species to BRUVs. Among other species sampled only by BRUVs were large-bodied species, possibly absent in longline catches because they can break the longline snoods before they come to the surface. Exampl"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "Among other species sampled only by BRUVs were large-bodied species, possibly absent in longline catches because they can break the longline snoods before they come to the surface. Examples include bigeye sixgill shark (Hexanchus nakamurai), bluntnos"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "recovered (this number was not quantiﬁed) and, although many of these losses were likely the result of bottom fouling, it is expected that the longlines catch data will be biased towards species with smaller bodies and less sharp teeth. Another obser"}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "that the longlines catch data will be biased towards species with smaller bodies and less sharp teeth. Another observation of selectivity in longline catches occurred at the ‘North of Sydney Closure’ site where there was low relative abundance compar"}, {"matched_terms": "recovered", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". The catch was dominated by H. barathri (bigeye ocean perch), but included several E. cirrhatus (broadgilled hagﬁsh). Many of the recovered longline hooks had no bait, but did have residue of E. cirrhatus slime. In fact, hagﬁsh probably represent a "}, {"matched_terms": "for", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Many of the recovered longline hooks had no bait, but did have residue of E. cirrhatus slime. In fact, hagﬁsh probably represent a high Type II error for longline samples given they represent 23% of the BRUVs observations and less than 1% of longli"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "probably represent a high Type II error for longline samples given they represent 23% of the BRUVs observations and less than 1% of longline observations. This possibility was corroborated by BRUVs vision, which showed persistent E. cirrhatus activit"}, {"matched_terms": "on", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "hagﬁsh species have been reported as important scavengers on discards from ﬁsheries (Catchpole et al., 2006; Davies et al., 2006). To explain the low catch of hagﬁsh on longlines we can only speculate that jawless hagﬁsh are good at removing bait fro"}, {"matched_terms": "and", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Commercial hagﬁsh harvesting in other parts of the world use traps for this very reason (Martini and Beulig, 2013). Many chondrichthyan species were sampled by both BRUVs and longlines, but their abundances were typically much higher in longline ca"}, {"match
