ver the escape opening, thereby providing information on the eﬀects of the TE"}, {"matched_terms": "four", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "eﬀects of TEDs, used either in combination with a BRD, or individually. During the sampling period, vessels completed up to four trawls per night. Each trawl was 3–4 h in duration depending on the amount of bycatch present. At the end of each trawl, "}, {"matched_terms": "each", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "eﬀects of TEDs, used either in combination with a BRD, or individually. During the sampling period, vessels completed up to four trawls per night. Each trawl was 3–4 h in duration depending on the amount of bycatch present. At the end of each trawl, "}, {"matched_terms": "each", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "During the sampling period, vessels completed up to four trawls per night. Each trawl was 3–4 h in duration depending on the amount of bycatch present. At the end of each trawl, the two codends were spilled onto the sorting tray ensuring the catches "}, {"matched_terms": "those", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Statistical analyses For the purposes of the present study, a subset of the data obtained by Brewer et al. (2006), containing only those trawls where an elasmobranch was caught in either the control net or treatment net, was used. In accord with Br"}, {"matched_terms": "penaeid", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "In the current study, data collected by Brewer et al. (2006) were reanalysed to determine factors aﬀecting the escape of elasmobranchs from penaeid trawls. These data were recorded by scientiﬁc observers with the objectives of providing information r"}, {"matched_terms": "net", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". This indicated that, for all vessels, any variability in catch between nets could not be attributed to the nets themselves. From the 1440 net trawls, a total of 6204 elasmobranchs were identiﬁed representing 34 species from 27 genera, 15 families a"}, {"matched_terms": "while", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "sampling period, the number of elasmobranchs caught during the calibration nights were analysed using generalised linear mixed modelling. For this analysis, a vessel identiﬁer was added as a random term while trawl number, calibration period (0 = bef"}, {"matched_terms": "20", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "the lack of control over the design factors of the TEDs tested (Supplementary Table 1), caused some issues when analysing these data. For example, only 20 trawls were undertaken with a circular TED compared to 234 and 188 trawls with elliptical and r"}, {"matched_terms": "188", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "(Supplementary Table 1), caused some issues when analysing these data. For example, only 20 trawls were undertaken with a circular TED compared to 234 and 188 trawls with elliptical and rectangular grids, respectively. The GLMMs indicated ﬁsh size si"}, {"matched_terms": "720", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "for both Orectolobiformes and Rhinopristiformes (P > 0.05). Escape from TEDs was greatest for large animals (Figs. 1 and 2).  3. Results During the sampling period, 720 trawls were undertaken on 22 vessels where a treatment net and a control net were"}, {"matched_terms": "net", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "During the sampling period, 720 trawls were undertaken on 22 vessels where a treatment net and a control net were towed simultaneously (i.e. 1440 net trawls). Results from one vessel were excluded due to the limited number of trawls conducted with tr"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "vessels where a treatment net and a control net were towed simultaneously (i.e. 1440 net trawls). Results from one vessel were excluded due to the limited number of trawls conducted with treatment and control nets present. Various TED designs were us"}, {"matched_terms": "430", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". Various TED designs were used during the sampling period (Supplementary Table 1). Most devices were deployed as bottom-shooters: 430 trawls were undertaken with bottom-shooter TEDs; and 290 as top-shooters. Only two devices were tested in both top-"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". TEDs were generally tombstone-shaped, rectangular or elliptical with a grid angle ranging between 40 and 72° from the horizontal. Bar space ranged between 95 and 120 mm, with 32 % of trawls completed using TEDs with the maximum permitted bar space "}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". Bar space ranged between 95 and 120 mm, with 32 % of trawls completed using TEDs with the maximum permitted bar space of 120 mm. The majority of trawls were conducted with guiding panels installed (∼79 %) and no deﬂector bars (∼90 %). A BRD was ins"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Top-shooter TEDs facilitated greater escape of Carcharhiniformes while bottom-shooter TEDs improved the escape of Myliobatiformes. These results are likely a function of the escape response, and the resultant position in the trawl, of the respectiv"}, {"matched_terms": "ﬁsh", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "the resultant position in the t
