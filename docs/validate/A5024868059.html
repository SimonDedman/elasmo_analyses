h moderate overall spatial overlap with longline fisheries (40%) but at lower than average effort level (Fig. 3c). Results indicate"}, {"matched_terms": "54%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Indeed, models suggest that if the catch is reduced to zero (prohibition) the probability of stock rebuilding by 2040 was still only 54% (refs. 17, 18). Our results add spatial context to this level of exploitation by showing that major space use h"}, {"matched_terms": "90%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "causes particular concern. Blue shark and shortfin mako have high commercial value for fins (and meat from mako) and make up 90% of all large pelagic sharks caught in pelagic fisheries62. Despite this, there is limited high seas management for both s"}, {"matched_terms": "40%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "Zealand in 2014 resulting in porbeagle catch by longliners being discarded 65. Although there is high mortality of porbeagle from longliners due to the discarding, with nearly 40% of 55  \findividuals hauled in dead69, the proportion being released al"}, {"matched_terms": "60%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". 3b inset CCA and d). Similarly, white shark space use in the southwest Indian Ocean was subject to higher than average overlap (>60%) in addition to higher than average fishing effort they were exposed to in those areas (Fig. 3c, inset CCA). Space "}, {"matched_terms": "60\n%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". However, this may not be the case in other regions such as the southwest Indian Ocean where overlap is high in absolute terms (>60 %) and covers much of the white shark distribution in this region. The actual fishing mortality due to other gear typ"}, {"matched_terms": "1.5%", "section": "percentage", "total_freq": "1", "threshold": "1", "context
