atched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". An average point between the starting and finishing point of each haul was used as the geographical location. The entire bottom trawl fleet operating in the area of study comprises 169 vessels landing an average of 8000 t per year. Bottom trawling "}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "The entire bottom trawl fleet operating in the area of study comprises 169 vessels landing an average of 8000 t per year. Bottom trawling of the seabed usually takes place on the shelf, harvesting a multi-specific catch with European hake (Merluccius"}, {"matched_terms": "commercial", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "multi-specific catch with European hake (Merluccius merluccius) as the main target species. Because elasmobranchs are not target species of this commercial fishery, their occurrences are unbiased indicators of their presence/absence patterns. This al"}, {"matched_terms": "data", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". In all these cases, a preferential-sampling model is required to model the species distribution.  Fishery-independent data Fishery-independent data were collected during the MEDITS (EU-funded MEDIterranean Trawl Survey) carried out from spring"}, {"matched_terms": "mediterranean", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "to model the species distribution.  Fishery-independent data Fishery-independent data were collected during the MEDITS (EU-funded MEDIterranean Trawl Survey) carried out from spring to early summer (April to June) across the whole Mediterranean Sea s"}, {"matched_terms": "99", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". Sampling stations were placed randomly within each stratum
