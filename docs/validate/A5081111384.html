ish-brown massively bedded uni"}, {"matched_terms": "38%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "well-exposed sections, these fine-grained units represent an average of 64% of the stratigraphic thickness. Mudstones occur in four facies: reddish-brown massively bedded units (38%), interbedded mudstones (40%), minor laminated beds, and green clays"}, {"matched_terms": "40%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "stratigraphic thickness. Mudstones occur in four facies: reddish-brown massively bedded units (38%), interbedded mudstones (40%), minor laminated beds, and green claystone. Red-brown to red mudstones, which are common in the lower portion of the form"}, {"matched_terms": "1%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "green claystone, which occurs just below the massive limestone of the CenomanianTuronian transgression. Limestones and marls, which comprise a very small fraction (< 1%) of the Douira Formation consist of blueish gray-to-white, ledge-forming beds les"}, {"matched_terms": "7%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "thick with substantial clay and silt. This facies occurs in the upper 20 m of the Ouzina section. At Douira calcareous beds are more common and comprise 7% of the section. Beds 20–30 cm in thickness occur inter-bedded with mudstones and claystones. O"}, {"matched_terms": "75%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "Completeness. Quantitative logging of isolated specimens collected from several localities in 2008 shows that the majority (~75%) are too incomplete to estimate the percentage of missing bone. Of the remaining more complete specimens, more than half "}, {"matched_terms": "50%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "localities in 2008 shows that the majority (~75%) are too incomplete to estimate the percentage of missi
