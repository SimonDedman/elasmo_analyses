ens (45.1%), followed by "}, {"matched_terms": "this", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "those higher up in the water column.  DISCUSSION Elasmobranch fish, particularly the sharks, represented the most important by-catch group of this fishery, with 32.7% of the total catches, which can be considered a high value because the target speci"}, {"matched_terms": "this", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "be considered a high value because the target species accounted for 45.1% of the total catch. The withdrawal of the lower three pairs of hooks in this fishery would represent a reduction of 15% of the hooks used. However, the respective catch reducti"}, {"matched_terms": "demersal", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "cies. Russell et al.23 observed that sharks were more frequently caught near the bottom by the lower hook positions in a demersal longline, suggesting a higher abundance or close association of these animals with the bottom. These differences"}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "Although several studies have dealt with different strategies for increasing species selectivity and decreasing by-catch rates in longline fisheries, none based on the current hook removal suggestion presented in this paper is known. Those previous s"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "previous studies have included strategies such as gear modifications (use of alternative hook and bait types) and fishing strategies (increased sinking rates of the longlines),22,26,27 as well as area and time restrictions.28 Matsuoka et al.29 propos"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "fish loss and potential fish injury by using more hooks ue sharks in good enough condition for live release, using data from the U.S. Atlantic pelagic fishery observer program. In the Pacific Ocean, Moyes et al. (2006) predicted post-release survival of b"}, {"matched_terms": "based", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". (2011) analysed the post-release survival of five pelagic elasmobranch species, and Walsh et al. (2009) analysed mortality of several shark species for the Hawaii-based longline fishery, including deep and shallow water sets. Knowledge on hooking m"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "and determined their relative productivity/susceptibility in order to rank and compare the vulnerability of the species caught in the fishery. More recently, Arrizabalaga et al. (2011) carried out an ERA analysis that included all bycatch groups capt"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "in the fishery. More recently, Arrizabalaga et al. (2011) carried out an ERA analysis that included all bycatch groups captured in pelagic longline tuna fisheries in the Atlantic Ocean. One parameter that can be used and included in such types of ass"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "mortality. The aim of this paper is to explore hooking mortality (recorded at haulback, during fishing gear retrieval) in a pelagic longline fishery targeting swordfish in the Atlantic Ocean and by-catching pelagic sharks. The main objective of"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "the study was to present species-specific proportions of hooking mortality, while a secondary objective was to explore relationships between the hooking mortality and some possible explanatory variables, such as specimen size, sex and region of
