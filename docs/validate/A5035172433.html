tandard, mid-water longlines. Hook timers provided hooking duration to the nearest minu"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "as the capture event progresses, apparently facilitating a degree of physiological recovery. Continued investigation into the physiological response of elasmobranchs to longline capture is vital for the effective management of such ﬁsheries. © 2011 E"}, {"matched_terms": "introduction", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "investigation into the physiological response of elasmobranchs to longline capture is vital for the effective management of such ﬁsheries. © 2011 Elsevier Inc. All rights reserved.  1. Introduction Longline ﬁshing is thought to be the predominant met"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "Longline ﬁshing is thought to be the predominant method of commercial capture for sharks (Beerkircher et al., 2002; Lewison et al., 2004; Gilman et al., 2008). In the majority of longline ﬁsheries all or part of the shark is harvested, however, in so"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ".1016/j.cbpa.2011.04.012  (Wikelski and Cooke, 2006; Cooke and O'Connor, 2010). Documenting the physiological consequences of longline capture in sharks is a vital undertaking for effective ﬁsheries management because it can provide insights into the"}, {"matched_terms": "and", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "research to date has focused on the physiological effects of recreational rod and reel capture (e.g. Heberer et al., 2010), however, the effects of both gillnet (e.g. Frick et al., 2010) and trawl capture (Mandelman and Farrington, 2007) have also be"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "type (Skomal and Bernal, 2010). Despite being the most common capture method for sharks, the physiological consequences of longline capture have received very little attention, with only four published studies to date (Moyes et al., 2006; Hight et al"}, {"matched_terms": "on", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "variation in the stress response in sharks, likely associated with differences in metabolic scope (Mandelman and Skomal, 2009). However, the response to capture has yet to be assessed for the majority of species commonly captured on longlines. This i"}, {"matched_terms": "by", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". Although ﬁsheries data pertaining to the Caribbean reef shark are sparse, there are indications that it is commonly captured by longline ﬁsheries throughout its range (Amorim et al., 1998; Arocha et al., 2002; Rosa et al., 2006). In the United Stat"}, {"matched_terms": "set", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "., 2006). In the United States, it is a prohibited species, which is commonly captured and subsequently released in the bottom set longline ﬁshery off the Florida Keys (Morgan et al., 2009). Despite its abundance and common interactions with ﬁsheries"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". Thus, the aim of this project was to quantify and characterise physiological disturbances induced by varying duration of longline capture in the Caribbean reef shark. 2. Methods This study was conducted between 9th June and 1st October 2009, at the"}, {"matched_terms": "water", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "the Study of Animal Behaviour and the Animal Behaviour Society (Rollin and Kessel, 1998). 2.1. Animal collection and sampling structure Stationary, mid-water longlines, 500 m in leng ive Biochemistry and Physiology, Part A 162 (2012) 94–100  97  Fig. 1. The stress response of the Caribbean reef shark in response to longline capture. Data represent the relationships between hook duration and the physiological response "}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "Based on the apparently parabolic response of many blood parameters to hook duration, one hypothesis is that the Caribbean reef shark responds to longline capture with an initial energetic  escape response (high anaerobic muscular activity) to the ac"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "of hooking, followed by a period of reduced activity associated with a concomitant attenuation of the secondary stress response. The allostatic overload associated with the initial stress of longline hooking is designed to increase ﬁtness and the cap"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". / Comparative Biochemistry and Physiology, Part A 162 (2012) 94–100  Fig. 2. The stress response of the Caribbean reef shark in response to longline capture. Data represent the relationships between hook duration and the physiological response vari"}, {"matched_terms": "and", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "blood acidosis has been reported in many other elasmobranchs subjected to hook and line (Cliff and Thurman, 1984; Hoffmayer and Parsons, 2001) and longline (Mandelman and Skomal, 2009) capture. This acidosis is thought to be driven by elevated levels"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "that burst exercise might have ceased early in the capture event. The Caribbean reef shark ranks as a species more resilient to longline capture than several others assessed to date. Mandelman and Skomal (2009
