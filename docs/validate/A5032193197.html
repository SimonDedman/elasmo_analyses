r_modifier", "total_freq": "0", "threshold": "1", "context": ". Graves / Fisheries Research 80 (2006) 239–250  marine recreational fisheries. Most research into the effects of hook type and survival has occurred in the recreational fishery where catch and release fishing practices are common. These studies have"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "., 2002; Skomal et al., 2002; Malchoff et al., 2002) and increased rates of postrelease survival (Horodysky and Graves, 2005). In the pelagic longline fishery, a higher proportion of fishes caught in the mouth or jaw should result in less physical da"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "in less physical damage to the animal and presumably higher rates of survival at haulback and after release for bycatch species. The effects of terminal gear changes in the pelagic longline fisheries have not been well studied. Falterman and Graves ("}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "The effects of terminal gear changes in the pelagic longline fisheries have not been well studied. Falterman and Graves (2002) found that mortality at haulback of the longline was 31% for target and bycatch fishes caught on circle hooks and 42% for t"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "although this difference was not statistically significant. Hoey (1996) observed a similar pattern in his review of the U.S. pelagic longline fleet records (mortality rate at haulback: 49% circle hook and 62% J-style hook; no significance noted)"}, {"matched_terms": "atlantic", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Berkeley and Edwards (1996) noted that fish caught on circle hooks, even those on the line for many hours, were generally
