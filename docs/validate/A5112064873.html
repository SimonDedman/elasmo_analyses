imilar to trawling (29%), indicating that pens likely caused the observe"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". This suggests that penning stress was merely an additive factor compounding initial capture stress that dictated the 72 h mortality of trawled individuals. When normalized by subtracting out hook-and-line pen mortality, 72 h trawling mortality gene"}, {"matched_terms": "for", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". When normalized by subtracting out hook-and-line pen mortality, 72 h trawling mortality generally remained well below the 50.0% spiny dogfish discard mortality rate currently estimated for trawling in the Northwest Atlantic and was even superceded "}, {"matched_terms": "otter", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "potentially fatal damage inflicted on this species can heighten quickly. Spiny dogfish discard mortality is thus postulated as more commensurate with current estimations for otter trawling when tows are heavily packed. © 2006 Elsevier B.V. All rights"}, {"matched_terms": "otter", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "with current estimations for otter trawling when tows are heavily packed. © 2006 Elsevier B.V. All rights reserved. Keywords: Otter trawling; Bycatch; Discard mortality; Spiny dogfish; Squalus acanthias; Capture stress  1. Introduction The spiny dogf"}, {"matched_terms": "dogfish", "section": "accepted", "total_freq": "1", "threshold": "1", "context": "are especially prolonged (18–22 months) (NEFSC, 2003), attain maximally larger sizes then males and are accordingly selected when a directed dogfish fishery exists. Due to these factors, mature female stocks in the Northwest Atlantic were reduced by "}, {"matched_terms": "interstate", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "
