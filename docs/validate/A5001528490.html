ontext": "Pelagic longline ﬁsheries targeting mahi-mahi may be particularly detrimental to sea turtles and epipelagic elasmobranchs because of the high degree of spatial overlap of these species (Gilman et al., 2006, 2008). Mahi-mahi tend to reside in surface "}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "typically shallower than those targeting tunas. Previous studies have shown that sea turtles and sharks are both captured at higher rates on shallow pelagic longline sets: near-surface swordﬁsh sets tend to catch far more sea turtles than deep sets t"}, {"matched_terms": "shallow", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "tend to catch far more sea turtles than deep sets targeting tuna (Lewison and Crowder, 2007); in the western and central Paciﬁc, sharks are caught over twice as frequently on shallow longline sets (500,000 sharks/year) than on deep ones (200,000/year"}, {"matched_terms": "mahi", "section": "accepted", "total_freq": "1", "threshold": "1", "context": "are poor, but Costa Rica’s ﬂeet has had an onboard observer program since 1999 (initiated and led by co-author Arauz, 2002, 2004). Data from this program thus provide a rare opportunity to assess bycatch levels in a commercial mahi-mahi longline ﬁshe"}, {"matched_terms": "mile", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "Canada, UK, and Australia, no other data source isolated mahi-mahi in sufﬁcient taxonomic detail for comparison.  approximately 18-mile longlines and wire leaders, with 650 hooks per set and 12–16 sets per trip (Table 1). This ﬂeet targets mainly mah"}, {"matched_terms": "mile", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "mahi-mahi, but also catch tunas and sailﬁsh, and operates throughout the Exclusive Economic Zone (EEZ). In contrast, ‘‘advanced scale’’ vessels are capable of deploying 150 mile longlines, and hreshold": "1", "context": "Crowder, 2007; Myers et al., 2007). In particular, species of sea turtles and sharks display an intrinsic sensitivity to mortality from longline ﬁsheries because they exhibit life history traits such as high adult survivorship, low fecundity and late"}, {"matched_terms": "for", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "90% becoming more common (Myers and Worm, 2005). From 1990 to 2008 bycatch of sea turtles per unit effort was particularly high for longlines in the Northwest Atlantic, Mediterranean, Southwest Atlantic and Eastern Paciﬁc and for gillnets in the East"}, {"matched_terms": "and", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "2008 bycatch of sea turtles per unit effort was particularly high for longlines in the Northwest Atlantic, Mediterranean, Southwest Atlantic and Eastern Paciﬁc and for gillnets in the Eastern Indian Ocean and trawls in the Eastern Paciﬁc and Mediterr"}, {"matched_terms": "by", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "0022-0981/$ – see front matter © 2013 Elsevier B.V. All rights reserved. http://dx.doi.org/10.1016/j.jembe.2013.07.014  boats reported over 55,000 turtles captured by longlines around the world. Therefore, bycatch may be a major problem for survival "}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "caused after capture may contribute to increased mortality (Koch et al., 2006; Watson et al., 2005). Overall, post-hooking mortality of sea turtles ranges from 4% to 27% in longline ﬁsheries (Camiñas, 2004; Lewison and Crowder, 2007). In the olive ri"}, {"matched_terms": "rican", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "ranges from 4% to 27% in longline ﬁsheries (Camiñas, 2004; Lewison and Crowder, 2007). In the olive ridley turtle, mortality caused by longlining is typically low in arks from 1999 to 2008 in the Costa Rican mahi-mahi longline ﬁshery (Whoriskey et al., 2011). We analyzed a larger data set from the Costa Rican longline ﬁshery to determine the spatiotemporal relationships of that ﬁshery for mahi-mahi, o"}, {"matched_terms": "and", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "sharks (Carcharhinus limbatus), a species considered to be globally near threatened. 2. Methods 2.1. Observer program The program began in 1999 and longline monitoring was continuous until 2010, with the exception of 2001, when no observations were c"}, {"matched_terms": "15", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "until 2010, with the exception of 2001, when no observations were conducted. Efforts of the program varied between years, with a minimum of 15 longlines observed in 2000 and maximum of 88 longlines observed in 2008. Observer effort also varied by mon"}, {"matched_terms": "88", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "conducted. Efforts of the program varied between years, with a minimum of 15 longlines observed in 2000 and maximum of 88 longlines observed in 2008. Observer effort also varied by month. Most observations took place in May, which had 14.3% of the to"}, {"matched_terms": "onboard", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". Observers were trained to identify and record species, sex, reproductive state and dimensions of all animals captured onboard longline ﬁshing trips. Prior to 2003 silky sharks and blacktip sharks were recorded as Carcharhinus spp. so we could not a"}, {"matched_terms": "individual", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". so we could not analyze individual species, and sizes of ﬁsh were not recorded. Observers also recorded information pertaining to individual longlines, such as location, set and haul back times, hoo n": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "Clearly, the risk of exposure of sharks to fishing indicated by our mean overlap-FEI plots only link pelagic shark space use to activity patterns of industrial longline fishing vessels reporting location via AIS, rather than the many smaller vessels "}, {"matched_terms": "from", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "In this study we estimated that the blue shark was potentially exposed to higher than average overlap and fishing effort in North Atlantic space use areas (Fig. 3a), principally from longline fishers but also by purse seiners in the eastern North Atl"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". 2c, d). It is noteworthy that of the most frequently tracked species in this study, blue sharks have the highest exposure to longline in all the major space use hotspots we identified with fishery-independent tracking data in the North Atlantic (Fi"}, {"matched_terms": "with", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". It is noteworthy that of the most frequently tracked species in this study, blue sharks have the highest exposure to longline in all the major space use hotspots we identified with fishery-independent tracking data in the North Atlantic (Figs 1, 3a"}, {"matched_terms": "industrial", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". The absence of strict catch controls for blue shark may be problematic in the light of our study. Given our results showing major North Atlantic blue shark space use hotspots are nearly entirely overlapped by industrial longline fishing with high a"}, {"matched_terms": "ais", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "Similarly, overlap of east and southwest Pacific blue sharks was above average but overall fishing effort they were exposed to in overlapped areas was low, with sparse AIS longline and purse seine fisheries in off-shelf waters (Fig. 2, 3b,d; Extended"}, {"matched_terms": "with", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". In the southwest Indian Ocean the overlap-FEI values for blue sharks were found to be near the lowest risk zone, with moderate overall spatial overlap with longline fisheries (40%) but at lower than average effort level (Fig. 3c). Results indicate"}, {"matched_terms": "industrial", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "by small vessel fleets operating from islands not being equipped with AIS. Furthermore, the heterogeneous habitats present in the Caribbean may make them problematic to fish by large industrial longline and purse seine vessels. 2.6.4 Western North At"}, {"matched_terms": "is", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ".4 Western North Atlantic porbeagle and white sharks Space use of porbeagle and white sharks determined by satellite tracking that is fisheryindependent showed both species to have hotspots in the Gulf Stream ecosystem (Extended Data Figs. 6, 7). The"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "effort co-occurrence could explain the historical overfishing for these species, where sharp declines in catches have been observed16,18,26. Our results demonstrate that the potential for incidental capture by pelagic longlines remains high where the"}, {"matched_terms": "with", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "Porbeagle sharks in the southwest Pacific off New Zealand were also identified in our analysis as having relatively high spatial overlap with longline vessels and exposed to higher than average fishing effort in those space use areas (Fig. 3d; Extend"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "ago with the potential for a stable or increasing population size. Whereas the biologically distinct porbeagle of the North Atlantic has been the subject of a directed pelagic longline fishery as well as bycatch from bottom trawls and gillnets, in th"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "Whereas the biologically distinct porbeagle of the North Atlantic has been the subject of a directed pelagic longline fishery as well as bycatch from bottom trawls and gillnets, in the south Pacific catches are made primarily as bycatch from tuna lon"}, {"matched_terms": "tuna", "section": "accepted", "total_freq": "1", "threshold": "1", "context": "directed pelagic longline fishery as well as bycatch from bottom trawls and gillnets, in the south Pacific catches are made primarily as bycatch from tuna longline vessels67. Porbeagle off New Zealand are taken as bycatch by drifting pelagic longline"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "Pacific catches are made primarily as bycatch from tuna longline vessels67. Porbeagle off New Zealand are taken as bycatch by drifting pelagic longlines but also by trawlers (bottom and midwater) and bottom longliners68. They have been managed in New"}, {"matched_terms": "by", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "Pacific catches are made primarily as bycatch from tuna longline vessels67. Porbeagle off New Zealand are taken as bycatch by drifting pelagic longlines but also by trawlers (bottom and midwater) and bottom longliners68. They have been managed in New"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". Porbeagle off New Zealand are taken as bycatch by drifting pelagic longlines but also by trawlers (bottom and midwater) and bottom longliners68. They have been managed in New Zealand waters with catch quotas since 2004 given the uncertainty in stoc"}, {"matched_terms": "by", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "declines in CPUE in the early 2000s (ref. 68). Furthermore, shark finning was banned in New Zealand in 2014 resulting in porbeagle catch by longliners being discarded 65. Although there is high mortality of porbeagle from longliners due to the discar"}, {"matched_terms": "from", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "Zealand in 2014 resulting in porbeagle catch by longliners being discarded 65. Although there is high mortality of porbeagle from longliners due to the discarding, with nearly 40% of 55  \findividuals hauled in dead69, the proportion being released al"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "mortality from discarding. 2.6.6 Pacific and Indian Ocean white sharks There was higher than average fishing overlap and exposure to longline fishing effort (FEI) across white shark distribution in the northeast Pacific and southwest Pacific (Oceania"}, {"matched_terms": "from", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "There was higher than average fishing overlap and exposure to longline fishing effort (FEI) across white shark distribution in the northeast Pacific and southwest Pacific (Oceania region). This was principally from longline vessels and to a lesser ex"}, {"matched_terms": "with", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Space use hotspots occurring in shelf and open ocean areas for white sharks in all three regions overlap significantly with longline fishing vessels (Fig. 3b-d). Protection measures for white sharks are in place within Australia, Europe, New Zealan"}, {"matched_terms": "to", "section": "re
