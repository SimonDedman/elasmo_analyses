re-surveyed the same bays using a modern otter trawl. The results revealed marked d"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "fish and flatfish assemblages, with proportionally fewer large individuals recorded in contemporary surveys. These findings suggest that over a century of trawling and climate change, combined with pollution, habitat alteration and increased predatio"}, {"matched_terms": "historical", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "inshore waters and offers an invaluable benchmark for improving coastal ecosystem status. KEY WORDS: Inshore fisheries · Long-term change · Demersal fish · Historical trawl surveys  1. INTRODUCTION Commercial fishing practices have undergone rapid ch"}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "KEY WORDS: Inshore fisheries · Long-term change · Demersal fish · Historical trawl surveys  1. INTRODUCTION Commercial fishing practices have undergone rapid changes in trawl gear technology, effort and target species over the last 2 centuries in Eur"}, {"matched_terms": "early", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "changes in trawl gear technology, effort and target species over the last 2 centuries in European waters (Engelhard 2008). Early trawls were towed across the seabed by sail-powered fishing smacks close to shore until the mid-19th century (Alward 1932"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "soon displaced by steam-powered fishing vessels in  *Corresponding author: georgina.hunt@abdn.ac.uk  the 1880s, which marked the rapid growth of trawling effort across the North Sea (Robinson 1996, Engelhard 2008). The addition of steam power enabled"}, {"matched_terms": "larger", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". The addition of steam power enabled vessels to fish for longer durations, work previously unfished grounds further offshore at deeper depths and tow much larger trawl nets (Thurstan et al. 2010). Over the 20th century, fishers responded to falling "}, {"matched_terms": "by", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "grounds further offshore at deeper depths and tow much larger trawl nets (Thurstan et al. 2010). Over the 20th century, fishers responded to falling catches by trawling more intensively and switching to less favourable fish species (Pauly et al. 1998"}, {"matched_terms": "sustained", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "dominance of particular species (Greenstreet & Hall 1996, Heath & Speirs 2012). It is often larger, longlived and late-maturing species that are more vulnerable to sustained trawling, whereas smaller species that mature faster tend to be more resilie"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "localities (Pauly et al. 1998, Thurstan et al. 2015), accelerated by habitat modification and depletion of their predators due to trawling (Brown & Trebilco 2014). For example, the Firth of Clyde in Scotland once sustained diverse fisheries for speci"}, {"matched_terms": "when", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "behind these changes (Pickett 1989). However, the systematic collection of national fisheries statistics did not begin until the 1880s when trawling was already widespread (Russell & Edser 1925, Thurstan et al. 2014), thus well after the onset of lar"}, {"matched_terms": "historical", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "already widespread (Russell & Edser 1925, Thurstan et al. 2014), thus well after the onset of large-scale impacts. It is rare for researchers to unearth detailed historical fishery records that allow comparison with contemporary data (Rijnsdorp et al"}, {"matched_terms": "steam", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "langus, among other species (Meek 1896). At the turn of the 20th century, these fish species were landed in much larger quantities by steam trawlers, and a new fishery developed for the Norway lobster (Meek 1900). Today, Nephrops, typically caught us"}, {"matched_terms": "new", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "langus, among other species (Meek 1896). At the turn of the 20th century, these fish species were landed in much larger quantities by steam trawlers, and a new fishery developed for the Norway lobster (Meek 1900). Today, Nephrops, typically caught us"}, {"matched_terms": "otter", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "landed in much larger quantities by steam trawlers, and a new fishery developed for the Norway lobster (Meek 1900). Today, Nephrops, typically caught using otter trawls in deeper, muddier waters, has assumed greater importance while whitefish landing"}, {"matched_terms": "nephrops", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "caught using otter trawls in deeper, muddier waters, has assumed greater importance while whitefish landings have declined, although are often landed as bycatch in the Nephrops fishery (Walmsley & Pawson 2007). Potting, which includes using tradition"}, {"matched_terms": "prohibit", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "were established in England and Wales, and a 3 mile (~4.8 km) territorial limit was established around the coastline to prohibit trawling and protect inshore nursery and spawning grounds (Allen 1897). On the Northumberland coast, the ban came into ef"}, {"matched_terms": "scientific", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "this legislation prompted naturalists of the Northumberland Sea Fisheries Committee (NSFC) and the Dove Marine Laboratory, Cullercoats, to set up a series of scientific trawling investigations and collect information on species composition, size dist"}, {"matched_terms": "independent", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "and ‘food of fishes’ in inshore waters (Meek 1895– 1913, 1899a,b). To our knowledge, these investigations represent one of the earliest fisheries-independent trawl surveys conducted in temperate inshore waters. Despite their proximity to shore and ec"}, {"matched_terms": "term", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "trawl surveys conducted in temperate inshore waters. Despite their proximity to shore and ecological importance as nursery grounds, only a few long-term trawl surveys exist in shallow (<40 m depth) inshore waters (e.g. Rogers & Ellis 2000, McHugh et "}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ".g. Rogers & Ellis 2000, McHugh et al. 2011, Heath & Speirs 2012). In the North Sea, investigations of long-term change in trawled fish communities have largely focused on deeper waters over vast spatial areas (e.g. Rijnsdorp et al. 1996, Sguotti et "}, {"matched_terms": "inshore", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "largely focused on deeper waters over vast spatial areas (e.g. Rijnsdorp et al. 1996, Sguotti et al. 2016). These early inshore trawl surveys thus provide a rare opportunity to compare historical records with contemporary survey data by revisiting in"}, {"matched_terms": "nsfc", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "opportunity to compare historical records with contemporary survey data by revisiting inshore waters more than a century later. In this study, we contrast historical records from NSFC trawl surveys (1899–1913) with data collected in contemporary surv"}, {"matched_terms": "that", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "long-term change in the community structure of an inshore fish assemblage. Given the known transformative effects of fishing on marine communities, we expected that trawling caused a reduction in the abundance, diversity and size distribution of comm"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "contributing to the overall restructuring of the inshore fish assemblage (Hypothesis 2). Results are discussed in light of trawling, regional climate change and other possible drivers. We address the challenge of comparing historical and contemporary"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "and Conservation Authority (NIFCA) (Fig. 1b), and, following a review of their byelaws in 2015 and 2018, a permit is required to trawl within their jurisdictional area (0–6 nautical miles, n miles). NIFCA restricts the size of fishing vessels to <12 "}, {"matched_terms": "heavy", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". minimum landing sizes) for fish and crustaceans and limits the use of mobile gear in the MPAs, including a complete ban on heavy trawls and dredges in the BNNC SAC (NIFCA 2021). Since 2018, NIFCA has also limited the use of mobile fishing gears to "}, {"matched_terms": "otter", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "ban on heavy trawls and dredges in the BNNC SAC (NIFCA 2021). Since 2018, NIFCA has also limited the use of mobile fishing gears to light otter trawls in the Coquet to St Mary’s MCZ (NIFCA 2021).  \fMar Ecol Prog Ser 733: 79–93, 2024  82  Fig. 1. Nort"}, {"matched_terms": "historical", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". Northum
