old": "1", "context": "PLOS ONE | https://doi.org/10.1371/journal.pone.0292727 October 19, 2023  12 / 22  \fPLOS ONE  Gear modifications in a North Atlantic pelagic longline fishery  Table 7. The odds ratios for all hook types, compared to JM9, to lodge in different anatomi"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "PLOS ONE | https://doi.org/10.1371/journal.pone.0292727 October 19, 2023  13 / 22  \fPLOS ONE  Gear modifications in a North Atlantic pelagic longline fishery  size did not vary significantly with size for shortfin mako. However, for this species, the"}, {"matched_terms": "year", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "RT hooks were more likely to lodge internally compared to the circle ones. Especially when the CLM18 hook type is used, the chances of being deep-hooked is near to zero.  Discussion The multi-year fishery trial within the Azorean EEZ was one of the m"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "The multi-year fishery trial within the Azorean EEZ was one of the most comprehensive studies on the effects of gear modification on target and bycatch megafauna in pelagic longline fisheries. The study tested eight types of circle, ringed tuna, and "}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": ". These results highlight the role of circle hooks in reducing hooking-related injury and post-release mortality [4, 20, 23, 30, 54–56]. The blue shark has become one of the main target species of the pelagic longline fishery in the Azores, especiall"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "the population distribution [38]. The combination of these factors could explain the vulnerability of blue sharks to be captured by pelagic longline fisheries in the Azores. Although there is some discrepancy among studies, in general, shark species "}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "risk of being caught with circle hooks than J-shaped hooks, especially P. glauca, the dominant elasmobranch species caught in many open ocean pelagic longline fisheries [61–64]. In the present study, blue shark catches increased between 17% and 46% ("}, {"matched_terms": "tuna", "section": "accepted", "total_freq": "1", "threshold": "1", "context": "relative to traditional J-hooks. On the other hand, [65] verified a reduction in blue shark captures with circle hooks in the Hawaii-based tuna longline fishery and [28, 56] found no statistical differences between the hook types (circle and traditio"}, {"matched_terms": "sea", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". On the other hand, [65] verified a reduction in blue shark captures with circle hooks in the Hawaii-based tuna longline fishery and [28, 56] found no statistical differences between the hook types (circle and traditional) used to catch blue shark i"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "PLOS ONE | https://doi.org/10.1371/journal.pone.0292727 October 19, 2023  14 / 22  \fPLOS ONE  Gear modifications in a North Atlantic pelagic longline fishery  loggerhead turtles, respectively, when compared to J (Mustad 9/0). Several longline fishery"}, {"matched_terms": "several", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "Gear modifications in a North Atlantic pelagic longline fishery  loggerhead turtles, respectively, when compared to J (Mustad 9/0). Several longline fishery trials evaluating the effect of gear modification on catch rates found similar results for th"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": ". In the Equatorial Atlantic, [73] found a reduction in the swordfish catch rates of approximately 25% when changing from J to circle hooks. In the Western North Atlantic pelagic longline fishery, [4] found that the combination of 18/0 circle hooks b"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "with mackerel bait and decreased 31% with the same hook baited with squid. The effectiveness of circle hooks combined with mackerel bait was also verified in many other studies conducted in pelagic longline fisheries in different zones of the North a"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "Hawaii [24], and Western North Pacific [75]. Therefore, it seems that the combination of 18/0 circle hook with fish bait is appropriate for the pelagic longline fisheries targeting swordfish and blue shark, since it reduces bycatch of loggerhead sea "}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": ". The high catch rates of RT hook were so detrimental to the sea turtles that its use was discontinued after one month of the trial. Therefore, the use of this gear in Azorean pelagic longline fisheries is highly discouraged. The year effect had a si"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": ". The use of wire leaders has been found to increase catch rates and reduce haulback survival for most elasmobranch species caught in pelagic longline fisheries [5, 76, 77]. Most of the shark species have sharp teeth, enabling them to sever monofilam"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "sharp teeth, enabling them to sever monofilament leaders and escape [61]. In order to reduce shark mortality, the wire leader has been banned in some pelagic longline fisheries [78], including in the Azores within 100 nm off the islands. While most o"}, {"matched_terms": "mexico", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". In this trial, circle hooks showed high probability of catching small blue sharks compared to JM9, the same result found in the Gulf of Mexico longline fishery [79]. However, in the western Atlantic, [80] reported that specimens caught by circle ho"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "reported that specimens caught by circle hooks are larger than those caught by the J-style, while no significant differences were found in other pelagic longline fisheries [28, 30]. Although this study showed a tendency for the CLP18 and RT to catch "}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "PLOS ONE | https://doi.org/10.1371/journal.pone.0292727 October 19, 2023  15 / 22  \fPLOS ONE  Gear modifications in a North Atlantic pelagic longline fishery  mouths, from ingesting the hook. Except for CLP18O hook, no effect of hook type on relative"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": ". Except for CLP18O hook, no effect of hook type on relative size selectivity of shortfin mako was verified in the Azorean pelagic longline fishery, which corroborates the main findings from other studies [25, 30]. The use of circle hooks is related "}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "The use of circle hooks is related to a significant change in the anatomical hooking location for the majority of species caught in the pelagic longline fisheries [20, 23, 25]. The anatomical hooking position directly influences the survival at haulb"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "hooking position directly influences the survival at haulback since the jaw-hooking, compared to deep-hooking, reduces the animal injury and allows it to continue to swim and breathe while on the line [3]. The pelagic longline trial in the Azores sho"}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". These results are consistent with several studies on the effects of gear modification on post release survival of bycatch in longline fisheries [3, 32, 54, 67, 74]. A compilation of studies [23] concluded that circle hooks result in a lower proport"}, {"matched_terms": "this", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "size and sex derived from the complex migration patterns of this species [38, 57]. Swordfish captures increased with SST and remained relatively constant at temperatures above 22˚C. This fishery seasonality is contrary to that recorded for the blue s"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "temperatures above 21˚C, which may explain higher catches in warmer temperatures.  Conclusion The present study demonstrated that the use of circle hooks could mitigate the impact of pelagic longline fisheries by decreasing the bycatch of sea turtles"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "PLOS ONE | https://doi.org/10.1371/journal.pone.0292727 October 19, 2023  16 / 22  \fPLOS ONE  Gear modifications in a North Atlantic pelagic longline fishery  caused by deep hooking. In addition, the use of these gears reduces injuries caused by deep"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": ". In addition, the use of these gears reduces injuries caused by deephooking, which allows for a higher post-release survival rate. In the Azorean EEZ, the local government already recommended
