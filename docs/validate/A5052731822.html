mmon elasmobranch capture method around the world, yet the physiological consequences of this technique are poorly understood. To quantify the sub-lethal effects of longline capture in the commonly exploited Caribbean re"}, {"matched_terms": "water", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". To quantify the sub-lethal effects of longline capture in the commonly exploited Caribbean reef shark (Carcharhinus perezi), 37 individuals were captured using standard, mid-water longlines. Hook timers provided hooking duration to the nearest minu"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "as the capture event progresses, apparently facilitating a degree of physiological recovery. Continued investigation into the physiological response of elasmobranchs to longline capture is vital for the effective management of such ﬁsheries. © 2011 E"}, {"matched_terms": "introduction", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "investigation into the physiological response of elasmobranchs to longline capture is vital for the effective management of such ﬁsheries. © 2011 Elsevier Inc. All rights reserved.  1. Introduction Longline ﬁshing is thought to be the predominant met"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "Longline ﬁshing is thought to be the predominant method of commercial capture for sharks (Beerkircher et al., 2002; Lewison et al., 2004; Gilman et al., 2008). In the majority of longline ﬁsheries all or part of the shark is harvested, however, in so"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ".1016/j.cbpa.2011.04.012  (Wikelski and Cooke, 2006; Cooke and O'Connor, 2010). Documenting the physiological consequences of longline capture in sharks is a vital undertaking for effective ﬁsheries management because it can provide insights into the"}, {"matched_terms": "and", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "research to date has focused on the physiological effects of recreational rod and reel capture (e.g. Heberer et al., 2010), however, the effects of both gillnet (e.g. Frick et al., 2010) and trawl capture (Mandelman and Farrington, 2007) have also be"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "type (Skomal and Bernal, 2010). Despite being the most common capture method for sharks, the physiological consequences of longline capture have received very little attention, with only four published studies to date (Moyes et al., 2006; Hight et al"}, {"matched_terms": "on", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "variation in the stress response in sharks, likely associated with differences in metabolic scope (Mandelman and Skomal, 2009). However, the response to capture has yet to be assessed for the majority of species commonly captured on longlines. This i"}, {"matched_terms": "by", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". Although ﬁsheries data pertaining to the Caribbean reef shark are sparse, there are indications that it is commonly captured by longline ﬁsheries throughout its range (Amorim et al., 1998; Arocha et al., 2002; Rosa et al., 2006). In the United Stat"}, {"matched_terms": "set", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "., 2006). In the United States, it is a prohibited species, which is commonly captured and subsequently released in the bottom set longline ﬁshery off the Florida Keys (Morgan et al., 2009). Despite its abundance and common interactions with ﬁsheries"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". Thus, the aim of this project was to quantify a
