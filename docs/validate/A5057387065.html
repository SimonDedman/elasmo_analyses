ation, which includes only retained catches. Based on the state of this indicator, the HCR ge"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "The parameters of the HCR are set assuming that cpue is proportional to stock abundance, using the following two rules. (i) If a cpue series is available for the entire exploitation history of the fishery, then, assuming the stock was at unexploited "}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "(i) If a cpue series is available for the entire exploitation history of the fishery, then, assuming the stock was at unexploited equilibrium at the start of the fishery, the initial cpue, cpueinit, corresponds to B100, and the other reference points"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "cpuetarg is set to the average cpue during a period of relative stability, i.e. one identified as desirable in terms of cpue, catches, and the status of the fishery. cpuelim is 20/48 of this value. The value for Ctarg is set to the average catch over"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Each Tier uses a different HCR to translate the estimated stock status into the RBC (Smith et al., 2008). The Tier 4 HCR presented here is currently applied to 13 stocks in the fishery. The initial cpue-based HCR implemented in the SESSF for Tier 4"}, {"matched_terms": "pacific", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "., 2009; MacCall, 2009; O’Neill et al., 2010). Methods such as those of Pope (1983), Shepherd (1991), Dichmont et al. (2006) and the North Pacific Fishery Management Council Tier 4 rule (NPFMC, 2001) require more information than is available for the"}, {"matched_terms": "on", "section": "rejected:too_short", "total_freq": "0", "thresho
