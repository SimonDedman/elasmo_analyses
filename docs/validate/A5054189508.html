 "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "Mean densities per species in each habitat were then calculated as the total catch mass of that species, aggregated across all trawls within the habitat, divided by the total of trawl swept-areas. Bray–Curtis similarity matrices (Clark & Warwick, 200"}, {"matched_terms": "management", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "GEOMORPHOLOGY AND OCEANOGRAPHY  Six habitat zones were defined on the eastern Patagonian Shelf and Slope in the Falkland Conservation and Management Fishery Zones. Inner shelf  The inner shelf (IS) habitat extends from the shore line to 100 m depth a"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "banks. Silt accumulation occurs in shallow bays with low mixing. The inner shelf is generally pristine and not open to bottom trawling. The inner shelf is covered by the Falkland Shelf water mass with temperatures ranging from 4·2◦ C in July"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "underwater ridges and outcrops, whereas the western part is mainly flat with sandy bottoms. The western part is one of the most heavily fished areas around the Falkland Islands by bottom trawlers, whereas the eastern part is mostly unfished due to ro"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "westernmost part, this habitat is characterized by flat sandy and muddy bottoms, which are heavily fished throughout the year by bottom trawlers targeting D. gahi (Agnew, 2002). Most of SEOS is covered by the so-called transition zone between Falklan"}, {"matched_terms": "heavily", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "area of NS is c 50·7 × 103 km2 . The shallow part (250–350 m) of NS is mainly flat with sandy
