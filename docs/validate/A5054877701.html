ormation, which includes only retained catches. Based on the state of this indicator, the HCR ge"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "The parameters of the HCR are set assuming that cpue is proportional to stock abundance, using the following two rules. (i) If a cpue series is available for the entire exploitation history of the fishery, then, assuming the stock was at unexploited "}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "(i) If a cpue series is available for the entire exploitation history of the fishery, then, assuming the stock was at unexploited equilibrium at the start of the fishery, the initial cpue, cpueinit, corresponds to B100, and the other reference points"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "cpuetarg is set to the average cpue during a period of relative stability, i.e. one identified as desirable in terms of cpue, catches, and the status of the fishery. cpuelim is 20/48 of this value. The value for Ctarg is set to the average catch over"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Each Tier uses a different HCR to translate the estimated stock status into the RBC (Smith et al., 2008). The Tier 4 HCR presented here is currently applied to 13 stocks in the fishery. The initial cpue-based HCR implemented in the SESSF for Tier 4"}, {"matched_terms": "pacific", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "., 2009; MacCall, 2009; O’Neill et al., 2010). Methods such as those of Pope (1983), Shepherd (1991), Dichmont et al. (2006) and the North Pacific Fishery Management Council Tier 4 rule (NPFMC, 2001) require more information than is available for the"}, {"matched_terms": "on", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "Observation error therefore directly influences the relationship between stock biomass and cpue used in the HCR. In reality, because the cpue data used for Tier 4 HCRs are based on fishery-dependent logbook information, which includes only retained c"}, {"matched_terms": "and", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "RBC, the share allocated to each fleet is based on its proportion of the total catch over the most recent 5 years. Simulated populations are based on the biology and fishery characteristics of tiger flathead (Neoplatycephalus richardsoni) and school "}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "fitted to the real historical data), and Bt the retainable vulnerable biomass for fleet f in the middle of year t:  40 –100 m and is a major component of the fishery in terms of yield, profitability, and effort. It has been targeted historically by f"}, {"matched_terms": "steam", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "40 –100 m and is a major component of the fishery in terms of yield, profitability, and effort. It has been targeted historically by four fleets: steam trawlers (1915– 1961), Danish seiners (1921 – present), diesel otter trawlers off NSW and Victoria"}, {"matched_terms": "otter", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". It has been targeted historically by four fleets: steam trawlers (1915– 1961), Danish seiners (1921 – present), diesel otter trawlers off NSW and Victoria (1971– present) and off Tasmania (1985– present; Klaer, 2007). We chose to examine the effect"}, {"matched_terms": "otter", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "Consequently, school whiting display variable cpue and catches. Since records began in 1947, the species has been caught by two fleets: Danish seiners and
