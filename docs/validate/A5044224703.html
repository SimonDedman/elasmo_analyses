s species with the viviparous C. granulosus, Hamlett et al. (2005) suggested that a loss of c. −20% is appropriate for oviparous and strict lecithotrophic species. There are major flaws, however, in using this va"}, {"matched_terms": "8%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Furthermore, intraspecific variation has also been observed. Although Mellinger et al. (1986) obtained a mean loss of −16·8% in dry mass for S. canicula, Delhaye et al. (1992) and Ranzi (1932) obtained a mean loss of dry mass of −20·8 and −14·2%, r"}, {"matched_terms": "2%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". (1986) obtained a mean loss of −16·8% in dry mass for S. canicula, Delhaye et al. (1992) and Ranzi (1932) obtained a mean loss of dry mass of −20·8 and −14·2%, respectively, for the same species. Biological heterogeneity is also noticed in smooth-h"}, {"matched_terms": "369%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Biological heterogeneity is also noticed in smooth-hound Mustelus mustelus (L. 1758) and C. granulosus. Ranzi (1932) obtained mean organic mass gain of 1050 and 369% for Mustelus laevis Linck 1790 and Mustelus vulgaris Cloquet 1821, respectively. A"}, {"matched_terms": "54%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "species. Different values have also been estimated for C. granulosus. Ranzi (1932) estimated a loss of organic matter of 54%, whereas Guallart & Vicent (2001) estimated this loss to be c. 20%. This relatively large intraspecific variability within"}, {"matched_terms": "20%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Ranzi (1932) estimated a loss of organic matter of 54%, whereas Guallart & Vicent (2001) estimated this loss to be c. 20%. This relatively large intraspecific variability within S. canicula, C. granulosus and potentially M. Mustelus suggests that t"}, {"matched_terms": "2%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "Interestingly, Hamlett et al. (2005) did not include the estimation of mean dry mass loss for S. canicula in Ranzi (1932) (−14·2%) but referred to a value of −20·7%. The latter is closer to the values from the other two studies, but represents the or"}, {"matched_terms": "7%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". (2005) did not include the estimation of mean dry mass loss for S. canicula in Ranzi (1932) (−14·2%) but referred to a value of −20·7%. The latter is closer to the values from the other two studies, but represents the organic mass loss not dry mass"}, {"matched_terms": "20%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "change between dry and organic masses and wrongly compare them as in S. canicula. Furthermore, it is not indicated if the −20% threshold value proposed to classify strict lecithotrophic from incipient histotrophic species represents a dry mass loss"}, {"matched_terms": "20%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "as in two of the three studies used for the oviparous species or if it represents an organic mass loss as in the C. granulosus value of −20%. This highlights the issue of interchangeably discussing dry and organic masses without indicating which mass"}, {"matched_terms": "20%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "citing of previous studies perpetuated typographical errors, incorrect calculations and misinformed readers. The organic mass of O. ornatus and O. maculatus decreases by >20% between uterine egg and term embryos indicating, according to Hamlett et al"}, {"matched_terms": "20%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". and Dasyatis sp. can have up to a 3000-fold increase in wet mass (Hamlett et al., 2005). The decline of organic mass by >20% in two Orectolobus species also shows that the accepted threshold value of 20% organic mass decrease, delimiting strict"}, {"matched_terms": "20%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "., 2005). The decline of organic mass by >20% in two Orectolobus species also shows that the accepted threshold value of 20% organic mass decrease, delimiting strict lecithotrophy from incipient histotrophy, might be too low. A number of elasmobranch"}, {"matched_terms": "20%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "lecithotrophy from incipient histotrophy, might be too low. A number of elasmobranch species do indeed have a small maternal nutrient supply while showing a 20% organic mass decrease. For example, embryos of common electric ray Torpedo torpedo (L. 17"}, {"matched_terms": "23%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". A number of elasmobranch species do indeed have a small maternal nutrient supply while showing a 20% organic mass decrease. For example, embryos of common electric ray Torpedo torpedo (L. 1758) (Ranzi, 1932) have a 23% decrease in organic mass thro"}, {"matched_terms": "20%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "gestation, and this species has a small maternal nutrient supply. Moreover, the loss of organic mass from egg to embryo in lecithotrophic species can be >20% [e.g. S. acanthias = 40% (Wourms et al., 1988) and marbled electric ray Torpedo marmorata Ri"}, {"matched_terms": "40%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "gestation, and this species has a small maternal nutrient supply. Moreover, the loss of organic mass from egg to embryo in lecithotrophic species can be >20% [e.g. S. acanthias = 40% (Wourms et al., 1988) and marbled electric ray Torpedo marmorata Ri"}, {"matched_terms": "31%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "of organic mass from egg to embryo in lecithotrop
