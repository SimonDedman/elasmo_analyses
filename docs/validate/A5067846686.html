cies. Equally, the lower %DE for longline fishing effort compared to sharks could also be due to several fishing fleets not targetin"}, {"matched_terms": "ais", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "directing effort to catching other high value species (tunas, billfishes)58 which may only have a partial overlap with the shark species we tracked. Nevertheless, the results indicate that overall AIS longline fishing effort appears to ‘track’ pelagi"}, {"matched_terms": "and", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "overall AIS longline fishing effort appears to ‘track’ pelagic shark habitats reasonably effectively.  46  \f2.4 Spatial overlap of sharks and longline fishing effort There were large regions of oceans where no or very few sharks were satellite tracke"}, {"matched_terms": "high", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ".4 Spatial overlap of sharks and longline fishing effort There were large regions of oceans where no or very few sharks were satellite tracked despite high longline fishing activity, for example the Patagonian Shelf and in the northwest and southeast"}, {"matched_terms": "for", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "already in low abundance such that tagging studies are less viable, or, more likely, that tracking data exists but cannot be accessed. This study highlights an urgent need for fishery-independent shark occurrence data, such as from tracking, to under"}, {"matched_terms": "possible", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "between Australia and New Zealand supported space use by sharks but sparse AIS fishing vessel activity. Although it is possible longliners and purse seiners were present but not using AIS, low fishing activity also occurred in many of the territorial"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "Caribbean showed very low overlap with AIS vessels, possibly due to the presence of a large MPA (Bahamas) that prohibits pelagic longline fishing or due to fewer vessels there using AIS. It is noteworthy that some sharks travelled long distances from"}, {"matched_terms": "by", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "unchanged regardless of the spatial scale at which they were observed (Extended Data Fig. 4). This indicates that our results quantifying mean monthly risk of capture of shark species by longline fishing are generally applicable at any spatial scale "}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "AIS data were only available for 2012–2016, a mismatch that could lead to unrepresentative patterns of shark risk of exposure to longline fishing. To examine this, we found firstly that broad distributions of shark space use were similar across years"}, {"matched_terms": "from", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". 4) with no high-risk species shifting to the lowest risk zone. This indicates that the species patterns of risk of capture from longline fishing effort were not due to temporal differences in the data collection periods compared. 2.5 Exposure risk "}, {"matched_terms": "industrial", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "Clearly, the risk of exposure of sharks to fishing indicated by our mean overlap-FEI plots only link pelagic shark space use to activity patterns of industrial longline fishing vessels reporting location via AIS, rather than the many smaller vessels "}, {"matched_terms": "from", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "In this study we estimated that the blue shark was potentially exposed to higher than average overlap and fishing effort in North Atlantic space use areas (Fig. 3a), principally from longline fishers but also by purse seiners in the eastern North Atl"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". 2c, d). It is noteworthy that of the most frequently tracked species in this study, blue sharks have the highest exposure to longline in all the major space use hotspots we identified with fishery-independent tracking data in the North Atlantic (Fi"}, {"matched_terms": "with", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". It is noteworthy that of the most frequently tracked species in this study, blue sharks have the highest exposure to longline in all the major space use hotspots we identified with fishery-independent tracking data in the North Atlantic (Figs 1, 3a"}, {"matched_terms": "industrial", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". The absence of strict catch controls for blue shark may be problematic in the light of our study. Given our results showing major North Atlantic blue shark space use hotspots are nearly entirely overlapped by industrial longline fishing with high a"}, {"matched_terms": "ais", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "Similarly, overlap of east and southwest Pacific blue sharks was above average but overall fishing effort they were exposed to in overlapped areas was low, with sparse AIS longline and purse seine fisheries in off-shelf waters (Fig. 2, 3b,d; Extended"}, {"matched_terms": "with", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". In the southwest Indian Ocean the overlap-FEI values for blue sharks were found to be near the lowest risk zone, with moderate overall spatial overlap with longline fisheries (40%) but at lower than average effort level (Fig. 3c). Results indicate"}, {"matched_terms": "industrial", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "by small vessel fleets operating from islands not being equipped with AIS. Furthermore, the heterogeneous habitats present in the Caribbean may make them problematic to fish by large industrial longline and purse seine vessels. 2.6.4 Western North At"}, {"matched_terms": "is", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ".4 Western North Atlantic porbeagle and white sharks Space use of porbeagle and white sharks determined by satellite tracking that is fisheryindependent showed both species to have hotspots in the Gulf Stream ecosystem (Extended Data Figs. 6, 7). The"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "effort co-occurrence could explain the historical overfishing for these species, where sharp declines in catches have been observed16,18,26. Our results demonstrate that the potential for incidental capture by pelagic longlines remains high where the"}, {"matched_terms": "with", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "Porbeagle sharks in the southwest Pacific off New Zealand were also identified in our analysis as having relatively high spatial overlap with longline vessels and exposed to higher than average fishing effort in those space use areas (Fig. 3d; Extend"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "ago with the potential for a stable or increasing population size. Whereas the biologically distinct porbeagle of the North Atlantic has been the subject of a directed pelagic longline fishery as well as bycatch from bottom trawls and gillnets, in th"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "Whereas the biologically distinct porbeagle of the North Atlantic has been the subject of a directed pelagic longline fishery as well as bycatch from bottom trawls and gillnets, in the south Pacific catches are made primarily as bycatch from tuna lon"}, {"matched_terms": "tuna", "section": "accepted", "total_freq": "1", "threshold": "1", "context": "directed pelagic longline fishery as well as bycatch from bottom trawls and gillnets, in the south Pacific catches are made primarily as bycatch from tuna longline vessels67. Porbeagle off New Zealand are taken as bycatch by drifting pelagic longline"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "Pacific catches are made primarily as bycatch from tuna longline vessels67. Porbeagle off New Zealand are taken as bycatch by drifting pelagic longlines but also by trawlers (bottom and midwater) and bottom longliners68. They have been managed in New"}, {"matched_terms": "by", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "Pacific catches are made primarily as bycatch from tuna longline vessels67. Porbeagle off New Zealand are taken as bycatch by drifting pelagic longlines but also by trawlers (bottom and midwater) and bottom longliners68. They have been managed in New"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". Porbeagle off New Zealand are taken as bycatch by drifting pelagic longlines but also by trawlers (bottom and midwater) and bottom longliners68. They have been managed in New Zealand waters with catch quotas since 2004 given the uncertainty in stoc"}, {"matched_terms": "by", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "declines in CPUE in the early 2000s (ref. 68). Furthermore, shark finning was banned in New Zealand in 2014 resulting in porbeagle catch by longliners being discarded 65. Although there is high mortality of porbeagle from longliners due to the discar"}, {"matched_terms": "from", "section": "rejected:common_word"
