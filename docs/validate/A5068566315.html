old": "1", "context": "pelagic longline fishing, which extends throughout tropical and temperate regions of the world’s oceans (Lewison et al., 2004; Werner et al., 2006). The longlines are deployed in a daily operation to catch large tuna (Thunnus spp.) and billfish (Isti"}, {"matched_terms": "deep", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "hooks are deployed each day on branchlines attached to mainlines that may span 100 km of the sea surface. Fishers adjust bait, longline depth range, and the timing of operations to target particular species. For example, deep longlines (25–400 m) are"}, {"matched_terms": "shallow", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". For example, deep longlines (25–400 m) are typically deployed at dawn and hauled in the late afternoon – evening to catch tuna. Shallow longlines (25–175 m) with squid bait are deployed in the afternoon and hauled in the morning to catch broadbill "}, {"matched_terms": "for", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "Several management agencies have mandated bycatch mitigation measures, such as bird-scaring “tori” lines, to reduce the mortality of seabirds that dive for longline bait, e.g., vulnerable wandering albatross (Diomedea exulans) (Brothers et al., 1999;"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "coriacea), are also threatened by pelagic longlining. Measures to reduce sea turtle interactions and mortality include large circle hooks and the deep setting of longlines (Watson et al., 2004, 2005; Gilman et al., 2006; Watson and Kerstetter, 2006)."}, {"matched_terms": "with", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "2005; Gilman et al., 2006; Watson and Kerstetter, 2006). Sharks (Elasmobranchii) are another group of vulnerable animals that interact with longlines. Concern over shark mortality has led to restrictions on landing sharks and bans on “finning”, where"}, {"matched_terms": "retrieve", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "finning and landing often result in sharks being cut free. Many of those that are released alive may survive (Moyes et al., 2006). However, fishers may also dispatch sharks to retrieve longline hooks, which limits the effectiveness of those bans in r"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": ". (2006), for example, found no significant difference in catch rates of blue shark between tuna hooks and circle hooks for two pelagic longline vessels (p = 0.48 and 0.43). However, Watson et al. (2005) found that blue shark catch rates were 8–9% hi"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "more effective way to reduce shark bycatch may be to ban wire leaders or “steel traces”. Fishers have used wire leaders since the 1920s to reduce the loss of longline fishing gear and hooked animals that are able to sever leaders constructed from nat"}, {"matched_terms": "many", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". Fishers have used wire leaders since the 1920s to reduce the loss of longline fishing gear and hooked animals that are able to sever leaders constructed from natural or synthetic fibres. Many longline fishers began using nylon monofilament leaders "}, {"matched_terms": "tuna", "section": "accepted", "total_freq": "1", "threshold": "1", "context": "a proportion of their branchlines (Gilman et al., 2008; Ward and Hindmarsh, 2007). To reduce shark bycatch, Australia banned the use of wire leaders in its eastern tuna longline fishery in 2005. However, there are few published studies of the effects"}, {"matched_terms": "one", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "ambiguous because of small sample sizes or inappropriate experimental design. Berkeley and Campos (1988), for example, monitored one longline vessel fishing for swordfish with about 25% wire leaders and 75% nylon leaders in 13 longline operations. Th"}, {"matched_terms": "13", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". Berkeley and Campos (1988), for example, monitored one longline vessel fishing for swordfish with about 25% wire leaders and 75% nylon leaders in 13 longline operations. They reported fewer sharks on wire leaders than on nylon, but the difference w"}, {"matched_terms": "survey", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "but the difference was not statistically significant. Branstetter and Musick (1993) placed 50 branchlines with nylon leaders on the end of survey longlines that comprised 100 branchlines with wire leaders. Overall, catch rates of sharks were higher o"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "results are also relevant to measuring the relative abundance of pelagic animals from catch and fishing effort data. For pelagic longline fisheries, abundance indices are often based on commercial catch rates or the “catch-per-unit-effort” (CPUE) tha"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "animals and their behaviour in relation to the fishing practices and gear.  101  Fig. 1. Map of the study area showing the distribution and intensity of longline fishing effort.  2. Methods We compared catches on nylon and wire leaders deployed by fi"}, {"matched_terms": "commercial", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". Map of the study area showing the distribution and intensity of longline fishing effort.  2. Methods We compared catches on nylon and wire leaders deployed by five commercial longline fishing vessels during September 2005–December 2006 off northeas"}, {"matched_terms": "one", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "the branchline 5 m above the hook. The nylon leaders did not have a weighted swivel. They were 2 mm diameter (250–300 kg breaking strain) nylon. One longline vessel used 30 cm double nylon leaders. The nylon monofilament is a copolymer, with  Fig. 2."}, {"matched_terms": "each", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "Management Authority, monitored experimental protocols and collected data on the vessels. Roughly, equal numbers of nylon and wire leaders were deployed on each longline. Crewmembers were instructed to attach the different types of leader, bait speci"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "and wire leaders were deployed on each longline. Crewmembers were instructed to attach the different types of leader, bait species, and lightsticks randomly along the longline. Observers regularly monitored the sequence of lightsticks, bait, and lead"}, {"matched_terms": "each", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "deployed and retrieved, the number of branchlines retrieved with the leader severed, and the number of each leader type repaired after each longline operation were counted. For retained, discarded, and released animals, observers recorded the type of"}, {"matched_terms": "177", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". The model included a random vessel effect to allow for correlations among the operations of each vessel. 3. Results Observers monitored 177 longline operations consisting of 75,101 hooks (37,679 nylon leaders and 37,422 wire leaders). The vessels c"}, {"matched_terms": "500", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". The vessels deployed 9 or 10 branchlines between buoys, with the maximum depth of hooks estimated to range down to about 170 m (Campbell et al., 1997). They usually deployed 500 longline hooks at dawn or dusk each day. Wire and nylon leaders attach"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Wire and nylon leaders attached to branchlines were stored in the same bin. Deployment lasted about 2 h on average, and then the longline was allowed to drift for about 7 h. Hauling usually commenced in the mid-afternoon or early morning and lasted"}, {"matched_terms": "86", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "A runs test (Zar, 1984) at the 0.05 level of statistical significance indicated that the sequence of nylon and wire leaders was random for 80 of the 86 longline operations (93%) where observers recorded data on the sequence. However, some of the samp"}, {"matched_terms": "monitored", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "samples were heavily weighted towards one leader type, suggesting that a larger number of non-random operations may have been detected if observers had monitored the entire sequence. Regardless, data from all monitored longline operations were includ"}, {"matched_terms": "per", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "bias into parameter estimates. There was considerable variation in bite-off rates from nylon leaders. They ranged up to 53.3% per longline operation (mean = 5.1 ± 7.0% S.D.). By comparison, observers reported few bite-offs for wire (mean = 0.2 ± 0"}, {"matched_terms": "19", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "The effect of soak time was not significant (p > 0.05), perhaps because most operations had a similar duration. Observers counted repairs for 19 longline operations. Repairs included bite-offs as well as damaged or abrad
