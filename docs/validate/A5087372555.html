d using cycloheximidesensitive oxygen consumption, constituted 80 % of total cellular respiration, compared with an energy requirement of about 3 % for the Na"}, {"matched_terms": "3 %", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "(Oncorhynchus mykiss), determined using cycloheximidesensitive oxygen consumption, constituted 80 % of total cellular respiration, compared with an energy requirement of about 3 % for the Naf /Kf pump, as estimated by ouabain-sensitive oxygen consump"}, {"matched_terms": "50%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "the isolated perfused rectal gland of S. acanthias, obtained resting oxygen-consumption rates of 18 pmol 02/(g h) at 15\"C, which decreased by 50% when the gland was perfused with 0.1 mM ouabain. Shuttleworth and Thompson (1980) measured the oxygen co"}, {"matched_terms": "22 %", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "measured the oxygen consumption in rectal gland tissue of S. canicula at 11\"C as 5.2 pmol 02/(g - h), with the proportion that was ouabain-sensitive estimated at 22 %. In a recent study using late-term embryos of S. acanthias, Kormanik and Totten (19"}, {"matched_terms": "64 %", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "and Totten (1993) recorded an oxygen uptake in rectal gland tissue of 9.8 pmol 02/(g . h) at 15\"C, and found that the ouabain-sensitive portion represented 64 % of total tissue respiration. That study also measured the oxygen consumption in dogfish g"}, {"matched_terms": "24%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "respiration. That study also measured the oxygen consumption in dogfish gills, which was 4.9 pmol 02/(g h) and was reduced by 24% following the addition of ouabain, similar to the findings of our study. No other values for oxygen consumption in the d"}, {"matched_terms": "25 %", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". No other values for oxygen consumption in the dogfish gill could be found, but it is interesting that in the gills from seawater-adapted flounder (Platichthys Jlesus), ouabain also caused a decline of about 25 % in oxygen consumption (Stagg and Shu"}, {"matched_terms": "9.8 %", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ".0 kg; Table 2), total rectal gland and gill oxygen consumption would be 19.8 and 196.8 pmol 02/h, respectively. These values account for 1 and 9.8 % of standard metabolic rate in S. acanthias. The higher gill component is due to its greater overall "}, {"matched_terms": "7 %", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". acanthias. The higher gill component is due to its greater overall mass in the fish, and is similar to the estimate of 7 % obtained by Johansen and Pettersson (198 1) using isolated perfused gills of the marine cod Gadus morhua. The rectal gland is"}, {"matched_terms": "0.5 %", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "most of the ouabain-sensitive oxygen consumption measured in the rectal gland was related to organismal NaCl transport. This amounts to 11.1 pmol 02/h or 0.5 % of standard metabolism, when expressed on the basis of total fish mass. The cost of NaCl t"}, {"matched_terms": "0.4 %", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "gland in this study is quite comparable to the theoretical calculations of Kirschner (1993) for S. canicula and R. erinacea (0.1 and 0.4 % of standard metabolism, respectively). Kirschner (1993) actually considered rectal gland energetics to be a min"}, {"matched_terms": "14.6%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". He determined that most of the energy demand for osmoregulation arises from the synthesis and renal reabsorption of urea, accounting for 10.3 - 14.6% of whole-animal oxygen consumption. In the
