rs acros"}, {"matched_terms": "and", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Sampling was conducted during the summer months (June–August) from 2009 to 2012. All sampling stations are depicted in Fig. 1. We employed two gear types: gillnet and longline; both were fished concurrently for one hour at each station sampled. The"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "gillnet was three m deep and 183 m long and consisted of six panels 30.5 m in length consisting of 1.3 mm incremental stretch mesh sizes ranging from 7.6 cm to 14.0 cm. The longline consisted of an approximately 1500 m mainline of 4.0 mm monofilament"}, {"matched_terms": "each", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "including gear specifications and animal sampling methods can be found in Peterson et al. (2017). Environmental parameters were recorded for each longline and gillnet set. Salinity, temperature (°C), and dissolved oxygen (ppm) were measured at surfac"}, {"matched_terms": "each", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "YSI Pro 2030 handheld water quality meters. Water clarity (cm) was measured using a secchi disc. Maximum and minimum depths (m) were recorded for each longline and gillnet set using on-board sonar. Bottom type was also recorded based on qualitative o"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Because these analyses cannot operate with missing values, sets with zero catch were omitted, and therefore sets in which only ubiquitous or rare species were captured were also omitted (McCune and Grace 2002). This left 140 sets and data for 10 sp"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "important to note that sites missing data for any  \fEnviron B paration between clusters in the NMDS of the longline data than the gillnet data (Fig. 6 a). Vector  \fEnviron Biol Fish Fig. 2 Spatial distribution of sampling stations b"}, {"matched_terms": "and", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "longline data than the gillnet data (Fig. 6 a). Vector  \fEnviron Biol Fish Fig. 2 Spatial distribution of sampling stations by gillnet (top) and longline (bottom) cluster designation  and factor fitting of the longline NDMS) indicated cluster designa"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". 2 Spatial distribution of sampling stations by gillnet (top) and longline (bottom) cluster designation  and factor fitting of the longline NDMS) indicated cluster designation to be a significant factor (p < 0.01) in the ordination structure. Survey"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "represent medians, boxes extended to 1st and 3rd quartiles, whiskers represent largest value within 1.5x interquartile range, and dots represent outliers  results or unacceptably high stress. Analysis of the longline data with all species was accepta"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "results or unacceptably high stress. Analysis of the longline data with all species was acceptable, but was not anymore informative, and analysis of the longline data with rare species, but without ubiquitous species, produced erroneous results. Gene"}, {"matched_terms": "20", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "0.29  0.31  0.09  0.47  Lagodon rhomboides  7  0.86  0.75  0.65  <0.01  Paralichthys albigutta  7  0.29  0.46  0.13  0.20  Longline also allowed for sampling of both the smallest and largest sharks, from neonate Atlantic sharpnose sharks to adult tig"}, {"matched_te
