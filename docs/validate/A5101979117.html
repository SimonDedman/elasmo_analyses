r 3–5 h. These differences resulted in longlines presenting a larger target for species that may encounter baits purely by chance, and also those that can orient upst"}, {"matched_terms": "and", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "East Australian Current during the deployments of each gear (all 42.5 h). There is evidence for some ﬁsh species to have different catch behaviour at different setting times and longline direction relative to the current (Lokkeborg and Pina, 1997). H"}, {"matched_terms": "our", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "catch behaviour at different setting times and longline direction relative to the current (Lokkeborg and Pina, 1997). However our longlines were consistently set in the direction of current and all  equipment was set pre-dawn to avoid this kind of ef"}, {"matched_terms": "on", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "and equivalent bait dispersal for both techniques appeared to be substantiated by the abundance of ﬁsh sampled in relation to the weight of bait used by each gear (15 kg on longline, 1 kg per BRUVs) which was remarkably similar at \u000211–12 ﬁsh/kg bait."}, {"matched_terms": "by", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "using BRUVs needs further investigation—emulating work conducted in shallow reef environments (Fitzpatrick et al., 2013). A total of 773 gulper sharks (5 species) was caught by longlines while only 10 individuals (2 species) were observed by BRUVs (T"}, {"matched_terms": "from", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". For this reason, it is possible that gulper sharks may have been attracted away from BRUVs, even though they were positioned 500–1000 m from longlines; 500 m is an accepted non-interaction distance, at least for demersal ﬁsh on the shelf  \fD.L. McL"}, {"matched_term
