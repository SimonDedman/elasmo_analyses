ly that the reporting reflects the true p"}, {"matched_terms": "80%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "and year-on-year increase in landings across the SWIO (Fig. 4) little independent research has been undertaken on these fisheries. There is a notable imbalance ([80% of peerreviewed papers) between studies focussing on elasmobranchs in the industrial"}, {"matched_terms": "26%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "dried fish products (WB 2016a). Alternatively, these declines may reflect stock collapses. Blue shark is a major constituent, accounting for 26% of the 19.97 mt landings in 2012 (Soilihi 2014). Other commonly reported catch includes a variety of ocea"}, {"matched_terms": "96%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "in both static (775 kg/vessel/year) and trolled (830 kg/ vessel/year) handlines than in net fisheries (2.20 kg/ vessel/year). Indeed, handlines account for nearly 96% of the reported blue shark landings. Given the seemingly greater CPUE for sharks in"}, {"matched_terms": "60%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". 2011; Randriamiarisoa and Rafomanana 2005) and likely for the vast majority of batoid catch. In  123  some areas elasmobranchs may account for as high as 50–60% of the overall catch (Andriantsoa and Randriamiarisoa 2013; de Feu 1998). Elasmobranch "}, {"matched_terms": "0.8%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "Mauritius reported artisanal landings of 0.456 mt of elasmobranchs in 2013 (Albion Fisheries Research Centre unpublished data), representing around 0.8% of the total fisheries landings by weight. In contrast, interview surveys suggest around 6000 ela"}, {"matched_terms": "97%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "catch effectively, the magnitude of difference suggests official reports are substantial u
