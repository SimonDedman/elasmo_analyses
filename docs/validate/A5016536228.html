ion rates in a commercial trolling fishery, to quantify depredation in a Western Australian commercial fishery, and to asse"}, {"matched_terms": "commercial", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "This study is one of the first globally to quantify shark depredation rates in a commercial trolling fishery, to quantify depredation in a Western Australian commercial fishery, and to assess how gradients in fishing activity and environmental variab"}, {"matched_terms": "commercial", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "MMF ranges across 15° of latitude). We found that depredation rates in the MMF were at the lower end of the range recorded in commercial longline and recreational fisheries worldwide (Gilman et al. 2008, Mitchell et al. 2018b). We also found that dep"}, {"matched_terms": "recreational", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". Shark depredation rates The low rate of depredation in the current study compared to other studies in Western Australia (7.2−13.7% in a recreational fishery; Mitchell et al. 2018a) and in commercial longline fisheries elsewhere (1.9−20.74%; Lawson "}, {"matched_terms": "commercial", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "The low rate of depredation in the current study compared to other studies in Western Australia (7.2−13.7% in a recreational fishery; Mitchell et al. 2018a) and in commercial longline fisheries elsewhere (1.9−20.74%; Lawson 2001, Dalla Rosa & Secchi "}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". 2015, Mitchell et al. 2018b) may be due to differing fishing practices. For instance, sharks have greater opportunity to depredate in longline fisheries where fish are hooked over a period of several hours (Gilman et al. 2008, MacNeil et al. 2009),"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Any associated error with this was reduced with the removal of known irregularly reporting skippers and those with minimal experience in the fishery who may not record events accurately. The assumption that sharks were the depredating taxa has mini"}, {"matched_terms": "trolling", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "incidents of depredation from other taxa (which fishers suggested made up <1% of depredation incidents) were removed, the shark depredation rates recorded would still fall within the error ranges given. The current study of depredation rates in a com"}, {"matched_terms": "commercial", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". The current study of depredation rates in a commercial trolling fishery expands on the existing literature, which has focussed on commercial longline or recreational line fisheries, and provides a basis for future studies of depredation in other co"}, {"matched_terms": "trolling", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "2010, Collin 2012, Chapuis et al. 2019). The importance and trend of increasing depredation with in-  \fCarmody et al.: Shark depredation in a trolling fishery  creasing commercial fishing effort and proximity to town centre in Zones 1 and 2 suggest t"}, {"matched_terms": "for", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "depredation rates observed in this study is consistent with actual patterns of fishing effort. In turn this may provide information for fishery managers as to how they can best reduce depredation, for example by reducing the spatial and/or temporal c"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". In the current study, we found a trend of increasing depredation from 2006 to 2018 in the central and southern areas of the fishery (Zones 2 and 3), where rates were estimated to have almost doubled in both zones. This trend is supported only parti"}, {"matched_terms": "trolling", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "within the vicinity of their home port, which differ within and between zones. Some skippers reported  \fCarmody et al.: Shark depredation in a trolling fishery  that they modified their fishing methods in response to depredation (Supplement 1) and th"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "Shark depredation, although currently at levels <10%, could have implications for the management of the MMF. To some degree the fishery relies on targeting S. commerson aggregations that occur in the higher fishing effort blocks with significant amou"}, {"matched_terms": "this", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "region. Depredation could have biological impacts across this region. The extra mortality associated with depredation in this fishery (1.7−5.7%), coupled with unknown but likely higher losses from recreational fishers, could negatively impact S"}, {"matched_terms": "commercial", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "potential behavioural associations between fishing activities and feeding opportunities for sharks. This study is one of the first to quantify shark depredation in a commercial fishery in Western Australia and in a commercial trolling fishery globall"}, {"matched_terms": "trolling", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "This study is one of the first to quantify shark depredation in a commercial fishery in Western Australia and in a commercial trolling fishery globally, creating a baseline for future research. The considerable spatial and temporal scale of this stud"}, {"matched_t
