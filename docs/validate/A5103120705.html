he actual in vivo yolk concentrations. TMAO content was significantly lower in 4-month embryos (–27%) but not in 8-month embryos exposed to 75% seawater. In contrast, the total of other osmolytes was significa"}, {"matched_terms": "75%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "but is necessary in order to understand the actual in vivo yolk concentrations. TMAO content was significantly lower in 4-month embryos (–27%) but not in 8-month embryos exposed to 75% seawater. In contrast, the total of other osmolytes was significa"}, {"matched_terms": "33%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "(–27%) but not in 8-month embryos exposed to 75% seawater. In contrast, the total of other osmolytes was significantly lower in the 8-month embryos (–33%) but not in the 4-month embryos. Glycine was downregulated to undetectable levels in both 4- and"}, {"matched_terms": "3%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Glycine was downregulated to undetectable levels in both 4- and 8-month embryonic tissue, although it only constitutes 2–3% of the total value for other osmolytes and is not strongly implicated in tissue osmotic regulation in adult elasmobranchs"}, {"matched_terms": "50%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "decrease in erythrocyte glycine content as well as brain, muscle and erythrocyte β-alanine levels in R. erinacea exposed to 50%  \fUreosmotic regulation in elasmobranch embryos 2029 SW. Our findings agree with the adult data, in that there was a large"}, {"matched_terms": "75%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Our findings agree with the adult data, in that there was a large decrease in β-alanine in 8-month embryonic tissue with exposure to 75% SW. Three of the solutes measured here – myo-inositol, GPC and creatine – have not been typically analyzed in e"}, {"matched_terms": "100%", e. In fact, the magnitude of this response was much higher in the 4-month embryos (Fig.·1)"}, {"matched_terms": "75%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ".·1) relative to the 8-month embryos (Fig.·2). Indeed, the difference in whole embryo urea content (tissue plus yolk) between control and 75% seawater exposed embryos is approximately 68·mmol·kg–1·wet·mass, less than that lost by excretion over the e"}, {"matched_terms": "6.8%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "not surprisingly, much lower than activities in adult liver. Lechenault et al. (1993) reported that the liver constituted only 4.8–6.8% of the total body wet mass of Scyliorhinus canicula (an oviparous dogfish) neonates. If one assumes that all of th"}, {"matched_terms": "44%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "CPSase III activity in embryos. This may not be the case, because in 8-month muscle tissue the CPSase III activity was 0.008±0.001·µmol·min–1·g–1 or 44% of the total whole embryo CPSase III activity (Table·3). Thus, a significant component of CPSase "}, {"matched_terms": "18%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "., 2001), but to our knowledge never in elasmobranchs. In addition, Gsase, OTCase and arginase activities in skeletal muscle tissue were 18%, 70% and 13% compared to whole embryo enzyme activities, respectively (Table·3). It appears, therefore, that "}, {"matched_terms": "70%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "., 2001), but to our knowledge never in elasmobranchs. In addition, Gsase, OTCase and arginase activities in skeletal muscle tissue were 18%, 70% and 13% compared to whole embryo enzyme activities, respectively (Table·3). It appears, therefore, that "}, {"matched_terms": "13%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "., 2001), but to our knowledge never in elasmobranchs. In addition, Gsase, OTCase and arginase activities in skeletal muscle tissue were 18%, 70% and 13% compared to whole embryo enzyme activities, respectively (Table·3). It appears, therefore, that "}, {"matched_terms": "75%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". The discrepancy may be due to species or methodological differences. We predicted that if embryos were capable of acclimating to 75% SW, they would decrease the rate of urea synthesis by lowering the levels of OUC enzyme activities and/or increase "}, {"matched_terms": "75%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "increase the rate of urea excretion, in order to achieve a lower tissue content of urea. There were several distinct differences in the response of 4- and 8-month old embryos to 75% SW, but at both stages there were no significant changes in OUC enzy"}, {"matched_terms": "50%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "Goldstein and Forster (1971) reported an increase in renal urea clearance, but no change in total body urea clearance in adult little skates exposed to 50% SW for 5 days. They suggested that urea synthesis may be diminished in dilute seawater (althou"}, {"matched_terms": "75%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Price and Creaser, 1967; Goldstein and Forster, 1971). Indeed, we have discovered a downregulation of hepatic arginase in adult skates acclimated to 75% SW (S. Steele, P. Yancey, P. Wright, manuscript submitted for publication). After 5 days in dil"}, {"matched_terms": "100%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "Steele, P. Yancey, P. Wright, manuscript submitted for publication). After 5 days in dilute seawater, embryos were recovered in 100% SW for 3 days. An initial decrease in urea excretion rates might enhance the retention of urea to bring levels close"}, {"matched_terms": "100
