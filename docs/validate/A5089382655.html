", "context": "(Table 2). The estimated values in Table 2 indicate that the transfer of bull sharks from SW to FW caused an approximately 50% increase in reabsorption of NaCl from the glomerular filtrate. It should be noted that, because of the larger osmotic diffe"}, {"matched_terms": "50%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "indicated by arrows) and anti-NKA antibody (green). Scale bars=20 µm.  compared with Atlantic stingrays transferred to 50% SW. In other words, bull sharks in the FW environment likely filter more plasma and excrete more urine compared with stingrays"}, {"matched_terms": "50%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "values in Table 2 indicate a 1.5 times increase in NaCl reabsorption, which is lower than the value in stingrays acutely transferred to 50% SW (2.5 times increase) (Janech et al., 2006), but a greater increase in NaCl reabsorption is assumed in FW-ac"}, {"matched_terms": "30%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "NCC mRNA were considerably lower compared with those in the kidney of FW-acclimated bull sharks, and no significant change was observed in NCC mRNA levels between SW- and 30% SWacclimated houndsharks. In situ hybridization further demonstrated that N"}, {"matched_terms": "30%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". In contrast to the kidney, NCC mRNA levels and the number of NCC-expressing cells in the gill increased in houndsharks after the transfer from SW to 30% SW (Takabe et al., 2016). In houndsharks, NCC is more likely to be important in the gills for a"}, {"matched_terms": "30%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "contributing to NaCl reabsorption, in comparison to the kidneys of SW-acclimated bull sharks and houndsharks in SW and 30% SW, is most likely important for highly effective NaCl retention in FW environments (Fig. 7). Alte
