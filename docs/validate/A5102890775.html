en-access article distributed under the terms of the Creative Commons Attribution 4.0 International (CC BY 4.0) License.  \f152 • M. Freitas et al.  INTRODUCTION The deep-sea fishery of the bathypelagic black scabbardfishes, Aphanopus c"}, {"matched_terms": "this", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "around the Madeira archipelago, representing one of the world’s longest standing exploitations of meso- and bathypelagic fishes (Delgado et al. 2013, 2018). Off Madeira this fishery is performed with midwater drifting longlines set between 800 and 12"}, {"matched_terms": "drifting", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "the world’s longest standing exploitations of meso- and bathypelagic fishes (Delgado et al. 2013, 2018). Off Madeira this fishery is performed with midwater drifting longlines set between 800 and 1200 m depth over the continental slope and nearby sea"}, {"matched_terms": "scabbardfish", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "published by Pajuelo et al. (2010). Ten years ago, Portugal and Spain signed an agreement to study the impact of the black scabbardfish fishery off the Canary Islands, using commercial fishery vessels from Madeira in an experimental survey. The main "}, {"matched_terms": "commercial", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "Ten years ago, Portugal and Spain signed an agreement to study the impact of the black scabbardfish fishery off the Canary Islands, using commercial fishery vessels from Madeira in an experimental survey. The main objectives were i) to study deep-sea"}, {"matched_terms": "madeiran", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "fishery off the Canary Islands, using commercial fishery vessels from Madeira in an experimental survey. The main objectives were i) to study deep-sea sharks as a by-catch of this Ma
