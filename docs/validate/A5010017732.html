in 0.1 M phosphate buffer, 4% paraformaldehyde in 0.1 M phosphate buffer, and Karnovsky’s; 2% paraformaldehyde and 2.5% glutaldehyde in 0.1 M cacodylate"}, {"matched_terms": "2.5%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "was excised from each specimen and preserved in a range of aldehyde-based fixatives (10% formalin in 0.1 M phosphate buffer, 4% paraformaldehyde in 0.1 M phosphate buffer, and Karnovsky’s; 2% paraformaldehyde and 2.5% glutaldehyde in 0.1 M cacodylate"}, {"matched_terms": "1.3%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Each brain was blotted and weighed to the nearest 0.01 g. The sampling error of using this method was estimated to be less than 1.3%, based on ten repeated measurements of brains from six different species. Brain masses were not corrected for shrin"}, {"matched_terms": "81.06%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "were identified using the criteria of Northcutt [1977, 1978], dissected, and weighed to give the relative size of each brain area as a proportion of total brain mass. The sampling error of using this method was estimated to be 81.06%, based on ten re"}, {"matched_terms": "3.2%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "The relative size of each brain area was independently assessed using both methods in individuals of four species. The maximum variation found from using both methods was less than 3.2%, which is within the range of the intraspecific variation in the"}, {"matched_terms": "20%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". For standard error values and species abbreviations see table 1.  telencephalons and enlarged cerebellums, with these areas occupying at least 50 and 20% of their total brain, respectively. Sphyrna mokarran, in particular, has evolved a particularl"}, {"matched_terms": "67%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "telencephalons and enlarged cerebellums, with these areas occupying at least 50 and 20% of their total brain, respectively. Sphyrna mokarran, in particular, has evolved a particularly large telencephalon that accounts for almost 67% of its brain. Mem"}, {"matched_terms": "31%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "a particularly large telencephalon that accounts for almost 67% of its brain. Members of the genus Alopias also have extremely enlarged cerebellums comprising, on average, 31% of their total brain. Unlike Sphyrna, however, the telencephalon of these "}, {"matched_terms": "26%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "have extremely enlarged cerebellums comprising, on average, 31% of their total brain. Unlike Sphyrna, however, the telencephalon of these animals comprises only 26% of the total brain size. Rather, Alopias also shows a larger than average mesencephal"}, {"matched_terms": "16%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "the telencephalon of these animals comprises only 26% of the total brain size. Rather, Alopias also shows a larger than average mesencephalon (accounting for, on average, 16% of the total brain). Both holocephalan species have an enlarged medulla and"}, {"matched_terms": "13%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "shark [Last and Stevens, 1994; Compagno, 1999], demersal benthic sharks have average-sized telencephalons, cerebellums, and medullas. They do, however, have slightly enlarged mesencephalons, averaging approximately 13% of their total brain. More reef"}, {"matched_terms": "27%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". More reef-associated benthic species, such as Orectolobus and Brachaelurus waddi, have reduced mesencephalons and enlarged medulla, constituting on average 9 and 27%, respectively, of the brain. Others, such as members of Hemiscyllidae, have enlarg"}, {"matched_terms": "16%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Others, such as members of Hemiscyllidae, have enlarged telencephalons and cerebellums and reduced medullas (the medulla accounts for only approximately 16% of their brains). Bathyal and demersal benthopelagic species show similar trends in brain d"}, {"matched_terms": "25%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". These sharks generally have well developed mesencephalons and medullas, with these structures comprising on average 14 and 25%, respectively, of their brain, but have reduced telencephalons and have fairly average-sized cerebellums. An exception to"}, {"matched_terms": "50%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". In contrast, reef-associated benthopelagic species, such as members of Carcharhinus, show extremely enlarged telencephalons, accounting for over 50% of their total brain. The brains of pelagic species tend to show specialization rather than general"}, {"matched_terms": "25%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". In the lamniform species (Alopias, Carcharodon, Isurus, and Pseudocarcharias), the mesencephalons and medulla are hypertrophied, accounting for, on average, 17 and 25% of the total brain, respectively. Alopias and Pseudocarcharias also show extreme"}, {"matched_terms": "54%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Pelagic carcharhiniform sharks (Carcharhinus brachyurus, C. falciformes, Galeocerdo, Prionace, and Sphyrna) show hypertrophy of the telencephalon, which comprises at least 54% of their total brain, whereas the mesencephalons, medulla, and diencepha"}, {"matched_terms": "17%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "majority of truly oceanic species from either order have an enlarged mesencephalon that com
