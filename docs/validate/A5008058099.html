jskesi; 6%) and Cownose ray (R. bonasus; 1%) were less abundant (Fig. 3). Mean catch rate of rays in the noBT net ranged from 6.3 ± 3.1 to 45 ± 19.6 ind. h−1 (average ± S"}, {"matched_terms": "36.1%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ".3 ± 1.9 rays ha−1 trawled in the study area. Overall, mean catch rate of rays (over all hauls) was signiﬁcantly reduced by 36.1% in the wBT net (15.3 ± 13.2 ind. h−1 ) compared to the noBT net (23.9 ± 19.2 ind. h−1 ; p < 0.001). Signiﬁcant reduction"}, {"matched_terms": "76.6%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "the noBT net (23.9 ± 19.2 ind. h−1 ; p < 0.001). Signiﬁcant reduction in catch rate in the wBT net was observed for D. geijskesi (−76.6%), D. guttata (−40.2%) and G. micrura (−32.1%; all p < 0.001). Catch rate reductions in R. bonasus and U. micropht"}, {"matched_terms": "40.2%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". h−1 ; p < 0.001). Signiﬁcant reduction in catch rate in the wBT net was observed for D. geijskesi (−76.6%), D. guttata (−40.2%) and G. micrura (−32.1%; all p < 0.001). Catch rate reductions in R. bonasus and U. microphthalmum were not signiﬁcant (F"}, {"matched_terms": "32.1%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Signiﬁcant reduction in catch rate in the wBT net was observed for D. geijskesi (−76.6%), D. guttata (−40.2%) and G. micrura (−32.1%; all p < 0.001). Catch rate reductions in R. bonasus and U. microphthalmum were not signiﬁcant (Fig. 3). Size of ra"}, {"matched_terms": "20.6%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "which did not differ from any other species (Fig. 4). Rays caught in the wBT net (avg. 25.5 ± 12.4 cm) were on average 20.6% smaller than rays caught in the noBT net (avg. 32.2 ± 18.6 cm; p < 0.001). Size reduction in the wBT net was signiﬁcant for D"}, {"matched_terms": "37.8%", "section": "percentage",
