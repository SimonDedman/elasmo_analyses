1 ﬁllets labelled as shark. Of these, 64 (70%) were mislabelled, and 9 comprised three species listed as threatened in Australia, the scalloped hammerhead (Sphryna lewini),"}, {"matched_terms": "70%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "(Squalus chloroculus) and school shark (Galeorhinus galeus). The scalloped hammerhead and greeneye spurdog were being sold under the label ‘ﬂake’. Overall, 70% of samples were mislabelled and the proportion of mislabelling was signiﬁcantly greater in"}, {"matched_terms": "70%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Currently, approximately onethird of all shark, ray and skate species are threatened with extinction (Dulvy et al. 2021) and the abundance of some species of oceanic sharks has declined by more than 70% in the past half century, coinciding with an "}, {"matched_terms": "3%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "and Dulvy 2017). Monitoring catch rates is critical for eﬀective management, yet formal stock assessments exist for only 3% of all chondrichthyan species worldwide (Pacoureau et al. 2023). Managing catch rates is further hampered by poor traceability"}, {"matched_terms": "94%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "Internationally, seafood mislabelling is common (Pardo et al. 2016), and is particularly high in the shark and ray trade, with reports of up to 94% of shark ﬁllets sold being mislabelled (Griﬃths et al. 2013; Agyeman et al. 2021). Poor labelling can "}, {"matched_terms": "95%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "were taken from each vendor on the same day to minimise the chance of duplication of individual sharks. A tissue sample from each ﬁllet was preserved in 95% ethanol and stored at room temperature. For each sample we recorded the retailer, location, d"}, {"matched_terms": "98%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "2000). We conﬁrmed species identiﬁcation when the following conditions were met: the highest percentage identity (PI) was ≥98%, which ensures that the sample is well matched to the reference sequence (Wong et al. 2009), and query cover ≥90% (i"}, {"matched_terms": "90%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "conditions were met: the highest percentage identity (PI) was ≥98%, which ensures that the sample is well matched to the reference sequence (Wong et al. 2009), and query cover ≥90% (i.e. the extent of overlap between the homologous sequences). Assign"}, {"matched_terms": "98%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "with the Barcode of Life Data System (BOLD, see www. boldsystems.org; Ratnasingham and Herbert 2007) for the species where sequences matched with a PI ≥ 98%. To further conﬁrm identiﬁcation at the taxonomic level of genus we searched the NCBI databas"}, {"matched_terms": "97%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "genus we searched the NCBI database for matches with our 12S sequence data using BLASTn. We assigned the genus where all matches with PI ≥ 97% were from the same genus.  Threatened species identiﬁcation Species of shark that are threatened in Austral"}, {"matched_terms": "98%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "We obtained sequence matches for 71 of the 91 tissue samples (Table 2). Of these, 46 were identiﬁed to species level (COI region, PI ≥ 98% from Genbank and BOLD) and 25 to genus only (24 using 12S region, PI ≥ 97% on Genbank, and 1 using COI as above"}, {"matched_terms": "97%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Of these, 46 were identiﬁed to species level (COI region, PI ≥ 98% from Genbank and BOLD) and 25 to genus only (24 using 12S region, PI ≥ 97% on Genbank, and 1 using COI as above; see Table S1 of the Supplementary material). Matches were inconclusi"}, {"matched_terms": "98%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "(suggesting potential sample contamination). For 16 samples, several congeneric species from 4 genera were in the clusters of matches where PI ≥ 98% (Carcharhinus, n = 4; Orectolobus, n = 4; Squalus, n = 4; and Mustelus, n = 4; Table S1). In these ca"}, {"matched_terms": "98%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "we assigned the species with the highest match probability but recorded the congenerics (Table S1). We excluded reads of PI ≥ 98% for less related species if they represented <3% of the top 100 reads, as these were most likely errors in the databases"}, {"matched_terms": "3%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "we assigned the species with the highest match probability but recorded the congenerics (Table S1). We excluded reads of PI ≥ 98% for less related species if they represented <3% of the top 100 reads, as these were most likely errors in the databases"}, {"matched_terms": "23.9%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "whaler (Carcharhinus obscurus, n = 4) and western wobbegong (n = 4).  Threatened species identiﬁcation Genetic analysis conﬁrmed 17 (23.9%) samples from 6 globally threatened species listed by the IUCN (Table 4), 2 that are Critically Endangered (Sph"}, {"matched_terms": "70%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "Red List criteria for threatened according to the SAP (Kyne et al. 2021).  91  Labelling analysis Overall, 64 of the 91 samples (70%) were mislabelled, either because the label was not AFNS compliant (17 of 91 samples) or genetic sequence matching in"}, {"matched_terms": "66%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "‘school shark’ and ‘ﬂake’ (including its derivatives). Overall, we found taxa (speci
