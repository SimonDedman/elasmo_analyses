7 58 59  2. Methods The research was completed during 17 daily fishing trips on board two commercial demersal longline vessels (14 and 19 m, respectively) off NSW, Australia in 2013. All sampling was opportunistically done "}, {"matched_terms": "shark", "section": "accepted", "total_freq": "1", "threshold": "1", "context": ". All sampling was opportunistically done within the spatial (Nambucca Heads −30°34′ S 153°13′ E and Wooli −29°56′ S 153°26′ E) and temporal ranges (January to July) of the northern NSW shark longline fishery (described by Macbeth et al., 2009).  \fP."}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ".  \fP.A. Butcher et al. / Global Ecology and Conservation xx (xxxx) xxx–xxx  3  2.1. Animal collection and fishing gear The longline comprised a 9600 m, 3.2 mm diameter (Ø) monofilament polyamide (PA) mainline, separated into four 2400 m sections (te"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Eight water temperature (°C) loggers (Vemco Ltd, Nova Scotia, Canada) were attached to the mainline, along with one to the surface floats at each end of the longline, and set to record every 30 min. Longlines were deployed on the seabed in depths o"}, {"matched_terms": "each", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Blood samples were collected from a subset of dusky and sandbar sharks caught (Section 2.2). Other technical and environmental data collected for each longline deployment included the date, times hooks were set and retrieved (to provide ‘deployment"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "focuses directly on mortality, damage and any physiological changes attributable to hooking and the varying durations each animal spent on the line. For the mortality data, species with a sample size of ≤10 were used to
