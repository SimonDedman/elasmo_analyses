hes, and not until the trawl is very close, do the costs of remaining exceed the costs of fleeing, resulting in a change in behaviour towards f"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "key determinants of how other populations fare (Foster & Vincent, 2010). A fraction of these fishes showed an active behavioural response during the filming, but not enough to avoid the trawl due to their limited swimming abilities. Probably these fi"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "of the net, with multiple behaviour and escape patterns. According to observations, the main response of this species was orienting itself in the same direction of the trawl and to stay swimming as the net moved ahead. This response is similar to the"}, {"matched_terms": "although", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "trawl and to stay swimming as the net moved ahead. This response is similar to the one reported by Queirolo et al. (2010), although trawl speed was significantly different between these studies. Obviously, if trawl speed increases, fishes must"}, {"matched_terms": "if", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "the one reported by Queirolo et al. (2010), although trawl speed was significantly different between these studies. Obviously, if trawl speed increases, fishes must generate increased thrust in order to maintain position in the trawl mouth. This can "}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "different between these studies. Obviously, if trawl speed increases, fishes must generate increased thrust in order to maintain position in the trawl mouth. This can be accomplished by increasing tail-beat frequency, involving additional muscle or c"}, {"matched_terms": "the", "section": "rejected:c
