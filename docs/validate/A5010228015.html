lts indicate"}, {"matched_terms": "industrial", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "by small vessel fleets operating from islands not being equipped with AIS. Furthermore, the heterogeneous habitats present in the Caribbean may make them problematic to fish by large industrial longline and purse seine vessels. 2.6.4 Western North At"}, {"matched_terms": "is", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ".4 Western North Atlantic porbeagle and white sharks Space use of porbeagle and white sharks determined by satellite tracking that is fisheryindependent showed both species to have hotspots in the Gulf Stream ecosystem (Extended Data Figs. 6, 7). The"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "effort co-occurrence could explain the historical overfishing for these species, where sharp declines in catches have been observed16,18,26. Our results demonstrate that the potential for incidental capture by pelagic longlines remains high where the"}, {"matched_terms": "with", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "Porbeagle sharks in the southwest Pacific off New Zealand were also identified in our analysis as having relatively high spatial overlap with longline vessels and exposed to higher than average fishing effort in those space use areas (Fig. 3d; Extend"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "ago with the potential for a stable or increasing population size. Whereas the biologically distinct porbeagle of the North Atlantic has been the subject of a directed pelagic longline fishery as well as bycatch from bottom trawls and gillnets, in th"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "Whereas the biologically distinct porbeagle of t iscar"}, {"matched_terms": "from", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "Zealand in 2014 resulting in porbeagle catch by longliners being discarded 65. Although there is high mortality of porbeagle from longliners due to the discarding, with nearly 40% of 55  \findividuals hauled in dead69, the proportion being released al"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "mortality from discarding. 2.6.6 Pacific and Indian Ocean white sharks There was higher than average fishing overlap and exposure to longline fishing effort (FEI) across white shark distribution in the northeast Pacific and southwest Pacific (Oceania"}, {"matched_terms": "from", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "There was higher than average fishing overlap and exposure to longline fishing effort (FEI) across white shark distribution in the northeast Pacific and southwest Pacific (Oceania region). This was principally from longline vessels and to a lesser ex"}, {"matched_terms": "with", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Space use hotspots occurring in shelf and open ocean areas for white sharks in all three regions overlap significantly with longline fishing vessels (Fig. 3b-d). Protection measures for white sharks are in place within Australia, Europe, New Zealan"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "South Africa and U.S.A. EEZs (Supplementary Table 2). For high seas areas where white sharks occur, the high overlap and exposure to longline fishing effort that we observed raises concern about the potential for high incidental bycatch of white shar"}, {"matched_terms": "from", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "sharks occur, the high overlap and exposure to longline fishing effo
