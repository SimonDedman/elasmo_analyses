 variables, such as specimen size, sex and region of opera"}, {"matched_terms": "portuguese", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "Data were collected from 18 fishing trips and 5 diﬀerent fishing vessels by IPMA, IP (Portuguese Marine and Atmospheric Institute) fishery observers’ onboard Portuguese longliners targeting swordfish along the Atlantic Ocean. Data were collected betw"}, {"matched_terms": "834", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "fishing vessels by IPMA, IP (Portuguese Marine and Atmospheric Institute) fishery observers’ onboard Portuguese longliners targeting swordfish along the Atlantic Ocean. Data were collected between August 2008 and December 2011, from a total of 834 lo"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "collected between August 2008 and December 2011, from a total of 834 longline sets, corresponding to 1 078 200 hooks deployed. The fishery covers a wide area of the Atlantic Ocean in both hemispheres. The study area was divided into four areas of fle"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "with fishing conducted at depths of 20−50 m below the surface, with gear deployment beginning at around 17:00 h and haulback starting the next day from about 06:00 h. The traditional hooks used by the fishery are stainless steel J-style hooks, and th"}, {"matched_terms": "onboard", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "larger vessels with freezing capacity that tend to make longer trips of up to four months in duration. For every specimen caught, the onboard fishery observers recorded usually the species level, except for manta, devil and eagle rays, and specimen s"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "the explanatory variables was determined with Wald statistics  \fR. Coelho et al.: Aquat. Living Resour. 25, 311–319 (2012)  313  Fig. 1. Location of the longline fishing sets analysed in this study, showing the four areas of operation of the Portugue"}, {"matched_terms": "portuguese", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "313  Fig. 1. Location of the longline fishing sets analysed in this study, showing the four areas of operation of the Portuguese longline fleet that were considered for the analysis: Zone 1: temperate NE Atlantic; Zone 2: tropical NE Atlantic: Zone 3"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "(5%), shortfin mako (4%) and bigeye thresher (3%) (Fig. 2). The average catch per unit eﬀort (CPUE) for the main target species of the fishery (swordfish) was 12.8 specimens per 1000 hooks during the study period while, and considering the commonest "}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "During this study it was possible to determine that the hooking mortality percentages of pelagic elasmobranchs caught in pelagic longline fisheries are species-specific, and that management options therefore need to consider those specificities"}, {"matched_terms": "canadian", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "particularly vulnerable species in this respect, as 71% of the specimens are captured already dead. Campana et al. (2009) about blue sharks caught by the Canadian longline fishery in the northwest Atlantic Ocean, concluded that short-term hooking mor"}, {"matched_terms": "by", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "Canadian longline fishery in the northwest Atlantic Ocean, concluded that short-term hooking mortality was in the 12−13% range (measured by fishery observers), which is very close to our study (14%). Howe
