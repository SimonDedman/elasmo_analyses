"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "biomass “outburst” of less valuable small elasmobranchs during the 1980s, such as Spiny Dogﬁsh Squalus acanthias (Link et al. 2002; Frisk et al. 2008). The National Marine Fisheries Service’s Northeast Fisheries Science Center (NEFSC) bottom trawl su"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". Highly variable survey catch and strong environmental associations of Spiny Dogﬁsh have introduced uncertainty in the population trends derived from bottom trawl survey catches (Carlson et al. 2014; Sagarese et al. 2014a, 2014b). The utility of bot"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "Dogﬁsh have introduced uncertainty in the population trends derived from bottom trawl survey catches (Carlson et al. 2014; Sagarese et al. 2014a, 2014b). The utility of bottom trawl surveys in tracking Spiny Dogﬁsh abundance has also been questioned "}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "2010; TRAC 2010; Carlson et al. 2014). While Spiny Dogﬁsh survey catches are accompanied by uncertainties regarding population dynamics, NEFSC bottom trawl survey catches reﬂect the best available science for Spiny Dogﬁsh and, as a result, contribute"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "requires comprehensive diet information and absolute predator abundances (Hollowed et al. 2000; Overholtz et al. 2008). Bottom trawl surveys conducted by the NEFSC have monitored long-term trends in the abundance of commercially important species sin"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "important species since 1963 and have collected trophic interaction data since 1973 (Link and Almeida 2000; Link and Garrison 2002). Biases in the relative abundance estimates from the bottom trawl survey are assumed to be consistent from year to yea"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "migrations and therefore should not inﬂuence the utility of such estimates for monitoring population trends (Jacobson et al. 2015). In contrast, absolute biomass estimates from bottom trawl surveys unadjusted for diel effects may not accurately reﬂec"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "abundance estimates may skew estimates of consumption and misrepresent the trophic footprint of a species if it undertakes diel movements (i.e., becomes less available to trawl surveys at a particular time of day). Some ﬁsh and invertebrate surveys r"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Survey catchability is deﬁned as the proportion of a group (i.e., species or size-class) caught by one unit of effort, often the area swept by the trawl (Francis et al. 2003; Fraser et al. 2007). Catchability consists of three components: (1) prese"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Catchability consists of three components: (1) presence in the area at the time of the survey (i.e., horizontal availability), (2) proportion encountered by the trawl (i.e., vertical availability), and (3) proportion caught by the trawl (i.e., efﬁc"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "., horizontal availability), (2) proportion encountered by the trawl (i.e., vertical availability), and (3) proportion caught by the trawl (i.e., efﬁciency) (Godø 1994; Michalsen et al. 1996; Francis et al. 2003; Trenkel et al. 2004). Stock assessmen"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". 2004; Gauthier and Rose 2005). If a species varies its position in the water column, thereby altering its availability to bottom trawls, large biases in the catchability coefﬁcient can skew absolute abundance estimates (Francis and Williams 1995; H"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". Within the NES LME, past consumption estimates for Spiny Dogﬁsh utilized unadjusted area-swept numbers from the NEFSC bottom trawl survey (Overholtz et al. 2000). Recognizing and adjusting for any biases (e.g., due to diel migrations) may remove un"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "of ecosystem processes, and the efﬁcacy of management efforts. At present, no studies have addressed whether catchability of Spiny Dogﬁsh by the NEFSC bottom trawl survey varies with time of day or with other environmental factors. The objectives of "}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "critical insight into ecological interactions, knowledge of which is required for ecosystem-based ﬁsheries management in the NES LME.  METHODS Data source.—Annual bottom trawl surveys have been conducted by the NEFSC during autumn and spring since 19"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". The introduction of the National Oceanic and Atmospheric Administration (NOAA) ship Henry B. Bigelow in 2009 brought about changes to the trawling gear and survey protocol that are discussed in Brown et al. (2007). To ensure comparability of abunda"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "factors (Miller et al. 2010). Relative abundance data.—Indices of abundance were calculated from the spring and autumn NEFSC bottom trawl survey haul data for Spiny Dogﬁsh and ﬁve key prey species: Butterﬁsh Peprilus triacanthus, Atlantic Herring Clu"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "as the number of individuals caught per tow and was assumed an appropriate index for abundance. Based on the standard tow duration and area swept by the trawl (0.034 km2; NEFSC 2006), tow length was assumed to be constant. Prior to 1980, Spiny Dogﬁsh"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "potential interactions between Spiny Dogﬁsh and pelagic prey species using ArcGIS 10.2 (ESRI, Redlands, California). Due to the size of the NEFSC bottom trawl dataset and space constraints, only CPUE estimates equivalent to or exceeding the 95th perc"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "Spearman’s correlation coefﬁcients (rsp) between the probability of daytime catch predicted by the GAM and the observed probability of daytime catch in the bottom trawl survey data set were estimated and tested for signiﬁcance (i.e., ≠ 0) (Vaz et al."}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "Here we provide the ﬁrst estimates of the inﬂuence of diel and environmental factors on seasonal CPUE and survey catchability during the NEFSC bottom trawl survey for Spiny Dogﬁsh, Butterﬁsh, and Atlantic Mackerel in the NES LME. Survey catchability "}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "in the survey region. Higher probabilities of daytime catch corresponded to lower solar zenith angles, suggesting that bottom trawl catches were more likely during the day. Breakpoint ana
