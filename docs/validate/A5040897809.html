ncey and Somero 1979). Like urea, TMAO is avidly reabsorbed by the kidneys of elasmobranchs. Approximately 95 % of the filtered load is reabsorbed, in contrast to its active sec"}, {"matched_terms": "85 %", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "Most aquatic animals excrete the major portion of their nitrogenous end products via the gills in the form of ammonia. Elasmobranchs eliminate approximately 85 % of their total nitrogenous waste through the gills; the remainder is excreted via the ki"}, {"matched_terms": "25 %", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "of their total nitrogenous waste through the gills; the remainder is excreted via the kidneys (Goldstein and Forster 1962). In marine e1asmobranchs, in contrast to teleosts, only 25 % of this gill excretion of nitrogen is in the form of ammonia; 75 %"}, {"matched_terms": "75 %", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". In marine e1asmobranchs, in contrast to teleosts, only 25 % of this gill excretion of nitrogen is in the form of ammonia; 75 % is excreted as urea (calculated from Goldstein and Forster 1962). In freshwater e1asmobranchs such as the sting ray, Poto"}, {"matched_terms": "20 %", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Recently, however, attention has turned to amino acids because of their role in intracellular osmoregulation and cell volume regulation. Free amino acids can make up more than 20 % of the osmotically active solutes in elasmobranch cells. Intracellu"}, {"matched_terms": "25 %", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "wt h- 1 (out of a total gill ammonia excretion of 0.15 mmol kg- 1 body wt h- 1 (Goldstein and Forster 1962). This leaves only 25 % (0.04 mmol kg- 1 body wt h- 1 ) to be derived from deamination of blood amino acids by the gill itself. Gill glutaminas"}, {"matched_terms": "2.2 %", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "Early 20th century experiments erroneously suggested that urea was an essential biochemical for cardiac activity in elasmobranchs. The heart appeared to beat satisfactorily in solutions containing 2.2 % urea and 2 % sodium chloride, but failed to mai"}, {"matched_terms": "2 %", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "biochemical for cardiac activity in elasmobranchs. The heart appeared to beat satisfactorily in solutions containing 2.2 % urea and 2 % sodium chloride, but failed to maintain its physiological activity in solutions containing no urea. Smith (1936) r"}, {"matched_terms": "33%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". The clearnose skate that he was studying lives in the estuaries of the lower Chesapeake and Delaware Bays in salinities varying from 13-33%0' The tidal cycle in this area may produce salinity changes of more than 10%0 in a 6-hour period. Therefore "}, {"matched_terms": "10%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "lives in the estuaries of the lower Chesapeake and Delaware Bays in salinities varying from 13-33%0' The tidal cycle in this area may produce salinity changes of more than 10%0 in a 6-hour period. Therefore these skates may not have equilibrated with"}, {"matched_terms": "50 %", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "found that in the lemon shark, Negaprion brevirostris, urea biosynthesis (production) was not changed in fish adapted to 50 % seawater compared to controls in 100 % seawater. In contrast, both the little skate, Raja erinacea, and the lipshark,"}, {"matched_terms": "100 %", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "found that in the lemon shark, Negaprion brevirostris, urea biosynthesis (production) was not changed in fish adapted to 50 % seawater compared to controls in 100 % seawater. In contrast,
