e naturally uncommon or, more likely, that the trawl regime only sampled the upper end of their nat"}, {"matched_terms": "intensive", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "between assemblages were due to compensatory changes in mesopredator abundance (Navia et al., 2011). There is a correlation between the location of assemblages I, III and IV and intensive trawl fishing areas (Wolff & Aroca, 1995; Escribano, Fernandez"}, {"matched_terms": "particular", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "of low diversity, in the current study coldspots coincide with traditional fishing grounds. Commercial fisheries in Chile, in particular trawl-based activities, are likely to have a direct effect on cartilaginous fish community structure and distribu"}, {"matched_terms": "for", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "more fecund and more resilient to fishing pressures than other elasmobranchs. Examples of similar community restructuring have been documented for trawl fishing areas in the Atlantic (Ellis et al., 2005), Gulf of Mexico (Shepherd & Myers, 2005), the "}, {"matched_terms": "similar", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "., 2005), Gulf of Mexico (Shepherd & Myers, 2005), the Mediterranean Sea (Ferretti et al., 2008) and Australian waters (Graham, Andrew & Hodgson, 2001); although its extension to similar trawl fisheries elsewhere has not been properly evaluated due t"}, {"matched_terms": "commercial", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "evidence of species more usually associated with the Peruvian and Magellanic provinces. Fishery-independent surveys allowed us to explore an extensive area, including traditional commercial trawling zones and non-traditional fishing zones with simila"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq
