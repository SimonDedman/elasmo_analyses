ce the number of larger "}, {"matched_terms": "prawn", "section": "accepted", "total_freq": "1", "threshold": "1", "context": ". The future inclusion of bycatch reduction devices would likely reduce the number of larger elasmobranchs being caught, based on evidence from the prawn trawl fisheries of northern Australia, and is being investigated by the PNG National Fisheries A"}, {"matched_terms": "prawn", "section": "accepted", "total_freq": "1", "threshold": "1", "context": ". Although Papua New Guinea (PNG) contributes only about 0.1% to the global tropical prawn catches, it is the only Pacific Island nation with a demersal prawn trawl fishery. Despite its small size, it is one of the most valuable export fisheries for "}, {"matched_terms": "foreign", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". Despite its small size, it is one of the most valuable export fisheries for PNG, earning revenue of ~K10 million (~$3 USD) annually8. No foreign trawl vessels currently operate in PNG waters. The first surveys for prawns in the Gulf of Papua (GoP) "}, {"matched_terms": "prawn", "section": "accepted", "total_freq": "1", "threshold": "1", "context": "The first surveys for prawns in the Gulf of Papua (GoP) were carried out in 1954, while commercial fishing explicitly targeting prawn commenced in 19699,10. The GoP prawn fishery currently extends along the south coast of PNG from the mouth of the Fl"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Map of Papua New Guinea: (a) whole country with yellow box indicating the Gulf of Papua region; (b) Gulf of Papua showing the locations of the trawl sets observed in this study superimposed over the fisheries management zones (1–8) and the extralim"}, {"matched_terms": "for", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "lower catches of giant tiger prawns P. monodon and green tiger prawn P. semisu ", "total_freq": "1", "threshold": "1", "context": "Between 2014 and 2015, PNG’s National Fisheries Authority (PNG NFA) ran an observer program to investigate the elasmobranch bycatch in the GoP prawn fishery. The current study provides the first detailed investigation of this bycatch in PNG, includin"}, {"matched_terms": "prawn", "section": "accepted", "total_freq": "1", "threshold": "1", "context": ". The major aim of this study was to provide management options to PNG’s NFA relating to the elasmobranch bycatch of GoP prawn fishery based on evidence-based science.  Results  Sampling effort. A total of 7 fishing trips were observed in this study"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "Sampling effort. A total of 7 fishing trips were observed in this study. Five of the fishing trips comprised 9–17 days of trawling activity, and two comprised 35 and 36 days of trawling. The latter two longer fishing trips were not planned to be long"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". A total of 7 fishing trips were observed in this study. Five of the fishing trips comprised 9–17 days of trawling activity, and two comprised 35 and 36 days of trawling. The latter two longer fishing trips were not planned to be long trips prior to"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". It was not determined why these trips were longer than the other fishing trips observed. Data were obtained based on catches from 1,273 hours of trawling in 403 trawls within the GoP carried out between June 2014 and August 2015 at depths of 6 to 3"}, {"matched_terms": "403", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". It was not determined why these trips were longer than the other fishing trips observed. Data were obtained based on catches from 1,273 hours of trawling i
