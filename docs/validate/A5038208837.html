scussion The bycatch rate recorded here (0.65% of the tuna catch) is very similar to that recorded from western Pacific pole-and-line tuna fisheries. In a r"}, {"matched_terms": "0.8%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "western Pacific pole-and-line tuna fisheries. In a review of the limited and scattered literature, average bycatch was estimated at 0.8% of the total catch for western Pacific pole-and-line Table 8. Fate of bycatch and discards, by species (by weight"}, {"matched_terms": "0.6%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "skipjack fisheries, with rainbow runner and dolphinfish being the most frequently taken bycatch species [43]. Observer data from the Solomon Islands gave an estimated bycatch of 0.6% of the pole-and-line tuna catch, with rainbow runner and dolphinfis"}, {"matched_terms": "1%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ".6% of the pole-and-line tuna catch, with rainbow runner and dolphinfish again being the most frequently taken bycatch species [44]. In Indonesia, bycatch was estimated at 1% in small-scale tuna pole-and-line fisheries [4]. In a global review, a mean"}, {"matched_terms": "0.4%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". In Indonesia, bycatch was estimated at 1% in small-scale tuna pole-and-line fisheries [4]. In a global review, a mean discard rate of 0.4% from tuna pole-and-line fisheries was estimated [15]. By most standards the bycatch rate reported here, and i"}, {"matched_terms": "0.9%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". [9, 54]), which also show variation by ocean (region) and retention or discard of small tunas. Indeed, purse seine bycatch ranged from a low of 0.9% for seamount-associated schools in the Indian Ocean [9] to 15.0% for FAD-associated schools in the "}, {"matched_terms": "15.0%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "small tunas. Indeed, purse seine bycatch ranged from a low of 0.9% for seamount-associated schools in the Indian Ocean [9] to 15.0% for FAD-associated schools in the Atlantic [55]. For the Maldivian pole-and-line fishery there may be differences betw"}, {"matched_terms": "11.6%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". One exception to this standard practice was provided by [25], wherein livebait was included in bycatch estimates for the Maldivian pole-andline fishery and, based on published information from MRC, noted bycatch at 11.6% of the tuna catch. For comp"}, {"matched_terms": "8.9%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". For comparison with [25], during this study it was estimated that total livebait catch was 13.0 t. That was equivalent to 8.9% of the tuna catch, or 11.3 kg of tuna per 1 kg of livebait caught. This is comparable to, but slightly more efficient tha"}, {"matched_terms": "13.5%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "previous Maldives studies (summarised in [36]), which reported catches within the range of 7.4–10.0 kg of tuna per 1 kg of livebait used, or 10.0–13.5% of tuna catch.  PLOS ONE | https://doi.org/10.1371/journal.pone.0177391 May 24, 2017  13 / 21  \fMa"}, {"matched_terms": "98%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "Different school types showed markedly different tuna species composition and different sizes of skipjack tunas (Table 2 and Fig 2A). Skipjack made up nearly all (98%) the tuna catch from free schools but only half (51%) from associated schools. Furt"}, {"matched_terms": "51%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "sizes of skipjack tunas (Table 2 and Fig 2A). Skipjack made up nearly all (98%) the tuna catch from free schools but only half (51%) from associated schools. Furthermore, the skipjack caught from free schools were mostly uniformly large-sized, wherea"}, {"matched_terms": "72.3%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "lengths showed a bimodal distribution (Fig 2A); this is a well-known feature of Maldivian skipjack landings [57, 58]. Also, across the entire study, skipjack contributed 72.3% to the total tuna catch, which is close to the long-term estimated average"}, {"matched_terms": "75%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Also, across the entire study, skipjack contributed 72.3% to the total tuna catch, which is close to the long-term estimated average for the national fishery of 75% [59]. The yellowfin tuna taken by pole-and-line were all juveniles, with an average"}, {"matched_terms": "6.1%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "statistics until 2014, when bigeye catches began being recorded separately in the logbooks. In this study, the proportion of bigeye in the Thunnus component of the pole-and-line catch was estimated at 6.1%, but with a higher proportion in the south ("}, {"matched_terms": "7.3%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "this study, the proportion of bigeye in the Thunnus component of the pole-and-line catch was estimated at 6.1%, but with a higher proportion in the south (7.3%) than the north (2.7%) (S7 Table). This agrees with previous studies [61–63], which all fo"}, {"matched_terms": "2.7%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "this study, the proportion of bigeye in the Thunnus component of the pole-and-line catch was estimated at 6.1%, but with a higher proportion in the south (7.3%) than the north (2.7%) (S7 Table). This agrees with previous studies [61–63], which all fo"}, {"matched_terms": "0.7%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "Lanka, inspection of ‘small yellowfin’ landings at Beruwela (6˚29’N, the sam
