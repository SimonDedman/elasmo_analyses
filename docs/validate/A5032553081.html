ing Spiny Dogп¬Ғsh abundance has also been questioned "}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "2010; TRAC 2010; Carlson et al. 2014). While Spiny Dogп¬Ғsh survey catches are accompanied by uncertainties regarding population dynamics, NEFSC bottom trawl survey catches reп¬Ӯect the best available science for Spiny Dogп¬Ғsh and, as a result, contribute"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "requires comprehensive diet information and absolute predator abundances (Hollowed et al. 2000; Overholtz et al. 2008). Bottom trawl surveys conducted by the NEFSC have monitored long-term trends in the abundance of commercially important species sin"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "important species since 1963 and have collected trophic interaction data since 1973 (Link and Almeida 2000; Link and Garrison 2002). Biases in the relative abundance estimates from the bottom trawl survey are assumed to be consistent from year to yea"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "migrations and therefore should not inп¬Ӯuence the utility of such estimates for monitoring population trends (Jacobson et al. 2015). In contrast, absolute biomass estimates from bottom trawl surveys unadjusted for diel effects may not accurately reп¬Ӯec"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "abundance estimates may skew estimates of consumption and misrepresent the trophic footprint of a species if it undertakes diel movements (i.e., becomes less available to trawl surveys at a particular time of day). Some п¬Ғsh and invertebrate surveys r"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "
