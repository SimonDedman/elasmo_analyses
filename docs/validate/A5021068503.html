d:unknown", "total_freq": "0", "threshold": "1", "context": "line and bait use percentages dropped to 0% in 2009, but it is uncertain if this only reflects a smaller sample of sets available for analysis or a broader fishery trend. FA C T O R S I N F L U E N C I N G C AT C H R AT E S  Results from statistical "}, {"matched_terms": "by", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "FA C T O R S I N F L U E N C I N G C AT C H R AT E S  Results from statistical models developed to identify factors influencing the catch rates of shark by longline fisheries in RMI were generally consistent with previous research findings regarding "}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "relatively cooler waters at night, close to the full moon and when the 27◦ C thermocline is close to the surface (bringing cooler water habitat closer to the surface). As cooler surface waters occur in the northern part of the fishery and warmer surf"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "cooler surface waters occur in the northern part of the fishery and warmer surface waters in the central and southern parts of the fishery, the results for P. glauca and C. falciformis from the time-area models are consistent with those of the causat"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "These analyses provide information relevant to the assessment of management options which RMI may consider implementing as a means of reducing shark mortalities in the longline fishery. For example, RMI may consider implementing in its own national w"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". A key assumption is that the available observer data are representative of the main fleets and of the interaction between the req": "0", "threshold": "1", "context": ". (2008) found no evidence to support increased catch rates of T. obesus on hooks using wire leaders. Other factors relating to longline fishing gear and methods (e.g. set depth and time of day) were related to shark catch rates, but the model result"}, {"matched_terms": "rmi", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": ". B RO M H E A D E T A L .  Combined measures  Overall, the most effective measure for minimizing shark mortalities in the RMI longline fishery would be to combine measures that reduce the interaction rate (e.g. restrictions or bans on the use of wir"}, {"matched_terms": "rmi", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "had banned trade in shark fins (Marianas Variety, 2011) and was considering other possible measures, including a permanent legislative ban on shark finning to reduce shark by-catch in the RMI longline fishery (Marshall Islands Journal, 2011). The aut"}]}, {"name": "gear_trap", "triggered": false, "evidence": []}, {"name": "gear_trawl", "triggered": false, "evidence": []}, {"name": "gear_trawl_beam", "triggered": false, "evidence": []}, {"name": "gear_trawl_otter", "triggered": false, "evidence": []}]}, "ob_": {"columns": [{"name": "ob_arctic_ocean", "triggered": false, "evidence": []}, {"name": "ob_baltic_sea", "triggered": false, "evidence": []}, {"name": "ob_indian_ocean", "triggered": false, "evidence": []}, {"name": "ob_mediterranean_black_sea", "triggered": false, "evidence": []}, {"name": "ob_north_atlantic_ocean", "triggered": false, "evidence": []}, {"name": "ob_north_pacific_ocean", "triggered": false, "evidence": []}, {"name": "ob_south_atlantic_ocean", "triggered": false, "evidence": []}, {"name": "ob_south_pacific_ocean", "triggered": false, "evidence": []}, {"name": "ob_southern_ocean", "triggered": false, "evidence": []}]}, "sp_": {"triggered": ["sp_alopias_pelagicus", "sp_alopias_superciliosus", "sp_alopias
