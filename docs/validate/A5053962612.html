", "threshold": "1", "context": "waters except for a long term, research monitoring program that has been surveying potentially aggressive sharks using bottom longlines in a region with an abnormally high shark attack rate (see Hazin et al., 2008). Within the scope of this research "}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "reducing incidental ﬁshing mortality (Brewer et al., 1996; Fonteyne and M’Rabet, 1992; Madsen et al., 2006). Modiﬁcations to pelagic longline gear have often included changes in terminal tackle from J-style hooks to circle hooks. Circle hooks are dis"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "of hook is currently being tested in different types of ﬁsheries and has been shown to be a practical and economical measure to reduce mortality in pelagic longline ﬁsheries. Despite previous studies on the mortality rate (Falterman and Graves, 2002)"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "likely to be another important factor inﬂuencing catch composition. Coelho et al. (2003) described the effect of the depth of hooks on elasmobranch catches by attaching ﬂoats to bottom longline branch lines in oceanic ﬁshing grounds at depths between"}, {"matched_terms": "12", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "lines in oceanic ﬁshing grounds at depths between 200 and 550 m. However, no previous study to date has evaluated the inﬂuence  337  Fig. 1. Study area. Location of the 12 longline sets (black circles) of the pelagic experiment in the Equatorial Atla"}, {"matched_terms": "coastal", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": ". Location of the 12 longline sets (black circles) of the pelagic experiment in the Equatorial Atlantic Ocean, and of the coastal longline sets (black
