s), empirica"}, {"matched_terms": "69%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". This was apparent through the relatively high rate of incorrect individual fates predicted for blacktip and spinner sharks using decision trees made with at-vessel measurements (67–69% of fates correctly predicted). However, at-vessel decision tree"}, {"matched_terms": "99%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "fates predicted for blacktip and spinner sharks using decision trees made with at-vessel measurements (67–69% of fates correctly predicted). However, at-vessel decision trees proved highly effective at predicting sandbar shark fates (>99% correctly p"}, {"matched_terms": "90%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "which suffered limited PRM, but would be less effective for blacktip and spinner sharks, which are much more susceptible to both AVM and PRM. This is particularly apparent for spinner sharks, of which nearly 90% would still have died in this study if"}, {"matched_terms": "50%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "regulations to be effective for these two species, soak times would have to be limited to approximately 5 h to reduce PRM by 50%. Although longlines are often soaked for >12 h during commercial fishing operations [92], shorter soak times may not subs"}, {"matched_terms": "50%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "commercial fishing operations [92], shorter soak times may not substantially reduce catch rates, as comparisons of hook time and soak time of sets deployed for >6 h in this study show that the majority (>50%) of sharks were hooked within an hour of s"}, {"matched_terms": "70%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "rates, as comparisons of hook time and soak time of sets deployed for >6 h in this study show that the majority (>50%) o
