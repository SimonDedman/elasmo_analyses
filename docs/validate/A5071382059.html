, "total_freq": "0", "threshold": "1", "context": ".V. All rights reserved. Keywords: Pelagic longline; Bycatch; Circle hooks; Survival; Discard mortality  1. Introduction Pelagic longline fishing gear is currently used throughout the world’s oceans to commercially harvest swordfish Xiphias gladius a"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "Pelagic longline fishing gear is currently used throughout the world’s oceans to commercially harvest swordfish Xiphias gladius and tunas Thunnus spp. Pelagic longline gear also interacts with non-target pelagic species, including istiophorid billfis"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "0165-7836/$ – see front matter © 2006 Elsevier B.V. All rights reserved. doi:10.1016/j.fishres.2006.03.032  particular, interactions with billfishes by the pelagic longline fleet have created concern because of the depressed condition of Atlantic bil"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "of Atlantic billfish stocks and the importance of these species to recreational anglers. The fishing mortality on bycatch species resulting from pelagic longline fishing may be reduced by decreasing interaction rates and/or the number of animals dead"}, {"matched_terms": "recreational", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". Graves / Fisheries Research 80 (2006) 239–250  marine recreational fisheries. Most research into the effects of hook type and survival has occurred in the recreational fishery where catch and release fishing practices are common. These studies have"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "., 2002; Skomal et al., 2002; Malchoff et al., 2002) and increased rates of postrelease survival (Horodysky and Graves, 2005). In the pelagic longline fishery, a higher proportion of fishes caught in the mouth or jaw should result in less physical da"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "in less physical damage to the animal and presumably higher rates of survival at haulback and after release for bycatch species. The effects of terminal gear changes in the pelagic longline fisheries have not been well studied. Falterman and Graves ("}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "The effects of terminal gear changes in the pelagic longline fisheries have not been well studied. Falterman and Graves (2002) found that mortality at haulback of the longline was 31% for target and bycatch fishes caught on circle hooks and 42% for t"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "although this difference was not statistically significant. Hoey (1996) observed a similar pattern in his review of the U.S. pelagic longline fleet records (mortality rate at haulback: 49% circle hook and 62% J-style hook; no significance noted)"}, {"matched_terms": "atlantic", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". Berkeley and Edwards (1996) noted that fish caught on circle hooks, even those on the line for many hours, were generally alive at haulback. In the U.S. Atlantic longline fleet (which primarily used J-style hooks at the time), 80% of the billfish c"}, {"matched_terms": "venezuelan", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "of the billfish caught in 1998 were reported alive at haulback (Cramer, 2000). In contrast, less than 40% of the billfishes caught by the Venezuelan longline fleet (which also primarily used J-style hooks) were alive at haulback (Jackson and Farber, "}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "Farber, 1998), possibly an effect of the additional stress from the higher ambient water temperatures. The use of circle hooks with pelagic longline gear has not been readily accepted by the fishery as an equally effective terminal gear type, and a l"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "the higher ambient water temperatures. The use of circle hooks with pelagic longline gear has not been readily accepted by the fishery as an equally effective terminal gear type, and a large percentage of the international pelagic longline fishery in"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "been readily accepted by the fishery as an equally effective terminal gear type, and a large percentage of the international pelagic longline fishery in the Atlantic Ocean continues to use straight-shank or J-style hooks. Some vessels targeting tuna "}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": ". The International Commission for the Conservation of Atlantic Tunas (ICCAT) has encouraged the use of circle hooks in the Atlantic pelagic longline fisheries for several years. However, only the U.S. longline fleet is currently required to use circ"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "Little work has been conducted on comparisons of hook types on target catch and bycatch rates and mortality in the U.S. Atlantic pelagic longline fishery. Prior to the regulation mandating circle hook usage, and excepting the northern Gulf of Mexico "}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": ". Prior to the regulation mandating circle hook usage, and excepting the northern Gulf of Mexico yellowfin tuna fleet, the U.S. pelagic longline fleet historically used size 9/0 J-style hooks (Hoey and Moore, 1999). Berkeley and Edwards (1996) anecdo"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "tuna-targeting vessels would result in an increase in tuna catch rates. More recently, a multi-year project with the U.S. Grand Banks pelagic longline fleet compared the efficiency of several hook types on catches of swordfish, bigeye tuna Thunnus ob"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "to assess the nature of the differences in catch rates and condition of target and non-target species caught with circle and J-style hooks in the western North Atlantic coastal pelagic longline fishery.  2. Materials and methods The gear deployment c"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "longline fishery.  2. Materials and methods The gear deployment configurations we used were standard for the U.S. Atlantic coastal pelagic longline fishery, with the only differences being the alternating hook types and the use of approximately 15 sm"}, {"matched_terms": "this", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": ". The choices of leader lengths, buoy drop lengths, leaded swivel weights, locations, lightstick color, and bait types were typical of the vessels in this fishery. The locations and seasons were chosen specifically because they are traditional fishin"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "typical of the vessels in this fishery. The locations and seasons were chosen specifically because they are traditional fishing areas for the U.S. coastal pelagic longline fleet. We conducted 85 sets on a commercial pelagic longline fishing vessel (F"}, {"matched_terms": "pelagic", "section": "rejected:habitat
