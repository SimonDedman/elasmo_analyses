nline 20 April 2011 Keywords: Dolphinﬁsh Bycatch Pelagic longline Sea turtle Shark Sustainable ﬁsheries  a b s t r a c t Mahi-mahi (Coryphaena hippurus) is a resilient pelagic sp"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "landings since 1950. Detailed mahi-mahi ﬁsheries records are limited, but an observer program monitoring Costa Rica’s Paciﬁc mahi-mahi pelagic longline ﬂeet between 1999 and 2008 (n = 217 sets) provided a rare opportunity to quantify bycatch in these"}, {"matched_terms": "with", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "ﬁsheries (Mahon and Oxenford, 1999). Of conservation concern is the potential for high bycatch levels of marine megafauna in ﬁsheries targeting mahi-mahi with longlines (Lewison et al., 2004a). Reﬂecting this concern, sustainable seafood guides recom"}, {"matched_terms": "international", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "mahi-mahi caught in the US (where the ﬂeet’s bycatch is monitored) or in poll and line ﬁsheries (which have minimal bycatch) as a ‘best choice’ or ‘good alternative’, but that consumers should avoid purchasing mahi-mahi caught by international longli"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "Indeed, many sea turtle and elasmobranch (shark and ray) species are already of conservation concern (Dulvy et al., 2008; IUCN, 2010), at least partially because of bycatch in other pelagic longline ﬁsheries (FAO, 2009; Lewison et al., 2004b; Lewison"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "ﬁsheries (FAO, 2009; Lewison et al., 2004b; Lewison and Crowder, 2007; Wallace et al., 2010). Sea turtles are often entangled or caught in pelagic longlines (Carranza et al., 2006; Donoso and Dutton, 2010; Lewison et al., 2004a,b; Pinedo and Polachec"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": ". / Biological Conservation 144 (2011) 1841–1849  (Peckham et al., 2007; Spotila et al., 2000). Pelagic sharks and rays also are commonly caught as bycatch in pelagic longline ﬁsheries (Gilman et al., 2008; Mandelman et al., 2008). Signiﬁcant decline"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "Paciﬁc (Ward and Myers, 2005a but see Sibert et al., 2006) and northwest Atlantic Oceans (Baum et al., 2003; Musick et al., 1993; Myers et al., 2007). Pelagic longline ﬁsheries targeting mahi-mahi may be particularly detrimental to sea turtles and ep"}, {"matched_terms": "so", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "Pelagic longline ﬁsheries targeting mahi-mahi may be particularly detrimental to sea turtles and epipelagic elasmobranchs because of the high degree of spatial overlap of these species (Gilman et al., 2006, 2008). Mahi-mahi tend to reside in surface "}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "typically shallower than those targeting tunas. Previous studies have shown that sea turtles and sharks are both captured at higher rates on shallow pelagic longline sets: near-surface swordﬁsh sets tend to catch far more sea turtles than deep sets t"}, {"matched_terms": "shallow", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "tend to catch far more sea turtles than deep sets targeting tuna (Lewison and Crowder, 2007); in the western and central Paciﬁc, sharks are caught over twice as frequently on shallow longline sets (500,000 sharks/year) than on deep ones (200,000/year"}, {"matched_terms": "mahi", "section": "accepted", "total_freq": "1", "threshold": "1", "context": "are poor, but Costa Rica’s ﬂeet has had an onboard observer program since 1999 (initiated and led by co-author Arauz, 2002, 2004). Data from this program thus provide a rare opportunity to assess bycatch levels in a commercial mahi-mahi longline ﬁshe"}, {"matched_terms": "mile", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "Canada, UK, and Australia, no other data source isolated mahi-mahi in sufﬁcient taxonomic detail for comparison.  approximately 18-mile longlines and wire leaders, with 650 hooks per set and 12–16 sets per trip (Table 1). This ﬂeet targets mainly mah"}, {"matched_terms": "mile", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "mahi-mahi, but also catch tunas and sailﬁsh, and operates throughout the Exclusive Economic Zone (EEZ). In contrast, ‘‘advanced scale’’ vessels are capable of deploying 150 mile longlines, and operate within and beyond the EEZ targeting swordﬁsh, mar"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": ". For each species, s, the initial model of the expected mean catch, li on set i is  Table 1 Variables included in initial models of observed sets in Costa Rica’s mahi-mahi targeted pelagic longline ﬁshery. Class  Description (mean ± 1SD)  Years ﬁshe"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "Soaktime (h) per set Set period*  2.2. Case study: Costa Rica’s mahi-mahi ﬁshery Costa Rican authorities classify their Paciﬁc pelagic longline vessels as being part of either the ‘‘medium scale’’ or ‘‘advanced scale’’ ﬂeet. Vessels in the ‘‘medium s"}, {"matched_terms": "targeted", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "Total number recorded, proportion of sets with a catch, and mean catch per 1000 hooks (±1 SD) of the species recorded between 1999 and 2008 by onboard observers in Costa Rica’s Paciﬁc mahi-mahi targeted longline ﬁshery (n = 217 sets). Species are lis"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": ". Mahi-mahi catches between 1950 and 2009 according to the UN Food and Agriculture Organization: (a) globally and in the Paciﬁc Ocean and (b) in the Atlantic and Indian Oceans.  −94  −92  −90  −88  −86  −84  −8  80  Fig. 2. Observed mahi-mahi targete"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": ". Whoriskey et al. / Biological Conservation 144 (2011) 1841–1849  Table 3 Fits of generalized linear models to Costa Rica mahi-mahi pelagic longline observer data indicated using the change in Akaike’s information criterion (DAIC) (0: model with mos"}, {"matched_terms": "mahi", "section": "accepted", "total_freq": "1", "threshold": "1", "context": "catch rates plotted using coefﬁcients for sine and cos from the GLMs of best ﬁt (black line).  In the case of Costa Rica’s mahi-mahi longline ﬁshery, there is signiﬁcant bycatch including olive ridley and green turtles, silky shark, and thresher shar"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "shark, and thresher sharks, all of which are of international conservation concern (Table 2). Sea turtle bycatch rates in this ﬁshery were very high (mean 9.4 per 1000 hooks) compared to that of other pelagic longline ﬁsheries. Lewison and Crowder’s "}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "Sea turtle bycatch rates in this ﬁshery were very high (mean 9.4 per 1000 hooks) compared to that of other pelagic longline ﬁsheries. Lewison and Crowder’s (2007) review of pelagic longline ﬁsheries targeting tuna, billﬁsh, and sharks in 19 different"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "ﬂeet, population level effects of the ﬁshery on sea turtles may be minimal. Silky and thresher shark bycatch rates were comparable to those reported from other pelagic longline ﬁsheries (3.16–5.38 silky sharks per 1000 hooks in the northwest Atlantic"}, {"matched_terms": "shrimp", "section": "accepted", "total_freq": "1", "threshold": "1", "context": "means of reducing olive ridley bycatch in this mahi-mahi ﬁshery; it might also help reduce sea turtle bycatch in Costa Rica’s inshore shrimp trawl and artisanal ﬁsheries (Arauz et al., 1998; Pretoma, 2010). Although the olive ridley turtle has recent"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "1974), and our analysis showed peak bycatch rates within this time frame, in September and October. Closing the medium-scale pelagic longline ﬁshery for these 2 months thus could beneﬁt olive ridleys, while having minimal impacts on mahi-mahi catches"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "olive ridleys was low when individuals were only lightly hooked and handled properly (Swimmer et al., 2006). Pelagic sharks often are alive at the time of capture in pelagic longline ﬁsheries and, if handled properly, post-release survival can be hig"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "typically slam stingrays on the deck and rip their mouths open to remove the hook because they are afraid of their stingers. 4.3.3. Operational changes Limiting the longline gear’s soak time also could be a win–win opportunity, providing conservation"}, {"matched_terms": "pelagic", "section": "rejected:habitat", "total_freq": "0", "threshold": "1", "context": "trends have been noted for loggerhead turtles in the Northwest Atlantic Ocean (Watson et al., 2005), and for silky and thresher sharks in other pelagic longline ﬁsheries in the Paciﬁc (Ward and Myers, 2004). Greater shark catch rates could result fro"}, {"matched_terms": "the", "section": "rejected:com
