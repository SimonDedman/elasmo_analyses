tion": "percentage", "total_freq": "1", "threshold": "1", "context": "Post-release mortality and physiological stress response of large coastal sharks  accuracy in some species. Jack-knife error testing of trees for sandbar sharks resulted in 99% prediction accuracy (128 of 129 fates predicted correctly), but only 68% "}, {"matched_terms": "68%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Jack-knife error testing of trees for sandbar sharks resulted in 99% prediction accuracy (128 of 129 fates predicted correctly), but only 68% prediction accuracy in blacktip sharks and 69% prediction accuracy in spinner sharks. However, for blackti"}, {"matched_terms": "69%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Jack-knife error testing of trees for sandbar sharks resulted in 99% prediction accuracy (128 of 129 fates predicted correctly), but only 68% prediction accuracy in blacktip sharks and 69% prediction accuracy in spinner sharks. However, for blackti"}, {"matched_terms": "2%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "spinner sharks the rate of false positive and false negative predictions was approximately equal and, as a result, the total predicted mortality rate for blacktip sharks had only 2% error compared to the measured mortality rate, and the total predict"}, {"matched_terms": "8%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "and, as a result, the total predicted mortality rate for blacktip sharks had only 2% error compared to the measured mortality rate, and the total predicted mortality rate for spinner sharks had 8% error from the measured mortality rate.  Discussion S"}, {"matched_terms": "15%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "reported in past studies, with the order of vulnerability to AVM increasing from nurse, lemon, tiger, and bull sharks, with low mortality rates (0–15% AVM reported previously [61–64]), to sandbar sharks which typically show intermediate mortality rat"}, {"matched_terms": "36%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "tiger, and bull sharks, with low mortality rates (0–15% AVM reported previously [61–64]), to sandbar sharks which typically show intermediate mortality rates (17–36% AVm reported previously [61–63]), to blacknose, blacktip, spinner, and Atlantic shar"}, {"matched_terms": "100%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "sandbar sharks which typically show intermediate mortality rates (17–36% AVm reported previously [61–63]), to blacknose, blacktip, spinner, and Atlantic sharpnose sharks, which have demonstrated AVM rates between 80 and 100% in previous studies [61–6"}, {"matched_terms": "3.3%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "Although few previous studies have directly assessed shark PRM in a BLL fishery, the high variability of PRM rates determined in this study emphasizes the importance of assessing PRM on a species-specific basis. In sandbar sharks, our measured PRM ra"}, {"matched_terms": "20%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". In sandbar sharks, our measured PRM rate of 3.3% (N = 130) is lower than that estimated by both Marshall et al. [25] of 20% (N = 10) in the NW Atlantic, and Barnes et al. [65] of 25% (N = 8) off the southeast coast of Australia. The average hook ti"}, {"matched_terms": "25%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ".3% (N = 130) is lower than that estimated by both Marshall et al. [25] of 20% (N = 10) in the NW Atlantic, and Barnes et al. [65] of 25% (N = 8) off the southeast coast of Australia. The average hook times of sandbar sharks tagged by these previous "}, {"matched_terms": "6%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". However, differences in hook times cannot fully account for the discrepancy as, in the present study, the PRM rate for sandbar sharks hooked for >7 (n = 29) was only 6%, compared to 33% (1 of 3 individuals hooked for >7 h) found by both Marshall et"}, {"matched_terms": "33%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "for the discrepancy as, in the present study, the PRM rate for sandbar sharks hooked for >7 (n = 29) was only 6%, compared to 33% (1 of 3 individuals hooked for >7 h) found by both Marshall et al. [25] and Barnes et al. [65]. Other factors related to"}, {"matched_terms": "2.0%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "Few published studies have assessed PRM rates in tiger, bull, blacktip, or spinner sharks following fisheries interactions. However, our finding of a 2.0% PRM rate in tiger sharks is similar to estimates from drumline fishing methods in the NW Atlant"}, {"matched_terms": "26%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "longline gear in the SW Atlantic (n = 21 [15]), where no capture-related mortality was reported in tiger sharks. The estimate of 26% PRM reported for bull sharks on drumline gear in the NW Atlantic (n = 27 [39]) is over three times as high as our stu"}, {"matched_terms": "23%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "tag failure or shark behavior prevent satellite transmissions. In blacktip sharks, PRM rates have previously been estimated at 9–23% in recreational fisheries [17,27,44], and we found substantially higher PRM for this species in the BLL fishery. As a"}, {"matched_terms": "7%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". This relative order of vulnerability to capture stress is supported by the PRM rates in the present study, with the exception of bull sharks having a higher PRM rate (7%) than sandbars (3%), although the small sample size of bull sharks in this stu"}, {"matched_terms": "3%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". This relative order of vulnerability to capture stress is supported by the PRM rates in the present study, with the exception of bull sharks having a higher PRM rate (7%) than sandbars (3%), although the small sample size of bull sharks in this stu"}, {"matched_terms": "11%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "with the exception of bull sharks having a higher PRM rate (7%) than sandbars (3%), although the small sample size of bull sharks in this study (N = 14) introduces wider margins of error (±11%) for the PRM rate of this species. While PRM rates varied"}, {"matched_terms": "10%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "While PRM rates varied substantially between species, they were consistently higher than AVM rates (by approximately 2–10% depending on the species). Previous studies have found similar results, with PRM rates 6% higher than AVM rates in blue sharks "}, {"matched_terms": "6%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "AVM rates (by approximately 2–10% depending on the species). Previous studies have found similar results, with PRM rates 6% higher than AVM rates in blue sharks [20], 7% higher in dusky sharks [25], and 15% higher in sandbar sharks [25]. Previously, "}, {"matched_terms": "7%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "AVM rates (by approximately 2–10% depending on the species). Previous studies have found similar results, with PRM rates 6% higher than AVM rates in blue sharks [20], 7% higher in dusky sharks [25], and 15% higher in sandbar sharks [25]. Previously, "}, {"matched_terms": "15%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". Previous studies have found similar results, with PRM rates 6% higher than AVM rates in blue sharks [20], 7% higher in dusky sharks [25], and 15% higher in sandbar sharks [25]. Previously, this difference in PRM and AVM rates has been used by fishe"}, {"matched_terms": "6%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "and AVM rates has been used by fisheries managers to estimate PRM rates in the absence of empirical PRM data [e.g. 66] by assuming that PRM rates are 6% higher than observed AVM rates based on work by Campana et al. [20] in blue sharks. Our findings "}, {"matched_terms": "15%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "and PRM in this and other studies and the variation within a species between studies (e.g. Marshall et al. [25] found PRM 15% higher than AVM in sandbar sharks, but the present study found PRM only 2.5% higher than AVM for the same species), empirica"}, {"matched_terms": "2.5%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "and PRM in this and other studies and the variation within a species between studies (e.g. Marshall et al. [25] found PRM 15% higher than AVM in sandbar sharks, but the present study found PRM only 2.5% higher than AVM for the same species), empirica"}, {"matched_terms": "69%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": ". This was apparent through the relatively high rate of incorrect individual fates predicted for blacktip and spinner sharks using decision trees made with at-vessel measurements (67–69% of fates correctly predicted). However, at-vessel decision tree"}, {"matched_terms": "99%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "fates predicted for blacktip and spinner sharks using decision trees made with at-vessel measurements (67–69% of fates correctly predicted). However, at-vessel decision trees proved highly effective at predicting sandbar shark fates (>99% correctly p"}, {"matched_terms": "90%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "which suffered limited PRM, but would be less effective for blacktip and spinner sharks, which are much more susceptible to both AVM and PRM. This is particularly apparent for spinner sharks, of which nearly 90% would still have died in this study if"}, {"matched_terms": "50%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "regulations to be effective for these two species, soak times would have to be limited to approximately 5 h to reduce PRM by 50%. Although longlines are often soaked for >12 h during commercial fishing operations [92], shorter soak times may not subs"}, {"matched_terms": "50%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "commercial fishing operations [92], shorter soak times may not substantially reduce catch rates, as comparisons of hook time and soak time of sets deployed for >6 h in this study show that the majority (>50%) of sharks were hooked within an hour of s"}, {"matched_terms": "70%", "section": "percentage", "total_freq": "1", "threshold": "1", "context": "rates, as comparisons of hook time and soak time of sets deployed for >6 h in this study show that the majority (>50%) of sharks were hooked within an hour of setting, with >70% caught within 3 h of setting, similar to the results of Marshall et al. "}, {"matched_terms": "p = 0.11", "section": "p-value", "total_freq": "1", "threshold": "1", "context": "occurred within 5 hours (Fig 2). There was no difference between species in time to mortality post-release (ANOVA F = 2.36, p = 0.11). Several (n = 12; 20%) of the PRMs were scavenged after death and their tags ingested, as evidenced by acceleration "}, {"matched_terms": "p<0.001", "section": "p-value", "total_freq": "1", "threshold": "1", "context": ". Comparisons of at-vessel metrics between individuals alive and dead at capture, and individuals that survived or died post-release. Species  AVM vs. Alive at vessel  Sandbar shark C. plumbeus  K+  p<10−11  K+  p<10−6  Lactate  p<0.001  Lactate  p<1"}, {"matched_terms": "p<0.001",
