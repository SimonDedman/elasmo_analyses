ks reported in the last 30 years71. Although observer coverage of "}, {"matched_terms": "seas", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "vessels recently), the relative capture rate of white sharks compared to other species was extremely low, suggesting high-seas longline bycatch of white sharks in this region, and perhaps others, was rare. In contrast, white sharks are taken in set n"}, {"matched_terms": "and", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "extremely low, suggesting high-seas longline bycatch of white sharks in this region, and perhaps others, was rare. In contrast, white sharks are taken in set net, line and trawl net fisheries throughout much of the New Zealand’s Territorial Sea and E"}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": ". In contrast, white sharks are taken in set net, line and trawl net fisheries throughout much of the New Zealand’s Territorial Sea and EEZ72,73. Reported and observed captures in trawl fisheries are comparable to those in set net fisheries74, and wh"}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "observed captures in trawl fisheries are comparable to those in set net fisheries74, and while some of the small inshore vessels do not use AIS, all of the deep water fleet does. Reported captures of white sharks in trawls are more common in the deep"}, {"matched_terms": "seas", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "These studies confirm that although we found high spatial overlap of higher than average effort with white shark space use in the southwest and northeast Pacific, it seems that actual fishing mortality due to high seas longline effort may be low. How"}, {"matched_terms": "bottom", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "%) and covers
