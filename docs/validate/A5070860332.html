awlers in the western North Atlantic. Accounting for post-release mortality is therefore essential to total ﬁshing"}, {"matched_terms": "to", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "mortality, while catch biomass, sex, temperature changes, and animal size also held inﬂuence in certain species. Although in general the studied species appear more resilient to trawl capture and handling than previously estimated, interspeciﬁc diffe"}, {"matched_terms": "otter", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "The Northeast Skate Complex (NESC) comprises seven species, ﬁve of which occur in the Gulf of Maine (GOM) (NEFMC, 2003), where otter trawl is the primary gear responsible for the capture and discard of skates (Sosebee, 1998; NEFMC, 2003, 2011). P-R"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "where otter trawl is the primary gear responsible for the capture and discard of skates (Sosebee, 1998; NEFMC, 2003, 2011). P-R mortality estimates of trawled skates under a wide range of true commercial conditions are vital toward, among other endpo"}, {"matched_terms": "in", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "to elucidate interspeciﬁc differences regarding both the rate and factors that inﬂuence P-R mortality in this complex. Although a few studies have evaluated discard mortality in trawled NESC species within Canadian waters, sample sizes were either sm"}, {"matched_terms": "otter", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "., et al., Short-term post-release mortality of skates (family Rajidae) discarded in a western North Atlantic commercial otter trawl ﬁshery. Fish. Res. (2012), http://dx.doi.org/10.1016/j.ﬁshres.2012.09.020  \fG Model FISH-3542; No. of Pages 9"}, {"matched_terms": "otter", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". Thus, the objective of the present study was to investigate the interspeciﬁc acute condition and short-term P-R mortality in four NESC skate species under standard commercial otter trawl conditions in the GOM. The little (Leucoraja erinacea) and wi"}, {"matched_terms": "commercial", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "identify the biological and/or physical factors with the most inﬂuence on condition and P-R mortality. 2. Materials and methods 2.1. Study overview Discard mortality trials were conducted in the GOM aboard two commercial trawlers (Fishing Vessels; F/"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "commercial trawlers (Fishing Vessels; F/Vs “Mystique Lady” and “Lady Victoria”), of comparable size (∼13 m) and gear speciﬁcations. The trawls had an 11 m long groundgear and an 18.5 m long headline, and were constructed with 152 mm mesh size in the "}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "“Lady Victoria”), of comparable size (∼13 m) and gear speciﬁcations. The trawls had an 11 m long groundgear and an 18.5 m long headline, and were constructed with 152 mm mesh size in the trawl body and 165 mm diamond mesh in the codend. The groundgea"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "(90–120 min); and extended (180–240 min)) were randomly conducted between 0600 and 1300 h. Similar to past studies (e.g., Neilson et al., 1989), the precise time-point skates entered the trawl net during the course of a tow was indeterminable, and to"}, {"matched_terms": "the", "section": "rejected:common_word", "total_freq": "0", "threshold": "1", "context": "maximum period of gear exposure and capture stress). Hobo temperature loggers (Onset Computer Corporation, Bourne, MA, USA) were afﬁxed to the trawl net and boat deck to evaluate real-time seawater and air temperature proﬁles experienced during the p"}, {"matched_terms": "of", "section": "rejected:too_short", "total_freq": "0", "threshold": "1", "context": "sorted by the ﬁshermen as would occur under normal circumstances. Given, however, the previously noted indeterminate time  of entry for skates into the net during the course of trawling, and the multiple additional interacting factors at play, the co"}, {"matched_terms": "otter", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "., et al., Short-term post-release mortality of skates (family Rajidae) discarded in a western North Atlantic commercial otter trawl ﬁshery. Fish. Res. (2012), http://dx.doi.org/10.1016/j.ﬁshres.2012.09.020  \fG Model FISH-3542; No. of Pages 9"}, {"matched_terms": "otter", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": ". Post-capture images of skates progressing (left-to-right) in condition from minor (category 1), to moderate (category 2), to extensive (category 3) injuries sustained from otter trawl capture.  from “control” tows sustaining injuries were still inc"}, {"matched_terms": "individual", "section": "rejected:unknown", "total_freq": "0", "threshold": "1", "context": "and 3) and 72 h mortality (deﬁned as the binomial variable resulting from life or death of each specimen at termination of pen trials), respectively, in individual trawl-captured skate species, as well as an aggregate (i.e., multispecies model) of al"}, {"matched_terms": "otter", "section": "rejected:gear_modifier", "total_freq": "0", "threshold": "1", "context": "., et al., Short-term post-release mortality of skates (family Rajidae) discarded in a western North Atlantic commercial otter trawl ﬁshery. Fish. Res. (2012), http://dx.doi.org/10.1016/j.ﬁshres.2012.09.020  \fARTICLE IN PRESS  G Model FISH-3542; No"}, {"matched_terms": "otter", "section": "rejected:gear_modifier", "to
